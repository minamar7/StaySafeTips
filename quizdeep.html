<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AI Quiz Generator — Stay Safe Elite</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;700;900&display=swap');

  :root {
    --bg: #020617;
    --surface: #0a1628;
    --card: #0d1f3c;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --danger: #ff2d55;
    --gold: #ffd700;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 32px 0 28px;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'Share Tech Mono', monospace;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* CATEGORY SELECTOR */
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .categories {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .cat-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(0,212,255,0.05));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cat-btn:hover::before, .cat-btn.active::before { opacity: 1; }

  .cat-btn:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  .cat-btn.active {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
    box-shadow: 0 0 20px rgba(0,212,255,0.15);
  }

  .cat-icon { font-size: 22px; display: block; margin-bottom: 6px; }

  .cat-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text);
  }

  .cat-btn.active .cat-name { color: var(--accent); }

  /* DIFFICULTY */
  .difficulty-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .diff-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.2s;
  }

  .diff-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .diff-btn[data-diff="easy"].active { border-color: var(--accent3); color: var(--accent3); background: rgba(57,255,20,0.08); }
  .diff-btn[data-diff="medium"].active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.08); }
  .diff-btn[data-diff="hard"].active { border-color: var(--danger); color: var(--danger); background: rgba(255,45,85,0.08); }

  /* GENERATE BUTTON */
  .generate-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #0077aa, #00d4ff);
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    margin-bottom: 24px;
    box-shadow: 0 4px 30px rgba(0,212,255,0.3);
  }

  .generate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(0,212,255,0.4);
  }

  .generate-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .generate-btn .shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    to { left: 100%; }
  }

  /* LOADING STATE */
  .loading-state {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .loading-state.visible { display: block; }

  .radar {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(0,212,255,0.2);
    position: relative;
    margin: 0 auto 20px;
    animation: radar-spin 2s linear infinite;
  }

  .radar::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.15);
  }

  .radar-sweep {
    position: absolute;
    top: 50%; left: 50%;
    width: 50%; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    transform-origin: left center;
    animation: sweep 2s linear infinite;
  }

  @keyframes sweep { to { transform: rotate(360deg); } }
  @keyframes radar-spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    animation: blink 1s infinite;
  }

  @keyframes blink { 50% { opacity: 0.3; } }

  /* QUIZ AREA */
  .quiz-area { display: none; }
  .quiz-area.visible { display: block; }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .q-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .q-counter span { color: var(--accent); font-size: 16px; }

  .score-display {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px var(--accent);
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }

  .q-category-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .question-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .option-letter {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(0,212,255,0.4);
    background: rgba(0,212,255,0.05);
    transform: translateX(4px);
  }

  .option-btn:hover:not(:disabled) .option-letter {
    border-color: var(--accent);
    color: var(--accent);
  }

  .option-btn.correct {
    border-color: var(--accent3);
    background: rgba(57,255,20,0.08);
    animation: correctFlash 0.4s ease;
  }

  .option-btn.correct .option-letter {
    background: var(--accent3);
    color: #000;
    border-color: var(--accent3);
  }

  .option-btn.wrong {
    border-color: var(--danger);
    background: rgba(255,45,85,0.08);
    animation: wrongShake 0.4s ease;
  }

  .option-btn.wrong .option-letter {
    background: var(--danger);
    color: #fff;
    border-color: var(--danger);
  }

  @keyframes correctFlash {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(4px); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* EXPLANATION */
  .explanation {
    display: none;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.6;
    color: #a0b4c8;
    animation: fadeIn 0.3s ease;
  }

  .explanation.visible { display: block; }

  .explanation strong {
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* NEXT BUTTON */
  .next-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(0,212,255,0.3);
    background: rgba(0,212,255,0.08);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    margin-top: 16px;
  }

  .next-btn.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  .next-btn:hover {
    background: rgba(0,212,255,0.15);
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }

  /* RESULTS */
  .results-screen {
    display: none;
    text-align: center;
    padding: 20px 0;
    animation: slideIn 0.5s ease;
  }

  .results-screen.visible { display: block; }

  .results-icon {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
    animation: bounceIn 0.6s ease;
  }

  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .results-score {
    font-family: 'Rajdhani', sans-serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .results-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .results-message {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 28px;
    padding: 16px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .results-actions {
    display: flex;
    gap: 12px;
  }

  .btn-retry, .btn-new {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-retry {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }
  .btn-retry:hover { border-color: var(--text); color: var(--text); }

  .btn-new {
    border: none;
    background: linear-gradient(135deg, #0077aa, #00d4ff);
    color: #000;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
  }
  .btn-new:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,212,255,0.4); }

  /* Error */
  .error-box {
    display: none;
    background: rgba(255,45,85,0.08);
    border: 1px solid rgba(255,45,85,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #ff6b8a;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 16px;
    text-align: center;
  }
  .error-box.visible { display: block; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-badge">
      <span class="pulse-dot"></span>
      Stay Safe Elite · AI Quiz
    </div>
    <h1>Safety Quiz</h1>
    <p>// AI-POWERED · REAL-TIME GENERATED</p>
  </div>

  <div id="setupPanel">

    <div class="section-label">Category</div>
    <div class="categories">
      <button class="cat-btn active" data-cat="scams">
        <span class="cat-icon">🎣</span>
        <span class="cat-name">Scams</span>
      </button>
      <button class="cat-btn" data-cat="digital">
        <span class="cat-icon">🔐</span>
        <span class="cat-name">Digital</span>
      </button>
      <button class="cat-btn" data-cat="physical">
        <span class="cat-icon">🥋</span>
        <span class="cat-name">Physical</span>
      </button>
      <button class="cat-btn" data-cat="travel">
        <span class="cat-icon">✈️</span>
        <span class="cat-name">Travel</span>
      </button>
      <button class="cat-btn" data-cat="nature">
        <span class="cat-icon">🌍</span>
        <span class="cat-name">Nature</span>
      </button>
      <button class="cat-btn" data-cat="emergency">
        <span class="cat-icon">🆘</span>
        <span class="cat-name">Emergency</span>
      </button>
    </div>

    <div class="section-label">Difficulty</div>
    <div class="difficulty-row">
      <button class="diff-btn active" data-diff="easy">⚡ Easy</button>
      <button class="diff-btn" data-diff="medium">🔥 Medium</button>
      <button class="diff-btn" data-diff="hard">💀 Hard</button>
    </div>

    <div class="error-box" id="errorBox">⚠️ ERROR — RETRYING...</div>

    <button class="generate-btn" id="generateBtn" onclick="generateQuiz()">
      <span class="shimmer"></span>
      ⚡ Generate Quiz
    </button>

  </div>

  <div class="loading-state" id="loadingState">
    <div class="radar">
      <div class="radar-sweep"></div>
    </div>
    <div class="loading-text" id="loadingText">GENERATING QUESTIONS...</div>
  </div>

  <div class="quiz-area" id="quizArea">
    <div class="quiz-header">
      <div class="q-counter">QUESTION <span id="qNum">1</span>/5</div>
      <div class="score-display">⭐ <span id="scoreDisplay">0</span></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="q-category-tag" id="qCategoryTag">🎣 SCAMS</div>
      <div class="question-text" id="questionText">Loading...</div>
      <div class="options" id="optionsContainer"></div>
      <div class="explanation" id="explanation">
        <strong>// INTEL</strong>
        <span id="explanationText"></span>
      </div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      NEXT QUESTION →
    </button>
  </div>

  <div class="results-screen" id="resultsScreen">
    <span class="results-icon" id="resultsIcon">🛡️</span>
    <div class="results-score" id="finalScore">0/5</div>
    <div class="results-label">THREAT AWARENESS SCORE</div>
    <div class="results-message" id="resultsMessage"></div>
    <div class="results-actions">
      <button class="btn-retry" onclick="retryQuiz()">↺ Retry</button>
      <button class="btn-new" onclick="newQuiz()">⚡ New Quiz</button>
    </div>
  </div>

</div>

<script>
  let questions = [];
  let currentQ = 0;
  let score = 0;
  let answered = false;
  let selectedCategory = 'scams';
  let selectedDiff = 'easy';

  // Category & difficulty selectors
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCategory = btn.dataset.cat;
    });
  });

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDiff = btn.dataset.diff;
    });
  });

  const catLabels = {
    scams: '🎣 SCAMS',
    digital: '🔐 DIGITAL SAFETY',
    physical: '🥋 PHYSICAL SAFETY',
    travel: '✈️ TRAVEL',
    nature: '🌍 NATURE & DISASTERS',
    emergency: '🆘 EMERGENCY'
  };

  const diffLabels = {
    easy: 'beginner level, using everyday examples',
    medium: 'intermediate level, with more details and traps',
    hard: 'advanced level, with complex and misleading scenarios'
  };

  async function generateQuiz() {
    const btn = document.getElementById('generateBtn');
    const errBox = document.getElementById('errorBox');
    const loadingText = document.getElementById('loadingText');
    
    errBox.classList.remove('visible');
    btn.disabled = true;

    document.getElementById('setupPanel').style.display = 'none';
    document.getElementById('loadingState').classList.add('visible');
    document.getElementById('quizArea').classList.remove('visible');
    document.getElementById('resultsScreen').classList.remove('visible');

    loadingText.textContent = "DEEP RESEARCHING REAL-TIME THREATS...";

    // Prompt logic
    const prompt = `Use Deep Research to find current (2025-2026) safety threats for category: ${selectedCategory}. 
    Difficulty: ${diffLabels[selectedDiff]}.
    Generate 5 quiz questions in English. Provide real-world 'Intel' in the explanation.
    Respond ONLY with JSON: { "questions": [{ "question": "...", "options": ["A. ...", "B. ...", "C. ...", "D. ..."], "correct": 0, "explanation": "..." }] }`;

    try {
      // API call placeholder
      const response = await fetch("YOUR_AI_API_ENDPOINT", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt })
      });

      const data = await response.json();
      const parsed = JSON.parse(data.choices[0].message.content.replace(/```json|```/g, '').trim());

      questions = parsed.questions;
      currentQ = 0;
      score = 0;

      document.getElementById('loadingState').classList.remove('visible');
      document.getElementById('quizArea').classList.add('visible');
      renderQuestion();

    } catch (err) {
      document.getElementById('loadingState').classList.remove('visible');
      document.getElementById('setupPanel').style.display = 'block';
      errBox.classList.add('visible');
      btn.disabled = false;
    }
  }

  function renderQuestion() {
    answered = false;
    const q = questions[currentQ];

    document.getElementById('qNum').textContent = currentQ + 1;
    document.getElementById('progressFill').style.width = `${(currentQ / 5) * 100}%`;
    document.getElementById('qCategoryTag').textContent = catLabels[selectedCategory];
    document.getElementById('questionText').textContent = q.question;
    document.getElementById('explanation').classList.remove('visible');
    document.getElementById('nextBtn').classList.remove('visible');

    const opts = document.getElementById('optionsContainer');
    opts.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D'];

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt.replace(/^[A-D]\.\s*/, '')}</span>`;
      btn.onclick = () => selectAnswer(i, btn);
      opts.appendChild(btn);
    });
  }

  function selectAnswer(index, clickedBtn) {
    if (answered) return;
    answered = true;
    const q = questions[currentQ];
    const allBtns = document.querySelectorAll('.option-btn');

    if (index === q.correct) {
      clickedBtn.classList.add('correct');
      score++;
      document.getElementById('scoreDisplay').textContent = score;
    } else {
      clickedBtn.classList.add('wrong');
      allBtns[q.correct].classList.add('correct');
    }

    document.getElementById('explanationText').textContent = q.explanation;
    document.getElementById('explanation').classList.add('visible');
    document.getElementById('nextBtn').classList.add('visible');
    document.getElementById('nextBtn').textContent = currentQ < 4 ? 'NEXT QUESTION →' : 'SEE RESULTS →';
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ < 5) renderQuestion();
    else showResults();
  }

  function showResults() {
    document.getElementById('quizArea').classList.remove('visible');
    document.getElementById('resultsScreen').classList.add('visible');
    document.getElementById('finalScore').textContent = `${score}/5`;
    
    const messages = ['Try again!', 'Keep learning.', 'Good effort.', 'Well done!', 'Excellent!', 'ELITE STATUS!'];
    document.getElementById('resultsMessage').textContent = messages[score];
  }

  function retryQuiz() {
    currentQ = 0; score = 0;
    document.getElementById('resultsScreen').classList.remove('visible');
    document.getElementById('quizArea').classList.add('visible');
    renderQuestion();
  }

  function newQuiz() {
    questions = [];
    document.getElementById('resultsScreen').classList.remove('visible');
    document.getElementById('setupPanel').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
  }
</script>
</body>
</html>
