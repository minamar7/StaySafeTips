<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stay Safe Elite – Tang Soo Do Avatar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #f5c542; --red: #e8212a; --bg: #080810; --card: #10101c;
  --text: #f0ede8; --dim: #4a4a6a; --border: #1e1e2e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.app-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); letter-spacing: 2px; }

.avatar-stage {
  position: relative; margin: 15px 20px; border-radius: 16px;
  background: radial-gradient(circle at center, #1a1a2e 0%, #080810 100%);
  border: 1px solid var(--border); height: 350px; overflow: hidden;
}
#three-mount { width:100%; height:100%; }

.stage-overlay {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
}
.phase-badge { align-self: flex-start; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--gold); }
.phase-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); }

.avatar-controls { pointer-events: auto; display: flex; gap: 10px; align-self: flex-end; }
.av-btn {
  background: var(--card); border: 1px solid var(--border); color: white;
  padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.av-btn:active { border-color: var(--gold); }

.loader {
  position: absolute; inset:0; background: var(--bg); display: flex; 
  flex-direction: column; align-items: center; justify-content: center; z-index: 10;
}
.progress-bar { width: 150px; height: 4px; background: #222; margin-top: 10px; border-radius: 2px; overflow: hidden; }
.progress-fill { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div>
            <div class="app-title">STAY SAFE ELITE</div>
            <div style="font-size: 10px; color: var(--dim); letter-spacing: 2px;">TANG SOO DO INTERACTIVE</div>
        </div>
    </div>

    <div class="avatar-stage">
        <div id="three-mount"></div>
        
        <div class="loader" id="loader">
            <div style="color: var(--gold); font-family: 'Bebas Neue'; font-size: 20px;">ΦΟΡΤΩΣΗ AVATAR...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div class="stage-overlay">
            <div class="phase-badge">
                <div class="phase-name" id="phase-label">READY</div>
                <div style="font-size: 10px; color: #aaa;" id="phase-sub">ΣΤΑΣΗ ΕΤΟΙΜΟΤΗΤΑΣ</div>
            </div>
            <div class="avatar-controls">
                <button class="av-btn" onclick="playNext()">ΕΠΟΜΕΝΗ ΚΙΝΗΣΗ ▶</button>
            </div>
        </div>
    </div>

    <div style="padding: 0 20px;">
        <div style="background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="color: var(--gold); font-family: 'Bebas Neue'; margin-bottom: 5px;">Πληροφορίες Άσκησης</h3>
            <p id="phase-desc" style="font-size: 14px; color: #ccc; line-height: 1.5;">
                Θέση ετοιμότητας. Χέρια μπροστά σε φυσική φύλαξη.
            </p>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('three-mount');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(2, 4, 2);
dirLight.castShadow = true;
scene.add(dirLight);

const loader = new GLTFLoader();
let bones = {}, restRot = {};
let currentPhaseIdx = 0, tween = null;

// ════════════════════════════════════════════════════════════════
//  CALIBRATED ABSOLUTE ROTATIONS για αυτό το skeleton
//
//  Αυτό το skeleton (από ανάλυση GLB) έχει:
//    RightArm rest:     X=0.9925, Y=-0.1309, Z=0.0627  (56.87°)
//    RightForeArm rest: X=-0.0867, Y=-0.0673, Z=-0.4424
//    LeftArm rest:      X=0.9925, Y=0.1309, Z=-0.0627
//    LeftForeArm rest:  X=-0.0867, Y=0.0673, Z=0.4424
//
//  rotation.set(x,y,z) = ABSOLUTE τιμή (όχι delta)
//  Άξονες: Y=up/down περιστροφή, Z=μπρος/πίσω, X=πάνω/κάτω χέρι
// ════════════════════════════════════════════════════════════════

const phases = [
    {
        label: "ΕΤΟΙΜΟΤΗΤΑ",
        sub:   "준비 자세 · Ready Stance",
        desc:  "Θέση ετοιμότητας Tang Soo Do. Χέρια σε φυσική φύλαξη μπροστά από το στήθος.",
        // Χέρια ελαφρά κατεβασμένα από rest, αγκώνες λυγισμένοι
        rot: {
            RightArm:     [ 0.70,  -0.13,  -0.09],  // 40° — χέρι κάτω/μπροστά
            RightForeArm: [ 0.42,  -0.07,  -0.44],  // αγκώνας λυγισμένος
            RightHand:    [ 0.09,  -0.08,   0.03],
            LeftArm:      [ 0.70,   0.13,   0.09],
            LeftForeArm:  [ 0.42,   0.07,   0.44],
            LeftHand:     [ 0.09,   0.08,  -0.03],
            Spine:        [-0.14,   0.00,   0.00],
            Spine1:       [-0.06,   0.00,   0.00],
            Head:         [-0.33,   0.00,   0.00],
        }
    },
    {
        label: "ΠΡΟΕΤΟΙΜΑΣΙΑ",
        sub:   "당겨 · Chamber",
        desc:  "Το δεξί χέρι τραβιέται πίσω στο ισχίο. Το αριστερό προεκτείνεται σε φύλαξη.",
        // Δεξί: κατεβαίνει πίσω στο πλευρό
        // Αριστερό: προεκτείνεται μπροστά
        rot: {
            RightArm:     [ 0.20,  -0.13,  -0.84],  // 11.5° — χέρι κάτω/πίσω
            RightForeArm: [ 0.82,  -0.07,  -0.44],  // αγκώνας διπλωμένος
            RightHand:    [ 0.09,  -0.08,   0.03],
            LeftArm:      [ 1.20,   0.25,   0.22],  // 68.8° — χέρι μπροστά/πάνω
            LeftForeArm:  [ 0.30,   0.07,   0.44],
            LeftHand:     [ 0.09,   0.08,  -0.03],
            Spine:        [-0.07,   0.00,  -0.05],
            Spine1:       [-0.03,   0.00,  -0.02],
            Head:         [-0.25,   0.00,   0.05],
        }
    },
    {
        label: "ΑΝΕΒΑΣΜΑ",
        sub:   "올리기 · Rising",
        desc:  "Το δεξί χέρι ανεβαίνει διαγώνια προς τα πάνω με ορμή.",
        rot: {
            RightArm:     [ 1.55,  -0.25,  -0.52],  // 88.8° — μισή διαδρομή
            RightForeArm: [-0.15,   0.25,   0.15],  // πήχης αρχίζει να ανοίγει
            RightHand:    [ 0.09,  -0.08,   0.15],
            LeftArm:      [ 0.55,   0.20,   0.42],  // αρχίζει να τραβιέται
            LeftForeArm:  [ 0.30,   0.07,   0.44],
            LeftHand:     [ 0.09,   0.08,  -0.03],
            Spine:        [-0.07,   0.00,  -0.08],
            Spine1:       [-0.03,   0.00,  -0.03],
            Head:         [-0.20,   0.00,   0.08],
        }
    },
    {
        label: "HIGH BLOCK!",
        sub:   "상단막기 · Sang Dan Makgi",
        desc:  "Πλήρες High Block! Ο πήχης υψώνεται πάνω από το κεφάλι σχηματίζοντας γωνία 45° για να αποκρούσει επίθεση.",
        // ── ΤΟ ΚΛΕΙΔΙ: rest X=0.9925 (56.87°)
        // Για arm πάνω από κεφάλι: X≈2.65 rad (151.8°) + tilt
        rot: {
            RightArm:     [ 2.65,  -0.25,  -0.55],  // 151.8° — χέρι ψηλά ✓
            RightForeArm: [-0.35,   0.52,   0.35],  // πήχης διαγώνιος μπροστά/πάνω ✓
            RightHand:    [ 0.09,   0.10,   0.30],  // καρπός ελαφρά λυγισμένος
            LeftArm:      [ 0.15,   0.20,   0.55],  // αριστερό τραβιέται στο ισχίο
            LeftForeArm:  [ 0.82,   0.07,   0.44],  // αγκώνας διπλωμένος
            LeftHand:     [ 0.09,   0.08,  -0.03],
            Spine:        [-0.07,   0.00,  -0.08],  // σώμα ελαφρά στρέφεται
            Spine1:       [-0.03,   0.00,  -0.03],
            Head:         [-0.15,   0.00,   0.08],  // κεφάλι κοιτάει ψηλά
        }
    },
    {
        label: "ΚΡΑΤΗΣΕ!",
        sub:   "유지 · Hold",
        desc:  "Κράτα τη θέση. Σταθεροποίησε το μπλοκάρισμα και έλεγξε την ισορροπία σου.",
        // Ίδιο με HIGH BLOCK αλλά ελαφρά relaxed
        rot: {
            RightArm:     [ 2.60,  -0.22,  -0.52],
            RightForeArm: [-0.30,   0.48,   0.30],
            RightHand:    [ 0.09,   0.08,   0.28],
            LeftArm:      [ 0.18,   0.18,   0.50],
            LeftForeArm:  [ 0.80,   0.07,   0.44],
            LeftHand:     [ 0.09,   0.08,  -0.03],
            Spine:        [-0.07,   0.00,  -0.07],
            Spine1:       [-0.03,   0.00,  -0.02],
            Head:         [-0.17,   0.00,   0.07],
        }
    }
];

// ── Smooth tween ──────────────────────────────────────────────────
const easeIO = t => t < .5 ? 2*t*t : -1+(4-2*t)*t;

function startTween(idx) {
    const ph = phases[idx], from = {}, to = {};
    Object.keys(ph.rot).forEach(n => {
        if (!bones[n]) return;
        from[n] = {x: bones[n].rotation.x, y: bones[n].rotation.y, z: bones[n].rotation.z};
        to[n]   = {x: ph.rot[n][0],        y: ph.rot[n][1],        z: ph.rot[n][2]};
    });
    tween = {from, to, t0: performance.now(), dur: idx === 3 ? 380 : 540};
}

function tickTween(now) {
    if (!tween) return;
    const t = Math.min((now - tween.t0) / tween.dur, 1), e = easeIO(t);
    Object.keys(tween.to).forEach(n => {
        if (!bones[n]) return;
        bones[n].rotation.x = tween.from[n].x + (tween.to[n].x - tween.from[n].x) * e;
        bones[n].rotation.y = tween.from[n].y + (tween.to[n].y - tween.from[n].y) * e;
        bones[n].rotation.z = tween.from[n].z + (tween.to[n].z - tween.from[n].z) * e;
    });
    if (t >= 1) tween = null;
}

function applyPhase(idx, instant = false) {
    const p = phases[idx];
    document.getElementById('phase-label').innerText = p.label;
    document.getElementById('phase-sub').innerText   = p.sub;
    document.getElementById('phase-desc').innerText  = p.desc;
    if (!Object.keys(bones).length) return;
    if (instant) {
        Object.keys(p.rot).forEach(n => {
            if (!bones[n]) return;
            bones[n].rotation.set(p.rot[n][0], p.rot[n][1], p.rot[n][2]);
        });
    } else startTween(idx);
}

// ── Load ──────────────────────────────────────────────────────────
const MODEL_URL = 'avatar (1).glb';

loader.load(MODEL_URL, (gltf) => {
    const avatar = gltf.scene;
    avatar.traverse(n => {
        if (n.isMesh) n.castShadow = n.receiveShadow = true;
        // Collect ALL bones from skeleton
        if (n.isSkinnedMesh && n.skeleton)
            n.skeleton.bones.forEach(b => { if (b.name) bones[b.name] = b; });
    });

    // Scale correctly
    const box = new THREE.Box3().setFromObject(avatar);
    const sf  = 1.62 / box.getSize(new THREE.Vector3()).y;
    const ctr = box.getCenter(new THREE.Vector3());
    avatar.scale.setScalar(sf);
    avatar.position.set(-ctr.x*sf, -box.min.y*sf, -ctr.z*sf);
    scene.add(avatar);

    const hipsY = 1.0192 * sf;
    controls.target.set(0, hipsY, 0);
    camera.position.set(0, hipsY * 0.8, 3.2);
    controls.update();

    document.getElementById('loader').style.display = 'none';
    applyPhase(0, true);

}, (xhr) => {
    const p = xhr.total ? xhr.loaded/xhr.total*100 : xhr.loaded/838196*100;
    document.getElementById('progress-fill').style.width = Math.min(p, 99) + '%';
});

window.playNext = () => {
    currentPhaseIdx = (currentPhaseIdx + 1) % phases.length;
    applyPhase(currentPhaseIdx);
};

function animate(time) {
    requestAnimationFrame(animate);
    tickTween(time);
    controls.update();
    renderer.render(scene, camera);
}
animate(0);

window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>

</body>
</html>
