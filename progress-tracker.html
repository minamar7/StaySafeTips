<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Progress Tracker – Elite Defense Dojo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --gold: #facc15;
            --neon: #38bdf8;
            --safe: #22c55e;
            --panel: rgba(15,23,42,0.9);
            --shadow-gold: rgba(250,204,21,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }

        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(250,204,21,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(250,204,21,0.03) 1px, transparent 1px); background-size: 36px 36px; }
        .shell { position: relative; z-index: 2; max-width: 420px; margin: 0 auto; padding: 20px 16px 100px; }

        /* Top Nav */
        .top-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .btn-back { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #64748b; padding: 10px 16px; border-radius: 12px; text-decoration: none; font-size: 0.8rem; font-weight: 700; }
        .page-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--gold); letter-spacing: 2px; }

        /* Belt Section */
        .belt-section { background: var(--panel); border: 1px solid rgba(250,204,21,0.2); border-radius: 24px; padding: 20px; margin-bottom: 18px; }
        .section-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin: 20px 0 10px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .belt-track { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; position: relative; }
        .belt-track::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); transform: translateY(-50%); }
        .belt-node { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; z-index: 1; }
        .belt-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; border: 2px solid rgba(255,255,255,0.1); background: var(--bg); transition: 0.3s; }
        .belt-circle.done { border-color: var(--gold); box-shadow: 0 0 10px var(--shadow-gold); }
        .belt-circle.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 15px var(--neon); } 50% { box-shadow: 0 0 25px var(--neon); } }
        .belt-name { font-size: 0.5rem; color: #475569; text-transform: uppercase; }
        
        .xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .xp-value { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon); }
        .xp-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .xp-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), #0ea5e9); transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--panel); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 12px; text-align: center; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--gold); }
        .stat-label { font-size: 0.5rem; color: #475569; text-transform: uppercase; }

        /* Video Grid (Horizontal) */
        .video-grid { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .video-card { flex: 0 0 80%; scroll-snap-align: center; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; height: 260px; position: relative; overflow: hidden; }
        .video-thumb { width: 100%; height: 160px; background-image: url('1000043165.jpg'); background-size: cover; background-position: center; filter: brightness(0.7); }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(250,204,21,0.2); border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .video-info { padding: 15px; position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #020617 60%, transparent); }
        .video-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--gold); }
        .check-icon { position: absolute; top: 15px; right: 15px; background: var(--safe); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; }

        /* Badges */
        .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .badge-item { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 12px 5px; text-align: center; opacity: 0.2; filter: grayscale(1); border: 1px solid transparent; transition: 0.5s ease; }
        .badge-item.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--gold); background: rgba(250,204,21,0.05); transform: scale(1.05); box-shadow: 0 0 15px rgba(250,204,21,0.2); }
        .badge-emoji { font-size: 1.6rem; display: block; }
        .badge-name { font-size: 0.5rem; color: #475569; font-weight: 700; text-transform: uppercase; margin-top: 5px; display: block; }
        .badge-item.unlocked .badge-name { color: var(--gold); }

        /* Modal & Slow-down Loader */
        .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(2,6,23,0.95); display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-overlay.open { display: flex; }
        .modal { width: 100%; max-width: 400px; background: var(--panel); border-radius: 24px; border: 1px solid var(--gold); overflow: hidden; }
        .modal-video { width: 100%; aspect-ratio: 16/9; }
        .modal-video iframe { width: 100%; height: 100%; border: none; }
        .modal-body { padding: 20px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 700; margin-bottom: 8px; cursor: pointer; text-transform: uppercase; font-family: 'Rajdhani'; }
        .btn-complete { background: var(--safe); color: white; transition: 0.3s; }
        .btn-complete:disabled { background: #1e293b; cursor: not-allowed; opacity: 0.6; }

        #xpLoader { position: fixed; inset: 0; z-index: 2000; background: rgba(2,6,23,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .loader-circle { width: 40px; height: 40px; border: 3px solid rgba(250,204,21,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <div id="xpLoader">
        <div class="loader-circle"></div>
        <div style="font-family:'Orbitron'; color:var(--gold); font-size:0.8rem; letter-spacing:2px;">PROCESSING XP...</div>
    </div>

    <div class="modal-overlay" id="videoModal">
        <div class="modal">
            <div class="modal-video"><iframe id="modalIframe" src="" allowfullscreen></iframe></div>
            <div class="modal-body">
                <div id="modalTitle" style="color:var(--gold); font-family:'Orbitron'; margin-bottom:15px;">TITLE</div>
                <button class="btn-action btn-complete" id="completeBtn">Complete Session</button>
                <button class="btn-action" style="background:rgba(255,255,255,0.1); color:white;" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div class="shell">
        <div class="top-nav">
            <a href="dojo.html" class="btn-back">← DOJO</a>
            <span class="page-title">PROGRESS TRACKER</span>
        </div>

        <div class="belt-section">
            <div class="section-label">🥋 Belt Progression</div>
            <div class="belt-track">
                <div class="belt-node" id="belt-0"><div class="belt-circle">⬜</div><span class="belt-name">White</span></div>
                <div class="belt-node" id="belt-1"><div class="belt-circle">🟡</div><span class="belt-name">Yellow</span></div>
                <div class="belt-node" id="belt-2"><div class="belt-circle">🟢</div><span class="belt-name">Green</span></div>
                <div class="belt-node" id="belt-3"><div class="belt-circle">🔵</div><span class="belt-name">Blue</span></div>
                <div class="belt-node" id="belt-4"><div class="belt-circle">🔴</div><span class="belt-name">Red</span></div>
                <div class="belt-node" id="belt-5"><div class="belt-circle">⬛</div><span class="belt-name">Black</span></div>
            </div>
            <div class="xp-row">
                <span style="font-size:0.6rem; color:#64748b;">TOTAL XP PROGRESS</span>
                <span class="xp-value" id="xpDisplay">0 / 1000</span>
            </div>
            <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBar"></div></div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><span class="stat-value" id="statVideos">0</span><span class="stat-label">Videos</span></div>
            <div class="stat-card"><span class="stat-value">1</span><span class="stat-label">Streak</span></div>
            <div class="stat-card"><span class="stat-value" id="statXP">0</span><span class="stat-label">Total XP</span></div>
        </div>

        <div class="section-label">🇬🇧 English Sessions</div>
        <div class="video-grid" id="gridEnglish"></div>

        <div class="section-label">🇬🇷 Ελληνικές Συνεδρίες</div>
        <div class="video-grid" id="gridGreek"></div>

        <div class="section-label">🏆 Achievements</div>
        <div class="badge-grid" id="badgeGrid"></div>
    </div>

    <script>
        let totalXP = parseInt(localStorage.getItem('dojo_xp') || '0');
        let completed = JSON.parse(localStorage.getItem('dojo_completed') || '[]');

        // Video Data με τα σωστά links και XP διαβάθμιση
        const videoData = [
            { id: "e1", lang: 'en', cat: 'defense', title: 'Front Block', xp: 50, drive: '1EHZzH4ye46Zv6PFCBHUc9SGbRivtwIsl' },
            { id: "e2", lang: 'en', cat: 'kicks', title: 'Front Kick', xp: 50, drive: '1Fslem8kIbjTcYhOBsnPx7qt1n8cBHSQI' },
            { id: "e3", lang: 'en', cat: 'kicks', title: 'Front Side Kick', xp: 100, drive: '1nCvJ1WxHi6Jmnhs5V7u2g_VlFeEe5T7l' },
            { id: "e4", lang: 'en', cat: 'strikes', title: 'Front Punch', xp: 50, drive: '1Gw01IyW8bQPzC5lhQAOXmauhfP6kOKUi' },
            { id: "e5", lang: 'en', cat: 'defense', title: 'Middle Block', xp: 100, drive: '1frv_G2vUTpssDva7fYPrVgipdxyDYGd1' },
            { id: "e6", lang: 'en', cat: 'defense', title: 'Outside Block', xp: 150, drive: '1eiNMQ7wemQhfChLyYhIRbL29Btk0YpLo' },
            
            { id: "g1", lang: 'gr', cat: 'defense', title: 'Front Block', xp: 50, drive: '1Kci4vsm-vev74IgA-8Nl0bX_N1OuETxG' },
            { id: "g2", lang: 'gr', cat: 'kicks', title: 'Front Kick', xp: 50, drive: '1ZCMq052vmFF1yEPfNkTEdyQgcouK2SJt' },
            { id: "g3", lang: 'gr', cat: 'kicks', title: 'Front Side Kick', xp: 150, drive: '1fy8fmRHvVWGH6tMT4d5siJfOKabBeUdk' },
            { id: "g4", lang: 'gr', cat: 'strikes', title: 'High Punch', xp: 100, drive: '1r0asELekaTfN3ijRr-IWG6RK7zwWEtmv' },
            { id: "g5", lang: 'gr', cat: 'defense', title: 'Middle Block', xp: 100, drive: '1k5wZeYbY-YvVINi-IaYNzhQf41s10V5I' },
            { id: "g6", lang: 'gr', cat: 'defense', title: 'Outside Block', xp: 150, drive: '1_EPPWWGSeq5z5VMld2GWBGvUQ3-WcjxD' }
        ];

        const badgeData = [
            { id: 'b1', emoji: '👊', name: 'Novice', threshold: 1000 },
            { id: 'b2', emoji: '🔥', name: 'Warrior', threshold: 3000 },
            { id: 'b3', emoji: '🛡️', name: 'Guardian', threshold: 6000 },
            { id: 'b4', emoji: '🏆', name: 'Master', threshold: 10000 }
        ];

        // Η πρώτη ζώνη ξεκλειδώνει στα 1000 XP
        const belts = [
            { min: 0 }, { min: 1000 }, { min: 2500 }, { min: 5000 }, { min: 8000 }, { min: 12000 }
        ];

        let activeVideo = null;

        function renderGrids() {
            const draw = (lang) => videoData.filter(v => v.lang === lang).map(v => `
                <div class="video-card" onclick="openVideo('${v.id}')">
                    <div class="video-thumb">
                        <div class="play-btn"><svg viewBox="0 0 24 24" width="24"><path d="M8 5v14l11-7z" fill="var(--gold)"/></svg></div>
                        ${completed.includes(v.id) ? '<div class="check-icon">✓</div>' : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        <div style="font-size:0.6rem; color:var(--neon);">+${v.xp} XP • ${v.cat.toUpperCase()}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('gridEnglish').innerHTML = draw('en');
            document.getElementById('gridGreek').innerHTML = draw('gr');
        }

        function renderBadges() {
            document.getElementById('badgeGrid').innerHTML = badgeData.map(b => `
                <div class="badge-item ${totalXP >= b.threshold ? 'unlocked' : ''}">
                    <span class="badge-emoji">${totalXP >= b.threshold ? b.emoji : '🔒'}</span>
                    <span class="badge-name">${b.name}</span>
                    <span style="font-size:0.4rem; color:#475569;">${b.threshold} XP</span>
                </div>
            `).join('');
        }

        function openVideo(id) {
            activeVideo = videoData.find(v => v.id === id);
            document.getElementById('modalTitle').textContent = activeVideo.title;
            document.getElementById('modalIframe').src = `https://drive.google.com/file/d/${activeVideo.drive}/preview`;
            const btn = document.getElementById('completeBtn');
            if(completed.includes(id)) {
                btn.textContent = "ALREADY DONE";
                btn.disabled = true;
            } else {
                btn.textContent = `MARK COMPLETE +${activeVideo.xp}XP`;
                btn.disabled = false;
                btn.onclick = processCompletion;
            }
            document.getElementById('videoModal').classList.add('open');
        }

        function processCompletion() {
            closeModal();
            document.getElementById('xpLoader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('xpLoader').style.display = 'none';
                if(!completed.includes(activeVideo.id)) {
                    completed.push(activeVideo.id);
                    totalXP += activeVideo.xp;
                    localStorage.setItem('dojo_completed', JSON.stringify(completed));
                    localStorage.setItem('dojo_xp', totalXP);
                    updateUI();
                    renderGrids();
                    renderBadges();
                }
            }, 1500);
        }

        function closeModal() {
            document.getElementById('videoModal').classList.remove('open');
            document.getElementById('modalIframe').src = "";
        }

        function updateUI() {
            document.getElementById('statXP').textContent = totalXP;
            document.getElementById('statVideos').textContent = completed.length;
            
            let currentIdx = 0;
            for(let i=belts.length-1; i>=0; i--) {
                if(totalXP >= belts[i].min) { currentIdx = i; break; }
            }

            const next = belts[currentIdx + 1] || belts[currentIdx];
            const progress = ((totalXP - belts[currentIdx].min) / (next.min - belts[currentIdx].min || 1)) * 100;
            
            document.getElementById('xpBar').style.width = `${Math.min(progress, 100)}%`;
            document.getElementById('xpDisplay').textContent = `${totalXP} / ${next.min}`;
            
            document.querySelectorAll('.belt-node').forEach((node, i) => {
                const circle = node.querySelector('.belt-circle');
                circle.className = 'belt-circle';
                if(i < currentIdx) circle.classList.add('done');
                if(i === currentIdx) circle.classList.add('active');
            });
        }

        renderGrids();
        renderBadges();
        updateUI();
    </script>
</body>
</html>
