<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Progress Tracker – Elite Defense Dojo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#141414;
    --red:#E50914;
    --gold:#facc15;
}

body {background:var(--bg);color:#fff;font-family:'Rajdhani';margin:0;}
.shell {max-width:500px;margin:auto;padding:20px 16px 120px;}

.header {display:flex;justify-content:space-between;margin-bottom:20px;}
.btn-back {color:#fff;text-decoration:none;font-weight:700;}

.belt-section {background:#1f1f1f;padding:15px;border-radius:8px;margin-bottom:25px;border-bottom:3px solid var(--gold);}
.belt-track {display:flex;justify-content:space-between;}
.belt-circle {width:30px;height:30px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;}
.active .belt-circle {border-color:var(--gold);box-shadow:0 0 10px var(--gold);}

.stats-row {display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:25px;}
.stat-card {background:#1f1f1f;padding:10px;text-align:center;}
.stat-val {color:var(--gold);font-family:'Orbitron';}

.video-grid {display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.video-card {background:#1f1f1f;border-radius:4px;overflow:hidden;position:relative;}
.video-card.completed {box-shadow:0 0 10px var(--gold);}
.card-img {width:100%;height:100%;opacity:.7;}

.flag-box {position:absolute;top:5px;right:5px;display:flex;gap:5px;}
.flag-btn {background:#0008;color:#fff;border:none;padding:2px 5px;}
.flag-btn.active {background:var(--red);}

.modal {position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;}
.modal.open {display:flex;}
iframe {width:100%;height:250px;border:none;}

.reward {
position:fixed;inset:0;display:none;
background:#000d;align-items:center;justify-content:center;
font-family:'Orbitron';flex-direction:column;
}
</style>
</head>

<body>

<div class="shell">

<header class="header">
<a href="#" class="btn-back">✕ CLOSE</a>
<div style="color:var(--red);font-family:Orbitron">DOJO STREAM</div>
</header>

<div class="belt-section">
<div class="belt-track" id="beltTrack"></div>
<div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--gold)">
<span id="progressText">PROGRESS</span>
<span id="xpValue">0 XP</span>
</div>
</div>

<div class="stats-row">
<div class="stat-card"><span class="stat-val" id="statVids">0</span><br>Videos</div>
<div class="stat-card"><span class="stat-val" id="statXP">0</span><br>XP</div>
<div class="stat-card"><span class="stat-val" id="statStreak">1</span><br>Streak</div>
</div>

<h3 id="libraryTitle">Training Library</h3>
<div class="video-grid" id="grid"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div style="background:#181818;padding:10px;">
<iframe id="player"></iframe>
<button onclick="complete()">COMPLETE</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- REWARD -->
<div class="reward" id="reward">
<div style="font-size:2rem;color:#facc15">+XP</div>
<div id="rewardText"></div>
</div>

<script>

let lang = localStorage.getItem('lang') || 'en';
let done = JSON.parse(localStorage.getItem('done')||'[]');
let xp = parseInt(localStorage.getItem('xp')||'0');
let current=null;

const translations = {
en:{lib:"Training Library",prog:"PROGRESS",done:"COMPLETED ✓"},
gr:{lib:"Βιβλιοθήκη",prog:"ΠΡΟΟΔΟΣ",done:"ΟΛΟΚΛΗΡΩΘΗΚΕ ✓"}
};

const videos = [
{id:1,xp:50,links:{en:"1ZCMq052vmFF1yEPfNkTEdyQgcouK2SJt",gr:"1Fslem8kIbjTcYhOBsnPx7qt1n8cBHSQI"}},
{id:2,xp:50,links:{en:"1EHZzH4ye46Zv6PFCBHUc9SGbRivtwIsl",gr:"1eiNMQ7wemQhfChLyYhIRbL29Btk0YpLo"}},
{id:3,xp:60,links:{en:"1Gw01IyW8bQPzC5lhQAOXmauhfP6kOKUi",gr:"1r0asELekaTfN3ijRr-IWG6RK7zwWEtmv"}},
{id:4,xp:50,links:{en:"1frv_G2vUTpssDva7fYPrVgipdxyDYGd1",gr:"1k5wZeYbY-YvVINi-IaYNzhQf41s10V5I"}},
{id:5,xp:70,links:{en:"1Kci4vsm-vev74IgA-8Nl0bX_N1OuETxG",gr:"1nCvJ1WxHi6Jmnhs5V7u2g_VlFeEe5T7l"}},
{id:6,xp:80,links:{en:"1fy8fmRHvVWGH6tMT4d5siJfOKabBeUdk",gr:"1_EPPWWGSeq5z5VMld2GWBGvUQ3-WcjxD"}}
];

function init(){
document.getElementById('libraryTitle').textContent=translations[lang].lib;
document.getElementById('progressText').textContent=translations[lang].prog;
render();
update();
}

function render(){
const g=document.getElementById('grid');

g.innerHTML=videos.map(v=>{
const isDone=done.includes(v.id);

return `
<div class="video-card ${isDone?'completed':''}">
<div class="flag-box">
<button class="flag-btn ${lang==='en'?'active':''}" onclick="setLang('en',${v.id})">EN</button>
<button class="flag-btn ${lang==='gr'?'active':''}" onclick="setLang('gr',${v.id})">GR</button>
</div>

<div onclick="openVideo(${v.id})">
<img class="card-img" src="https://images.unsplash.com/photo-1555597673-b21d5c935865?w=400">
<div style="position:absolute;bottom:5px;left:5px;font-size:.7rem;">
${isDone?translations[lang].done:`+${v.xp} XP`}
</div>
</div>
</div>
`;
}).join('');
}

function setLang(l,id){
lang=l;
localStorage.setItem('lang',l);
init();
openVideo(id);
}

function openVideo(id){
const v=videos.find(x=>x.id===id);
current=v;
document.getElementById('player').src=
`https://drive.google.com/file/d/${v.links[lang]}/preview?autoplay=1`;
document.getElementById('modal').classList.add('open');
}

function closeModal(){
document.getElementById('modal').classList.remove('open');
document.getElementById('player').src="";
}

function complete(){
if(current && !done.includes(current.id)){
done.push(current.id);
xp+=current.xp;

localStorage.setItem('done',JSON.stringify(done));
localStorage.setItem('xp',xp);

reward(current.xp);
update();
render();
}
closeModal();
}

function reward(val){
const r=document.getElementById('reward');
document.getElementById('rewardText').textContent="+"+val+" XP";

r.style.display="flex";
new Audio("https://www.myinstants.com/media/sounds/coin.mp3").play();

setTimeout(()=>r.style.display="none",2000);
}

function update(){
document.getElementById('statVids').textContent=done.length;
document.getElementById('statXP').textContent=xp;
document.getElementById('xpValue').textContent=xp+" XP";
}

init();

</script>

</body>
</html>
