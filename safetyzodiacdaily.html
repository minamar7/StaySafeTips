<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Zodiac Daily - Stay Safe Elite</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-4545564564564564" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --blue: #4facfe; --gold: #c5a059; --bg: #000000; --card-bg: rgba(20, 27, 38, 0.75); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 450px; }
        
        .header { text-align: center; padding: 20px 0; }
        .logo-text { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .logo-text span { color: var(--blue); }
        .tagline { color: var(--gold); font-size: 10px; font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }

        /* ADMOB CONTAINERS */
        .ad-container { width: 100%; display: flex; justify-content: center; margin: 15px 0; min-height: 50px; border-radius: 12px; background: rgba(255,255,255,0.03); overflow: hidden; }

        .zodiac-selector { display: flex; overflow-x: auto; gap: 12px; padding: 20px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .zodiac-selector::-webkit-scrollbar { display: none; }
        .zodiac-item { flex: 0 0 auto; text-align: center; padding: 15px 10px; border: 1px solid #1a222d; border-radius: 20px; min-width: 70px; background: #0d121a; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .zodiac-item.active { border-color: var(--gold); background: rgba(197, 160, 89, 0.15); transform: translateY(-5px) scale(1.05); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2); }
        .zodiac-item .icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .zodiac-item .name { font-size: 10px; text-transform: uppercase; color: #777; font-weight: bold; }
        .zodiac-item.active .name { color: var(--blue); }

        .zodiac-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3); 
            border-radius: 30px; padding: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; 
            min-height: 250px; transition: 0.5s;
        }
        .share-btn { position: absolute; top: 20px; right: 20px; background: rgba(79, 172, 254, 0.2); border: none; border-radius: 50%; width: 45px; height: 45px; color: var(--blue); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .meter-container { margin: 20px 0 10px 0; }
        .meter-bar { width: 100%; height: 6px; background: #1a222d; border-radius: 10px; overflow: hidden; }
        .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--blue)); transition: width 1.5s ease-in-out; }
        
        .forecast { font-size: 16px; line-height: 1.7; color: #efefef; font-style: italic; margin: 20px 0; opacity: 0; transition: 0.5s; }
        .forecast.visible { opacity: 1; }
        .protocol { background: rgba(79, 172, 254, 0.1); border-radius: 15px; padding: 15px; border-left: 4px solid var(--blue); }
        
        .btn-elite { background: linear-gradient(45deg, #4facfe, #00f2fe); color: #000; border: none; width: 100%; padding: 20px; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 25px; box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4); transition: 0.3s; }
        .btn-elite:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-app-pub-4545564564564564"
             data-ad-slot="4546456456"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="header">
        <h1 class="logo-text">SAFETY <span>ZODIAC</span></h1>
        <p id="ui-tagline" class="tagline">Loading Intelligence...</p>
    </div>

    <div class="zodiac-selector" id="selector"></div>

    <div class="zodiac-card" id="card">
        <button class="share-btn" onclick="shareZodiac()" title="Share Protection">✈</button>
        <h2 id="z-name" style="color: var(--blue); margin:0; text-transform: uppercase; letter-spacing: 1px;">Elite Protection</h2>
        
        <div class="meter-container">
            <div class="meter-bar"><div id="meter-fill" class="meter-fill"></div></div>
            <div style="display:flex; justify-content: space-between; font-size: 9px; color: var(--gold); margin-top: 5px; font-weight: bold;">
                <span>SECURITY INDEX</span><span id="meter-val">0%</span>
            </div>
        </div>

        <p id="z-forecast" class="forecast">Select your sign to decrypt your daily security protocol.</p>
        
        <div class="protocol">
            <span id="ui-protocol-lbl" style="color: var(--blue); font-size: 10px; font-weight: bold; text-transform: uppercase;">Protocol</span>
            <p id="z-protocol" style="font-size:14px; margin:5px 0 0 0; color: #fff; font-weight: 500;">Awaiting Data...</p>
        </div>
    </div>

    <div class="ad-container" style="min-height: 100px;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-fb+5w+4e-db+86"
             data-ad-client="ca-app-pub-4545564564564564"
             data-ad-slot="456456456"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <button id="ui-btn" class="btn-elite" onclick="celebrate()">Start Training</button>
    <footer style="text-align:center; padding: 30px 0; opacity: 0.4; font-size: 8px;">STAY SAFE ELITE © 2026</footer>
</div>

<script>
    const VERCEL_URL = "https://your-vercel-project.vercel.app/api/safety_zodiac_daily";

    const userLang = (navigator.language || navigator.userLanguage).split('-')[0];
    const translations = {
        en: { tagline: "Daily Threat Intelligence", protocol: "Security Protocol", btn: "Start Elite Training", shareMsg: "My Daily Safety Zodiac! 🛡️", signs: ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"] },
        el: { tagline: "Ημερήσια Ανάλυση Απειλών", protocol: "Πρωτόκολλο Ασφαλείας", btn: "Έναρξη Elite Εκπαίδευσης", shareMsg: "Το Ζώδιο Ασφαλείας μου! 🛡️", signs: ["Κριός", "Ταύρος", "Δίδυμοι", "Καρκίνος", "Λέων", "Παρθένος", "Ζυγός", "Σκορπιός", "Τοξότης", "Αιγόκερως", "Υδροχόος", "Ιχθύες"] }
    };

    const ui = translations[userLang] || translations.en;
    document.getElementById('ui-tagline').innerText = ui.tagline;
    document.getElementById('ui-btn').innerText = ui.btn;

    const zodiacIcons = ["♈", "♉", "♊", "♋", "♌", "♍", "♎", "♏", "♐", "♑", "♒", "♓"];
    const selector = document.getElementById('selector');

    zodiacIcons.forEach((icon, i) => {
        const div = document.createElement('div');
        div.className = 'zodiac-item';
        div.innerHTML = `<span class="icon">${icon}</span><span class="name">${ui.signs[i]}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            fetchZodiacData(i);
        };
        selector.appendChild(div);
    });

    async function fetchZodiacData(index) {
        const forecastEl = document.getElementById('z-forecast');
        forecastEl.classList.remove('visible');
        document.getElementById('meter-fill').style.width = '0%';
        document.getElementById('meter-val').innerText = '0%';

        try {
            // Εδώ θα γίνει το πραγματικό fetch όταν το Vercel URL είναι έτοιμο
            // const response = await fetch(`${VERCEL_URL}?sign=${ui.signs[index]}&lang=${userLang}`);
            // const data = await response.json();

            setTimeout(() => {
                const randomSecure = Math.floor(Math.random() * (99 - 72 + 1) + 72);
                document.getElementById('z-name').innerText = ui.signs[index];
                forecastEl.innerText = "The digital stars align for " + ui.signs[index] + ". Your firewall is your shield today. Watch for encrypted anomalies in your incoming data.";
                document.getElementById('z-protocol').innerText = "Execute Stealth Protocol Alpha.";
                
                document.getElementById('meter-fill').style.width = randomSecure + '%';
                document.getElementById('meter-val').innerText = randomSecure + '%';
                forecastEl.classList.add('visible');
            }, 400);

        } catch (error) {
            forecastEl.innerText = "Sync Error. Please check your secure connection.";
        }
    }

    function celebrate() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#4facfe', '#c5a059', '#ffffff'] });
    }

    function shareZodiac() {
        const name = document.getElementById('z-name').innerText;
        const forecast = document.getElementById('z-forecast').innerText;
        const index = document.getElementById('meter-val').innerText;
        const text = `${ui.shareMsg}\n\n✨ ${name} (Safety Index: ${index})\n🛡️ ${forecast}\n\nStay Safe Elite App 2026`;
        
        if (navigator.share) {
            navigator.share({ title: 'Safety Zodiac', text: text });
        } else {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    }
</script>
</body>
</html>
