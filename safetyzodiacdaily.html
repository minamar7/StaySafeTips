    <style>
        :root {
            --gold: #c5a059;
            --gold-dim: rgba(197,160,89,0.18);
            --blue: #4facfe;
            --blue-dim: rgba(79,172,254,0.12);
            --cyan: #00f2fe;
            --bg: #04080f;
            --surface: rgba(10, 18, 30, 0.85);
            --border: rgba(197, 160, 89, 0.2);
            --text: #dce8f5;
            --text-dim: rgba(220,232,245,0.45);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated starfield bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,172,254,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 90% 110%, rgba(197,160,89,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
        }

        @keyframes twinkle {
            0%   { opacity: 0.05; transform: scale(0.8); }
            100% { opacity: 0.7;  transform: scale(1.2); }
        }

        /* Scan line overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.08) 3px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 460px;
            margin: 0 auto;
            padding: 20px 16px 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 24px 0 10px;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: clamp(18px, 6vw, 26px);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            line-height: 1;
        }

        .logo em {
            font-style: normal;
            color: var(--blue);
            text-shadow: 0 0 18px rgba(79,172,254,0.6);
        }

        .tagline {
            font-size: 9px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.85;
        }

        .date-stamp {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* ── SELECTOR ── */
        .selector-wrap {
            background: rgba(6,12,22,0.9);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .selector-wrap::-webkit-scrollbar { display: none; }

        .selector {
            display: flex;
            gap: 8px;
            width: max-content;
        }

        .z-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 8px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            min-width: 58px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            -webkit-tap-highlight-color: transparent;
        }

        .z-item:hover {
            border-color: rgba(197,160,89,0.4);
            background: var(--gold-dim);
            transform: translateY(-3px);
        }

        .z-item.active {
            border-color: var(--gold);
            background: var(--gold-dim);
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(197,160,89,0.2), 0 0 0 1px var(--gold) inset;
        }

        .z-icon {
            font-size: 20px;
            line-height: 1;
        }

        .z-label {
            font-size: 7px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            text-align: center;
            font-family: 'Space Mono', monospace;
        }

        .z-item.active .z-label { color: var(--gold); }

        /* ── AD SLOT ── */
        .ad-slot {
            width: 100%;
            min-height: 60px;
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.06);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── MAIN CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 26px 22px 22px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        /* Corner accents */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.3;
        }
        .card::before { top: 14px; left: 14px; border-width: 2px 0 0 2px; border-radius: 8px 0 0 0; }
        .card::after  { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; border-radius: 0 0 8px 0; }

        /* glow behind card */
        .card-glow {
            position: absolute;
            inset: -40px;
            background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(79,172,254,0.06), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.8s;
        }

        .card-inner { position: relative; z-index: 1; }

        /* share */
        .share-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            background: var(--blue-dim);
            border: 1px solid rgba(79,172,254,0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: var(--blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.25s;
            z-index: 2;
        }
        .share-btn:hover { background: rgba(79,172,254,0.25); transform: scale(1.1); }

        /* sign name */
        .sign-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .sign-icon-big {
            font-size: 36px;
            line-height: 1;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

        .sign-icon-big.visible { opacity: 1; transform: scale(1); }

        .sign-name {
            font-family: 'Orbitron', monospace;
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 700;
            color: var(--blue);
            text-shadow: 0 0 20px rgba(79,172,254,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Planetary context */
        .planetary-band {
            display: none;
            font-size: 9px;
            color: var(--gold);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px dashed rgba(197,160,89,0.25);
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 14px;
            line-height: 1.6;
            font-style: italic;
        }

        /* Security meter */
        .meter-section {
            margin-bottom: 16px;
        }

        .meter-labels {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: var(--gold);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .meter-track {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .meter-track::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10%,
                rgba(0,0,0,0.15) 10%,
                rgba(0,0,0,0.15) 11%
            );
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--blue), var(--cyan));
            border-radius: 10px;
            transition: width 1.8s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            box-shadow: 0 0 12px rgba(79,172,254,0.5);
        }

        /* dot indicator */
        .meter-dot {
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px var(--cyan);
        }

        /* Forecast */
        .forecast-text {
            font-size: 15px;
            line-height: 1.75;
            color: var(--text);
            font-style: italic;
            min-height: 60px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.6s, transform 0.6s;
        }

        .forecast-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Protocol block */
        .protocol-block {
            margin-top: 16px;
            padding: 12px 16px;
            background: var(--blue-dim);
            border: 1px solid rgba(79,172,254,0.2);
            border-left: 3px solid var(--blue);
            border-radius: 0 12px 12px 0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .protocol-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .protocol-content {}

        .protocol-label {
            font-size: 8px;
            color: var(--blue);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .protocol-text {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        /* Loading skeleton */
        @keyframes shimmer {
            0%   { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.6s infinite linear;
            border-radius: 6px;
            height: 14px;
            margin-bottom: 8px;
        }

        /* ── ACTION BUTTON ── */
        .btn-main {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #0a1628, #0d1f3c);
            border: 1px solid var(--blue);
            color: var(--blue);
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(79,172,254,0.15), rgba(0,242,254,0.08));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-main:hover {
            box-shadow: 0 0 30px rgba(79,172,254,0.3), 0 0 0 1px rgba(79,172,254,0.4);
            color: var(--cyan);
        }
        .btn-main:hover::before { opacity: 1; }
        .btn-main:active { transform: scale(0.98); }

        /* ── LANG PICKER ── */
        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
        }

        .lang-btn:hover { border-color: rgba(197,160,89,0.4); color: var(--gold); }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

        /* Footer */
        footer {
            text-align: center;
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 2px;
            padding-top: 10px;
        }

        /* Pulse animation for active sign */
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(197,160,89,0.4); }
            70%  { box-shadow: 0 0 0 10px rgba(197,160,89,0); }
            100% { box-shadow: 0 0 0 0 rgba(197,160,89,0); }
        }
        .z-item.active { animation: pulse-ring 2s infinite; }
    </style>
</head>

    const langNames = { en: "EN 🇬🇧", el: "EL 🇬🇷", es: "ES 🇪🇸", de: "DE 🇩🇪", fr: "FR 🇫🇷", it: "IT 🇮🇹" };

    const urlParams = new URLSearchParams(window.location.search);

        if (activeSignIndex < 0) {
            document.getElementById('z-forecast').innerText = ui.placeholder;
            document.getElementById('z-protocol').innerText = ui.waiting;
        }
    }

    // ── SELECTOR ──
    function buildSelector() {
        const sel = document.getElementById('selector');
        sel.innerHTML = '';
        zodiacIcons.forEach((icon, i) => {
            const div = document.createElement('div');
            div.className = 'z-item' + (i === activeSignIndex ? ' active' : '');
            div.innerHTML = `<span class="z-icon">${icon}</span><span class="z-label">${ui.signs[i]}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.z-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                activeSignIndex = i;
                fetchZodiacData(i);
            };
            sel.appendChild(div);
        });
    }

    // ── FETCH ──
    async function fetchZodiacData(index) {
        const forecastEl = document.getElementById('z-forecast');
        const protocolEl = document.getElementById('z-protocol');
        const nameEl     = document.getElementById('z-name');
        const iconEl     = document.getElementById('z-icon');
        const band       = document.getElementById('planetary-band');

        forecastEl.classList.remove('visible');
        iconEl.classList.remove('visible');
        forecastEl.innerText = ui.decrypting;
        protocolEl.innerText = ui.waiting;
        nameEl.innerText = ui.signs[index];
        document.getElementById('meter-fill').style.width = '0%';
        document.getElementById('meter-val').innerText = '—';
        band.style.display = 'none';

        // show skeleton
        iconEl.textContent = zodiacIcons[index];
        setTimeout(() => iconEl.classList.add('visible'), 80);

        try {
            const resp = await fetch(`${API_ENDPOINT}?sign=${signsEng[index]}&lang=${userLang}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            if (data.planetary_context) {
                band.innerText = '🌌 ' + data.planetary_context;
                band.style.display = 'block';
            }

            forecastEl.innerText = data.forecast || '—';
            protocolEl.innerText = data.protocol || '—';

            const idx = data.security_index || 75;
            document.getElementById('meter-fill').style.width = idx + '%';
            document.getElementById('meter-val').innerText = idx + '%';

            // colour glow by index
            const hue = idx > 80 ? 'rgba(0,242,254,0.08)' : idx > 65 ? 'rgba(79,172,254,0.08)' : 'rgba(197,160,89,0.08)';
            document.getElementById('card-glow').style.background =
                `radial-gradient(ellipse 60% 40% at 50% 50%, ${hue}, transparent 70%)`;

            setTimeout(() => forecastEl.classList.add('visible'), 100);

        } catch (err) {
            forecastEl.innerText = "⚠️ Sync error. Please retry.";
            forecastEl.classList.add('visible');
        }
    }

    // ── CONFETTI ──
    function celebrate() {
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.65 }, colors: ['#4facfe','#c5a059','#00f2fe','#ffffff'] });
    }

    // ── SHARE ──
    function shareZodiac() {
        const name = document.getElementById('z-name').innerText;
        const forecast = document.getElementById('z-forecast').innerText;
        const idx = document.getElementById('meter-val').innerText;
        const text = `🛡️ Stay Safe Elite — ${name}\nSecurity Index: ${idx}\n\n${forecast}\n\nhttps://stay-safe-tips.vercel.app`;
        if (navigator.share) {
            navigator.share({ title: 'Safety Zodiac Daily', text });
        } else {
            navigator.clipboard?.writeText(text).then(() => alert('Copied to clipboard!'));
        }
    }

    // ── INIT ──
    buildLangBar();
    applyUI();
    buildSelector();

    try {
        (adsbygoogle = window.adsbygoogle || []).push({});
    } catch(e) {}
</script>
</body>
</html>
