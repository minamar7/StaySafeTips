<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Zodiac Daily - Stay Safe Elite</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-4545564564564564" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --blue: #4facfe; --gold: #c5a059; --bg: #000000; --card-bg: rgba(20, 27, 38, 0.75); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 450px; }
        .header { text-align: center; padding: 20px 0; }
        .logo-text { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .logo-text span { color: var(--blue); }
        .tagline { color: var(--gold); font-size: 10px; font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .zodiac-selector { display: flex; overflow-x: auto; gap: 12px; padding: 20px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .zodiac-selector::-webkit-scrollbar { display: none; }
        .zodiac-item { flex: 0 0 auto; text-align: center; padding: 15px 10px; border: 1px solid #1a222d; border-radius: 20px; min-width: 70px; background: #0d121a; cursor: pointer; transition: 0.4s; }
        .zodiac-item.active { border-color: var(--gold); background: rgba(197, 160, 89, 0.15); transform: translateY(-5px); }
        .zodiac-item .icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .zodiac-item .name { font-size: 10px; text-transform: uppercase; color: #777; font-weight: bold; }
        .zodiac-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 30px; padding: 25px; position: relative; min-height: 250px; }
        .meter-bar { width: 100%; height: 6px; background: #1a222d; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--blue)); transition: width 1.5s ease-in-out; }
        .forecast { font-size: 16px; line-height: 1.7; color: #efefef; font-style: italic; margin: 20px 0; opacity: 0; transition: 0.5s; }
        .forecast.visible { opacity: 1; }
        .protocol { background: rgba(79, 172, 254, 0.1); border-radius: 15px; padding: 15px; border-left: 4px solid var(--blue); }
        .btn-elite { background: linear-gradient(45deg, #4facfe, #00f2fe); color: #000; border: none; width: 100%; padding: 20px; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="logo-text">SAFETY <span>ZODIAC</span></h1>
        <p id="ui-tagline" class="tagline">Loading Intelligence...</p>
    </div>

    <div class="zodiac-selector" id="selector"></div>

    <div class="zodiac-card" id="card">
        <h2 id="z-name" style="color: var(--blue); margin:0; text-transform: uppercase;">Elite Protection</h2>
        <div class="meter-container">
            <div class="meter-bar"><div id="meter-fill" class="meter-fill"></div></div>
            <div style="display:flex; justify-content: space-between; font-size: 9px; color: var(--gold); margin-top: 5px; font-weight: bold;">
                <span>SECURITY INDEX</span><span id="meter-val">0%</span>
            </div>
        </div>
        <p id="z-forecast" class="forecast">Select your sign to decrypt your protocol.</p>
        <div class="protocol">
            <span id="ui-protocol-lbl" style="color: var(--blue); font-size: 10px; font-weight: bold; text-transform: uppercase;">Protocol</span>
            <p id="z-protocol" style="font-size:14px; margin:5px 0 0 0; color: #fff;">Awaiting Data...</p>
        </div>
    </div>

    <button id="ui-btn" class="btn-elite" onclick="celebrate()">Start Training</button>
</div>

<script>
    const API_ENDPOINT = "https://stay-safe-tips.vercel.app/api/safety_zodiac_daily";

    // ΑΥΤΟΜΑΤΟΣ ΕΝΤΟΠΙΣΜΟΣ ΓΛΩΣΣΑΣ ΑΠΟ ΤΟ APP
    const urlParams = new URLSearchParams(window.location.search);
    const userLang = urlParams.get('lang') || navigator.language.split('-')[0] || 'en';

    const translations = {
        en: { tagline: "Daily Threat Intelligence", protocol: "Security Protocol", btn: "Start Elite Training", decrypting: "Decrypting System...", signs: ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"], signsEng: ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"] },
        el: { tagline: "Ημερήσια Ανάλυση Απειλών", protocol: "Πρωτόκολλο Ασφαλείας", btn: "Έναρξη Elite Εκπαίδευσης", decrypting: "Αποκρυπτογράφηση...", signs: ["Κριός", "Ταύρος", "Δίδυμοι", "Καρκίνος", "Λέων", "Παρθένος", "Ζυγός", "Σκορπιός", "Τοξότης", "Αιγόκερως", "Υδροχόος", "Ιχθύες"], signsEng: ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"] }
    };

    const ui = translations[userLang] || translations.en;
    document.getElementById('ui-tagline').innerText = ui.tagline;
    document.getElementById('ui-btn').innerText = ui.btn;
    document.getElementById('ui-protocol-lbl').innerText = ui.protocol;

    const zodiacIcons = ["♈", "♉", "♊", "♋", "♌", "♍", "♎", "♏", "♐", "♑", "♒", "♓"];
    const selector = document.getElementById('selector');

    zodiacIcons.forEach((icon, i) => {
        const div = document.createElement('div');
        div.className = 'zodiac-item';
        div.innerHTML = `<span class="icon">${icon}</span><span class="name">${ui.signs[i]}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            fetchZodiacData(i);
        };
        selector.appendChild(div);
    });

    async function fetchZodiacData(index) {
        const forecastEl = document.getElementById('z-forecast');
        forecastEl.classList.remove('visible');
        document.getElementById('z-protocol').innerText = ui.decrypting;

        try {
            const response = await fetch(`${API_ENDPOINT}?sign=${ui.signsEng[index]}&lang=${userLang}`);
            const data = await response.json();

            document.getElementById('z-name').innerText = ui.signs[index];
            forecastEl.innerText = data.forecast;
            document.getElementById('z-protocol').innerText = data.protocol;
            document.getElementById('meter-fill').style.width = data.security_index + '%';
            document.getElementById('meter-val').innerText = data.security_index + '%';
            forecastEl.classList.add('visible');
        } catch (error) {
            forecastEl.innerText = "Error syncing with Vercel.";
        }
    }

    function celebrate() { confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } }); }
</script>
</body>
</html>
