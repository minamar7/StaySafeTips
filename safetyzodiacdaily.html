<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Zodiac Daily - Stay Safe Elite</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-4545564564564564" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --blue: #4facfe; --gold: #c5a059; --bg: #000000; --card-bg: rgba(20, 27, 38, 0.75); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 450px; }
        
        .header { text-align: center; padding: 20px 0; }
        .logo-text { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .logo-text span { color: var(--blue); }
        .tagline { color: var(--gold); font-size: 10px; font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }

        .zodiac-selector { display: flex; overflow-x: auto; gap: 12px; padding: 20px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .zodiac-selector::-webkit-scrollbar { display: none; }
        .zodiac-item { flex: 0 0 auto; text-align: center; padding: 15px 10px; border: 1px solid #1a222d; border-radius: 20px; min-width: 70px; background: #0d121a; cursor: pointer; transition: 0.4s; }
        .zodiac-item.active { border-color: var(--gold); background: rgba(197, 160, 89, 0.15); transform: translateY(-5px); }
        .zodiac-item .icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .zodiac-item .name { font-size: 10px; text-transform: uppercase; color: #777; font-weight: bold; }

        .zodiac-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3); 
            border-radius: 30px; padding: 25px; 
            min-height: 250px; position: relative;
        }
        .share-btn { position: absolute; top: 20px; right: 20px; background: rgba(79, 172, 254, 0.2); border: none; border-radius: 50%; width: 40px; height: 40px; color: var(--blue); cursor: pointer; }

        .meter-bar { width: 100%; height: 6px; background: #1a222d; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--blue)); transition: width 1.5s; }
        
        .forecast { font-size: 16px; line-height: 1.7; color: #efefef; font-style: italic; margin: 20px 0; opacity: 0; transition: 0.5s; }
        .forecast.visible { opacity: 1; }
        .protocol { background: rgba(79, 172, 254, 0.1); border-radius: 15px; padding: 15px; border-left: 4px solid var(--blue); }
        
        .btn-elite { background: linear-gradient(45deg, #4facfe, #00f2fe); color: #000; border: none; width: 100%; padding: 20px; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="logo-text">SAFETY <span>ZODIAC</span></h1>
        <p id="ui-tagline" class="tagline">Threat Intelligence Active</p>
    </div>

    <div class="zodiac-selector" id="selector"></div>

    <div class="zodiac-card" id="card">
        <button class="share-btn" onclick="shareZodiac()">✈</button>
        <h2 id="z-name" style="color: var(--blue); margin:0; text-transform: uppercase;">Elite Protection</h2>
        
        <div class="meter-container">
            <div class="meter-bar"><div id="meter-fill" class="meter-fill"></div></div>
            <div style="display:flex; justify-content: space-between; font-size: 9px; color: var(--gold); margin-top: 5px; font-weight: bold;">
                <span id="ui-index-lbl">SECURITY INDEX</span><span id="meter-val">0%</span>
            </div>
        </div>

        <p id="z-forecast" class="forecast">Select your sign to decrypt your protocol.</p>
        
        <div class="protocol">
            <span id="ui-protocol-lbl" style="color: var(--blue); font-size: 10px; font-weight: bold; text-transform: uppercase;">Protocol</span>
            <p id="z-protocol" style="font-size:14px; margin:5px 0 0 0; color: #fff;">Awaiting Data...</p>
        </div>
    </div>

    <button id="ui-btn" class="btn-elite" onclick="celebrate()">Start Training</button>
</div>

<script>
    const VERCEL_API = "https://stay-safe-tips-maria-s-projects-f1da5c4f.vercel.app/api/Safety_Zodiac_Daily";

    const urlParams = new URLSearchParams(window.location.search);
    const userLang = urlParams.get('lang') || 'en';

    const translations = {
        en: { tagline: "Daily Threat Intelligence", protocol: "Security Protocol", btn: "Start Elite Training", decrypting: "Decrypting System...", index: "SECURITY INDEX", signs: ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"] },
        el: { tagline: "Ημερήσια Ανάλυση Απειλών", protocol: "Πρωτόκολλο Ασφαλείας", btn: "Έναρξη Elite Εκπαίδευσης", decrypting: "Αποκρυπτογράφηση Συστήματος...", index: "ΔΕΙΚΤΗΣ ΑΣΦΑΛΕΙΑΣ", signs: ["Κριός", "Ταύρος", "Δίδυμοι", "Καρκίνος", "Λέων", "Παρθένος", "Ζυγός", "Σκορπιός", "Τοξότης", "Αιγόκερως", "Υδροχόος", "Ιχθύες"] },
        de: { tagline: "Tägliche Bedrohungsanalyse", protocol: "Sicherheitsprotokoll", btn: "Elite-Training Starten", decrypting: "Systementschlüsselung...", index: "SICHERHEITSINDEX", signs: ["Widder", "Stier", "Zwillinge", "Krebs", "Löwe", "Jungfrau", "Waage", "Skorpion", "Schütze", "Steinbock", "Wassermann", "Fische"] },
        fr: { tagline: "Intelligence Quotidienne", protocol: "Protocole de Sécurité", btn: "Démarrer l'Entraînement", decrypting: "Décryptage du Système...", index: "INDICE DE SÉCURITÉ", signs: ["Bélier", "Taureau", "Gémeaux", "Cancer", "Lion", "Vierge", "Balance", "Scorpion", "Sagittaire", "Capricorne", "Verseau", "Poissons"] },
        es: { tagline: "Inteligencia de Amenazas", protocol: "Protocolo de Seguridad", btn: "Iniciar Entrenamiento", decrypting: "Descifrando Sistema...", index: "ÍNDICE DE SEGURIDAD", signs: ["Aries", "Tauro", "Géminis", "Cáncer", "Leo", "Virgo", "Libra", "Escorpio", "Sagitario", "Capricornio", "Acuario", "Piscis"] },
        it: { tagline: "Intelligence Minacce", protocol: "Protocollo di Sicurezza", btn: "Inizia Addestramento", decrypting: "Decrittazione Sistema...", index: "INDICE DI SICUREZZA", signs: ["Ariete", "Toro", "Gemelli", "Cancro", "Leone", "Vergine", "Bilancia", "Scorpione", "Sagittario", "Capricorno", "Acquario", "Pesci"] },
        pt: { tagline: "Inteligência de Ameaças", protocol: "Protocolo de Segurança", btn: "Iniciar Treinamento", decrypting: "Descriptografando...", index: "ÍNDICE DE SEGURANÇA", signs: ["Áries", "Touro", "Gêmeos", "Câncer", "Leão", "Virgem", "Libra", "Escorpião", "Sagitário", "Capricórnio", "Aquário", "Peixes"] },
        ru: { tagline: "Анализ Угроз", protocol: "Протокол Безопасности", btn: "Начать Обучение", decrypting: "Расшифровка Системы...", index: "ИНДЕКС БЕЗОПАСНОСТИ", signs: ["Овен", "Телец", "Близнецы", "Рак", "Лев", "Дева", "Весы", "Скорпион", "Стрелец", "Козерог", "Водолей", "Рыбы"] },
        zh: { tagline: "每日威胁情报", protocol: "安全协议", btn: "开始精英训练", decrypting: "系统解密中...", index: "安全指数", signs: ["白羊座", "金牛座", "双子座", "巨蟹座", "狮子座", "处女座", "天秤座", "天蝎座", "射手座", "摩羯座", "水瓶座", "双鱼座"] },
        hi: { tagline: "दैनिक खतरा खुफिया", protocol: "सुरक्षा प्रोटोकॉल", btn: "एलीट ट्रेनिंग शुरू करें", decrypting: "डिक्रिप्टिंग सिस्टम...", index: "सुरक्षा सूचकांक", signs: ["मेष", "वृषभ", "मिथुन", "कर्क", "सिंह", "कन्या", "तुला", "वृश्चिक", "धनु", "मकर", "कुंभ", "मीन"] }
    };

    const signsEng = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
    const ui = translations[userLang] || translations.en;
    
    document.getElementById('ui-tagline').innerText = ui.tagline;
    document.getElementById('ui-btn').innerText = ui.btn;
    document.getElementById('ui-protocol-lbl').innerText = ui.protocol;
    document.getElementById('ui-index-lbl').innerText = ui.index;

    const zodiacIcons = ["♈", "♉", "♊", "♋", "♌", "♍", "♎", "♏", "♐", "♑", "♒", "♓"];
    const selector = document.getElementById('selector');

    zodiacIcons.forEach((icon, i) => {
        const div = document.createElement('div');
        div.className = 'zodiac-item';
        div.innerHTML = `<span class="icon">${icon}</span><span class="name">${ui.signs[i]}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            fetchZodiacData(i);
        };
        selector.appendChild(div);
    });

    async function fetchZodiacData(index) {
        const forecastEl = document.getElementById('z-forecast');
        forecastEl.classList.remove('visible');
        document.getElementById('z-protocol').innerText = ui.decrypting;
        document.getElementById('meter-fill').style.width = '0%';
        document.getElementById('meter-val').innerText = '0%';

        try {
            const response = await fetch(`${VERCEL_API}?sign=${signsEng[index]}&lang=${userLang}`);
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            document.getElementById('z-name').innerText = ui.signs[index];
            forecastEl.innerText = data.forecast;
            document.getElementById('z-protocol').innerText = data.protocol;
            
            const sIndex = data.security_index || 75;
            document.getElementById('meter-fill').style.width = sIndex + '%';
            document.getElementById('meter-val').innerText = sIndex + '%';
            
            forecastEl.classList.add('visible');
        } catch (e) {
            console.error("Fetch error:", e);
            forecastEl.innerText = "Error!";
            forecastEl.classList.add('visible');
        }
    }

    function celebrate() { confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } }); }
    function shareZodiac() {
        const text = `🛡️ Stay Safe Elite Zodiac: ${document.getElementById('z-name').innerText}\n${document.getElementById('z-forecast').innerText}`;
        if (navigator.share) navigator.share({ title: 'Safety Zodiac', text: text });
    }
</script>
</body>
</html>
