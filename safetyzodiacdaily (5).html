<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Zodiac Daily - Stay Safe Elite</title>

    <script>
    if (localStorage.getItem("premium_user") !== "true") {
      var _as = document.createElement("script");
      _as.async = true;
      _as.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4000056160039274";
      _as.crossOrigin = "anonymous";
      document.head.appendChild(_as);
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05080f;
            --bg2: #0b1120;
            --card: #0f1826;
            --card2: #141e30;
            --border: rgba(255,255,255,0.07);
            --border-gold: rgba(250,204,21,0.25);
            --border-cyan: rgba(56,189,248,0.2);
            --gold: #facc15;
            --gold2: #fde68a;
            --cyan: #38bdf8;
            --cyan2: #7dd3fc;
            --text: #f0f4ff;
            --muted: #64748b;
            --success: #4ade80;
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background:
                radial-gradient(ellipse at top right, rgba(56,189,248,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(250,204,21,0.06) 0%, transparent 50%),
                var(--bg);
            padding: 0 0 80px;
        }

        /* HEADER */
        .header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; gap: 12px;
            padding: env(safe-area-inset-top, 44px) 18px 14px;
            background: rgba(5,8,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .back-btn {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--cyan); border-radius: 10px;
            padding: 7px 13px; font-size: 0.78rem;
            font-weight: 700; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1.5px;
            text-decoration: none;
        }
        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .header-title span { color: var(--cyan); }

        /* HERO */
        .hero {
            text-align: center;
            padding: 28px 20px 20px;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(56,189,248,0.08);
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 30px; padding: 5px 14px;
            font-size: 0.6rem; font-weight: 700;
            color: var(--cyan); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 12px;
        }
        .hero-icon {
            font-size: 56px; display: block; margin-bottom: 10px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(250,204,21,0.3));
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .hero-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            color: var(--gold); letter-spacing: 1px;
            line-height: 1.1; margin-bottom: 6px;
        }
        .hero-sub { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.5px; }

        /* AD */
        .ad-wrap {
            display: none; justify-content: center;
            margin: 12px 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 8px; min-height: 66px;
        }

        /* ZODIAC SELECTOR */
        .selector-label {
            font-size: 0.6rem; font-weight: 700; letter-spacing: 2.5px;
            color: var(--cyan); text-transform: uppercase;
            padding: 0 18px; margin-bottom: 10px; display: block;
        }
        .zodiac-selector {
            display: flex; overflow-x: auto; gap: 10px;
            padding: 4px 18px 16px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .zodiac-selector::-webkit-scrollbar { display: none; }
        .zodiac-item {
            flex: 0 0 auto; text-align: center;
            padding: 12px 8px; border: 1px solid var(--border);
            border-radius: 16px; min-width: 62px;
            background: var(--card); cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .zodiac-item.active {
            border-color: var(--gold);
            background: rgba(250,204,21,0.08);
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 8px 20px rgba(250,204,21,0.15);
        }
        .zodiac-item .zicon { font-size: 22px; display: block; margin-bottom: 4px; }
        .zodiac-item .zname { font-size: 9px; text-transform: uppercase; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; }
        .zodiac-item.active .zname { color: var(--gold); }

        /* MAIN CARD */
        .main-card {
            margin: 0 18px;
            background: linear-gradient(145deg, var(--card), var(--card2));
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* CARD TOP BAR */
        .card-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px 14px;
            border-bottom: 1px solid var(--border);
        }
        .sign-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem; font-weight: 700;
            color: var(--text); letter-spacing: 1px;
            text-transform: uppercase;
        }
        .share-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(56,189,248,0.1);
            border: 1px solid var(--border-cyan);
            color: var(--cyan); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }

        /* METER */
        .meter-section { padding: 14px 18px 10px; }
        .meter-top {
            display: flex; justify-content: space-between;
            font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px;
            color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
        }
        .meter-val { color: var(--cyan); }
        .meter-track {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px; overflow: hidden;
        }
        .meter-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--cyan), var(--gold));
            border-radius: 99px;
            transition: width 1.5s cubic-bezier(0.22,1,0.36,1);
        }

        /* LOADING */
        .loading-box {
            display: none; text-align: center;
            padding: 30px 20px;
        }
        .spinner {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid rgba(56,189,248,0.15);
            border-top-color: var(--cyan);
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-msg {
            font-size: 0.7rem; color: var(--gold);
            letter-spacing: 2px; text-transform: uppercase;
            font-weight: 700;
        }

        /* FORECAST */
        .forecast-section { padding: 4px 18px 16px; }
        .forecast-text {
            font-size: 0.95rem; line-height: 1.7;
            color: #cbd5e1; font-style: italic;
            opacity: 0; transition: opacity 0.5s;
        }
        .forecast-text.visible { opacity: 1; }
        .placeholder-text {
            font-size: 0.85rem; color: var(--muted);
            text-align: center; padding: 20px 0;
            line-height: 1.6;
        }

        /* PROTOCOL */
        .protocol-section {
            margin: 0 18px 14px;
            background: rgba(56,189,248,0.05);
            border: 1px solid var(--border-cyan);
            border-left: 3px solid var(--cyan);
            border-radius: 14px; padding: 14px 16px;
        }
        .protocol-label {
            font-size: 0.6rem; font-weight: 700; letter-spacing: 2px;
            color: var(--cyan); text-transform: uppercase; margin-bottom: 6px;
        }
        .protocol-text {
            font-size: 0.88rem; color: var(--text); font-weight: 500;
            line-height: 1.5;
        }

        /* BOTTOM AD */
        .ad-wrap-bottom {
            display: none; justify-content: center;
            margin: 16px 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 8px; min-height: 100px;
        }

        /* BUTTONS */
        .btn-celebrate {
            display: block; margin: 0 18px;
            background: linear-gradient(135deg, var(--cyan), #0ea5e9);
            color: #05080f; border: none; border-radius: 18px;
            padding: 17px; font-size: 0.9rem; font-weight: 700;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 20px rgba(56,189,248,0.2);
            transition: transform 0.1s;
        }
        .btn-celebrate:active { transform: scale(0.98); }

        .btn-back {
            display: block; margin: 12px 18px 0;
            background: transparent;
            border: 1px solid var(--border-cyan);
            color: var(--cyan); border-radius: 18px;
            padding: 15px; font-size: 0.85rem; font-weight: 700;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer;
            transition: background 0.15s;
            text-align: center; text-decoration: none;
        }
        .btn-back:active { background: rgba(56,189,248,0.08); }

        .footer {
            text-align: center; padding: 24px 0 8px;
            font-size: 0.65rem; color: rgba(255,255,255,0.15);
            letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header class="header">
    <a class="back-btn" href="index.html">← BACK</a>
    <span class="header-title">SAFETY <span>ZODIAC</span></span>
</header>

<section class="hero">
    <div class="hero-badge">✦ Daily Intelligence</div>
    <span class="hero-icon">🛡️⭐</span>
    <h1 class="hero-title">SAFETY ZODIAC</h1>
    <p class="hero-sub" id="ui-tagline">Loading Intelligence...</p>
</section>

<div class="ad-wrap" id="ad-top" data-ad-wrap>
    <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px"
        data-ad-client="ca-pub-4000056160039274"
        data-ad-slot="6359424861"></ins>
</div>

<span class="selector-label">Choose your sign</span>
<div class="zodiac-selector" id="selector"></div>

<div class="main-card">
    <div class="card-topbar">
        <span class="sign-name" id="z-name">Elite Protection</span>
        <button class="share-btn" onclick="shareZodiac()">✈</button>
    </div>

    <div class="meter-section">
        <div class="meter-top">
            <span>Security Index</span>
            <span class="meter-val" id="meter-val">0%</span>
        </div>
        <div class="meter-track">
            <div class="meter-fill" id="meter-fill"></div>
        </div>
    </div>

    <div class="loading-box" id="loading">
        <div class="spinner"></div>
        <div class="loading-msg" id="loading-text">Decrypting...</div>
    </div>

    <div class="forecast-section">
        <p id="z-forecast" class="forecast-text">
            <span class="placeholder-text">Select your sign to decrypt your daily security protocol.</span>
        </p>
    </div>
</div>

<div class="protocol-section" id="protocol-section">
    <div class="protocol-label" id="ui-protocol-lbl">Security Protocol</div>
    <p class="protocol-text" id="z-protocol">Awaiting Data...</p>
</div>

<div class="ad-wrap-bottom" id="ad-bottom" data-ad-wrap>
    <ins class="adsbygoogle" style="display:block; width:320px;"
        data-ad-format="fluid"
        data-ad-layout-key="-fb+5w+4e-db+86"
        data-ad-client="ca-pub-4000056160039274"
        data-ad-slot="6359424861"></ins>
</div>

<button class="btn-celebrate" id="ui-btn" onclick="celebrate()">Stars Aligned</button>
<a class="btn-back" href="index.html">← Back to Base</a>
<p class="footer">Stay Safe Elite © 2026</p>

<script>
    const VERCEL_URL = "https://stay-safe-tips.vercel.app/api/safety_zodiac_daily";
    const userLang = new URLSearchParams(window.location.search).get('lang') || (navigator.language || navigator.userLanguage).split('-')[0] || 'en';

    const translations = {
        en: {
            tagline: "Daily Threat Intelligence",
            protocol: "Security Protocol",
            btn: "Stars Aligned",
            decrypting: "Decrypting...",
            placeholder: "Select your sign to decrypt your daily security protocol.",
            signs: ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"]
        },
        el: {
            tagline: "Ημερήσια Ανάλυση Απειλών",
            protocol: "Πρωτόκολλο Ασφαλείας",
            btn: "Έναρξη Elite Εκπαίδευσης",
            decrypting: "Αποκρυπτογράφηση...",
            placeholder: "Επίλεξε το ζώδιό σου για να αποκρυπτογραφήσεις το ημερήσιο πρωτόκολλό σου.",
            signs: ["Κριός","Ταύρος","Δίδυμοι","Καρκίνος","Λέων","Παρθένος","Ζυγός","Σκορπιός","Τοξότης","Αιγόκερως","Υδροχόος","Ιχθύες"]
        },
        es: {
            tagline: "Inteligencia de Amenazas",
            protocol: "Protocolo de Seguridad",
            btn: "Iniciar Entrenamiento Elite",
            decrypting: "Descifrando...",
            placeholder: "Selecciona tu signo para descifrar tu protocolo diario.",
            signs: ["Aries","Tauro","Géminis","Cáncer","Leo","Virgo","Libra","Escorpio","Sagitario","Capricornio","Acuario","Piscis"]
        }
    };

    const ui = translations[userLang] || translations.en;
    document.getElementById('ui-tagline').innerText = ui.tagline;
    document.getElementById('ui-btn').innerText = ui.btn;
    document.getElementById('ui-protocol-lbl').innerText = ui.protocol;
    document.getElementById('loading-text').innerText = ui.decrypting;

    const zodiacIcons = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
    const signsEng = ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
    const selector = document.getElementById('selector');

    zodiacIcons.forEach((icon, i) => {
        const div = document.createElement('div');
        div.className = 'zodiac-item';
        div.innerHTML = `<span class="zicon">${icon}</span><span class="zname">${ui.signs[i]}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            fetchZodiacData(i);
        };
        selector.appendChild(div);
    });

    async function fetchZodiacData(index) {
        const forecastEl = document.getElementById('z-forecast');
        const loadingEl  = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');

        forecastEl.classList.remove('visible');
        forecastEl.style.display = 'none';
        loadingEl.style.display = 'block';
        document.getElementById('meter-fill').style.width = '0%';
        document.getElementById('meter-val').innerText = '0%';
        document.getElementById('z-name').innerText = ui.signs[index];
        document.getElementById('z-protocol').innerText = '...';

        const messages = [
            ui.decrypting,
            "Reading the stars...",
            "Analyzing security patterns...",
            "Almost ready..."
        ];
        let msgIdx = 0;
        loadingText.innerText = messages[0];
        const msgInterval = setInterval(() => {
            msgIdx = (msgIdx + 1) % messages.length;
            loadingText.innerText = messages[msgIdx];
        }, 2500);

        let fakeVal = 0;
        const meterInterval = setInterval(() => {
            fakeVal = Math.min(fakeVal + Math.random() * 8, 85);
            document.getElementById('meter-fill').style.width = fakeVal + '%';
        }, 600);

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000);

        try {
            const response = await fetch(`${VERCEL_URL}?sign=${signsEng[index]}&lang=${userLang}`, {
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            clearInterval(msgInterval);
            clearInterval(meterInterval);

            forecastEl.innerText = data.forecast || '—';
            document.getElementById('z-protocol').innerText = data.protocol || '—';

            const sIndex = data.security_index || 75;
            document.getElementById('meter-fill').style.width = sIndex + '%';
            document.getElementById('meter-val').innerText = sIndex + '%';

            loadingEl.style.display = 'none';
            forecastEl.style.display = 'block';
            setTimeout(() => forecastEl.classList.add('visible'), 50);

        } catch (error) {
            clearTimeout(timeoutId);
            clearInterval(msgInterval);
            clearInterval(meterInterval);
            loadingEl.style.display = 'none';
            forecastEl.style.display = 'block';
            forecastEl.innerText = error.name === 'AbortError'
                ? "⏱️ Taking too long. Please try again."
                : "⚠️ " + error.message;
            forecastEl.classList.add('visible');
            document.getElementById('meter-fill').style.width = '0%';
            document.getElementById('meter-val').innerText = '0%';
        }
    }

    function celebrate() {
        confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 }, colors: ['#38bdf8', '#facc15', '#ffffff'] });
    }

    function shareZodiac() {
        const name = document.getElementById('z-name').innerText;
        const index = document.getElementById('meter-val').innerText;
        const forecast = document.getElementById('z-forecast').innerText;
        const text = `🛡️ Stay Safe Elite Zodiac: ${name}\nIndex: ${index}\n\n${forecast}\n\nhttps://stay-safe-tips.vercel.app`;
        if (navigator.share) {
            navigator.share({ title: 'Safety Zodiac Daily', text });
        } else {
            navigator.clipboard?.writeText(text).then(() => alert('Copied!'));
        }
    }

    if (localStorage.getItem("premium_user") !== "true") {
        document.querySelectorAll('[data-ad-wrap]').forEach(el => {
            el.style.display = 'flex';
            (adsbygoogle = window.adsbygoogle || []).push({});
        });
    }
</script>
</body>
</html>
