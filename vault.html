<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Security Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --bg: #0b1120; /* Deep Navy από το screenshot */
            --gold: #facc15; 
            --accent: #38bdf8; 
            --card: rgba(30, 41, 59, 0.7); 
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
        }
        
        /* PIN Screen - Elite Style */
        .auth-overlay { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.5s ease-in-out; 
        }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { 
            width: 14px; height: 14px; border-radius: 50%; 
            border: 2px solid rgba(250, 204, 21, 0.3); 
            transition: 0.3s;
        }
        .dot.filled { 
            background: var(--gold); 
            box-shadow: 0 0 15px var(--gold); 
            border-color: var(--gold);
        }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .pin-btn { 
            width: 75px; height: 75px; border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: var(--glass); 
            color: #fff; font-size: 1.6rem; font-weight: 600; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .pin-btn:active { 
            background: var(--gold); 
            color: #000; 
            transform: scale(0.9);
            box-shadow: 0 0 20px var(--gold);
        }

        /* Main Content Container */
        .vault-container { 
            padding: 50px 25px; 
            height: 100vh; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; 
        }
        
        .back-btn { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent); padding: 8px 15px; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
        
        .vault-title {
            color: var(--gold); font-weight: 800; font-size: 0.9rem; 
            letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
        }

        /* Textarea Fix (Issue #4) & Style */
        textarea { 
            width: 100%; flex: 1; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            border-radius: 20px; 
            color: #e2e8f0; padding: 25px; 
            font-size: 1.05rem; line-height: 1.6; 
            resize: none; margin-bottom: 25px; outline: none;
            box-sizing: border-box; [span_1](start_span)[span_2](start_span)/*[span_1](end_span)[span_2](end_span) */
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); box-shadow: var(--glow); }
        
        /* Save Button Glow */
        .save-btn { 
            background: linear-gradient(135deg, #facc15 0%, #eab308 100%);
            color: #000; border: none; padding: 20px; border-radius: 18px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; 
            width: 100%; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.4);
            transition: 0.3s;
        }
        .save-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        p.desc { font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-overlay">
    <div style="font-size: 50px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--gold));">🔐</div>
    <h2 id="auth-title" style="letter-spacing: 2px; font-size: 1.2rem; margin-bottom: 30px;">ENTER MASTER PIN</h2>
    <div class="pin-dots" id="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="pin-grid">
        <div class="pin-btn" onclick="pressPin(1)">1</div><div class="pin-btn" onclick="pressPin(2)">2</div><div class="pin-btn" onclick="pressPin(3)">3</div>
        <div class="pin-btn" onclick="pressPin(4)">4</div><div class="pin-btn" onclick="pressPin(5)">5</div><div class="pin-btn" onclick="pressPin(6)">6</div>
        <div class="pin-btn" onclick="pressPin(7)">7</div><div class="pin-btn" onclick="pressPin(8)">8</div><div class="pin-btn" onclick="pressPin(9)">9</div>
        <div class="pin-btn" style="border:none; background:none; color: #64748b;" onclick="clearPin()">CLEAR</div>
        <div class="pin-btn" onclick="pressPin(0)">0</div>
        <div class="pin-btn" style="border:none; background:none; font-size: 0.8rem; color: var(--accent);">ELITE</div>
    </div>
</div>

<div class="vault-container">
    <header>
        <button class="back-btn" onclick="window.location.href='index.html'">← BACK</button>
        <div class="vault-title">Security Vault</div>
        <div style="width: 60px;"></div>
    </header>

    <p class="desc">Encrypted local storage for emergency contacts, recovery keys, and private security protocols.</p>
    
    <textarea id="vault-data" placeholder="Begin typing your secure data..."></textarea>
    
    <button class="save-btn" onclick="saveVault()">Encrypt & Lock Vault</button>
</div>

<script>
    // Logic remains functional as per original requirements
    let currentPin = "";
    const masterPin = localStorage.getItem('vault_pin');
    const isFirstTime = !masterPin;

    if (isFirstTime) {
        document.getElementById('auth-title').innerText = "SETUP MASTER PIN";
        document.getElementById('auth-title').style.color = "var(--accent)";
    }

    function pressPin(num) {
        if (currentPin.length < 4) {
            currentPin += num;
            updateDots();
            if (currentPin.length === 4) {
                setTimeout(validatePin, 250);
            }
        }
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('filled', i < currentPin.length);
        });
    }

    function clearPin() {
        currentPin = "";
        updateDots();
    }

    function validatePin() {
        if (isFirstTime) {
            localStorage.setItem('vault_pin', currentPin);
            alert("Master PIN Securely Stored.");
            location.reload();
        } else {
            if (currentPin === masterPin) {
                document.getElementById('auth-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    loadVault();
                }, 500);
            } else {
                alert("Access Denied: Incorrect PIN");
                clearPin();
            }
        }
    }

    function saveVault() {
        const text = document.getElementById('vault-data').value;
        const encrypted = btoa(unescape(encodeURIComponent(text))); 
        localStorage.setItem('vault_content', encrypted);
        
        const btn = document.querySelector('.save-btn');
        btn.innerText = "VAULT SECURED ✓";
        btn.style.background = "linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%)";
        btn.style.boxShadow = "0 4px 15px rgba(56, 189, 248, 0.4)";
        setTimeout(() => {
            btn.innerText = "Encrypt & Lock Vault";
            btn.style.background = "linear-gradient(135deg, #facc15 0%, #eab308 100%)";
            btn.style.boxShadow = "0 4px 15px rgba(250, 204, 21, 0.4)";
        }, 2000);
    }

    function loadVault() {
        const saved = localStorage.getItem('vault_content');
        if (saved) {
            try {
                const decrypted = decodeURIComponent(escape(atob(saved)));
                document.getElementById('vault-data').value = decrypted;
            } catch(e) { console.error("Decryption failure"); }
        }
    }
</script>
</body>
</html>
