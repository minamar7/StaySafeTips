<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Security Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        [span_6](start_span)[span_7](start_span)/* CSS Variables για υποστήριξη θεμάτων (Theme Support)[span_6](end_span)[span_7](end_span) */
        :root { 
            --bg: #020617; 
            --gold: #facc15; 
            --accent: #38bdf8; 
            --card: #1e293b; 
            --text: #ffffff;
            --input-bg: rgba(255,255,255,0.03);
        }

        [span_8](start_span)[span_9](start_span)/* Light Mode υποστήριξη για εξάλειψη της ασυνέπειας (Issue #3)[span_8](end_span)[span_9](end_span) */
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --text: #0f172a;
                --card: #ffffff;
                --input-bg: #f1f5f9;
            }
        }

        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
        }
        
        /* PIN Screen */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--gold); }
        .dot.filled { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .pin-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(128,128,128,0.2); background: rgba(128,128,128,0.05); color: var(--text); font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .pin-btn:active { background: var(--gold); color: #000; }

        /* Main Content */
        .vault-container { 
            padding: 40px 20px; 
            height: 100vh; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: var(--accent); font-weight: bold; cursor: pointer; }
        
        [span_10](start_span)[span_11](start_span)/* ΔΙΟΡΘΩΣΗ OVERFLOW (Issue #4): Χρήση box-sizing και σωστών constraints[span_10](end_span)[span_11](end_span) */
        textarea { 
            width: 100%; 
            flex: 1; 
            background: var(--input-bg); 
            border: 1px solid rgba(128,128,128,0.2); 
            border-radius: 15px; 
            color: var(--text); 
            padding: 20px; 
            font-size: 1rem; 
            line-height: 1.5; 
            resize: none; 
            margin-bottom: 20px; 
            outline: none;
            box-sizing: border-box; [span_12](start_span)/* Διασφαλίζει ότι το padding δεν μεγαλώνει το πλάτος πέρα από το 100%[span_12](end_span) */
        }
        textarea:focus { border-color: var(--gold); }
        
        .save-btn { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; width: 100%; cursor: pointer; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-overlay">
    <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
    <h2 id="auth-title">ENTER MASTER PIN</h2>
    <div class="pin-dots" id="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="pin-grid">
        <div class="pin-btn" onclick="pressPin(1)">1</div><div class="pin-btn" onclick="pressPin(2)">2</div><div class="pin-btn" onclick="pressPin(3)">3</div>
        <div class="pin-btn" onclick="pressPin(4)">4</div><div class="pin-btn" onclick="pressPin(5)">5</div><div class="pin-btn" onclick="pressPin(6)">6</div>
        <div class="pin-btn" onclick="pressPin(7)">7</div><div class="pin-btn" onclick="pressPin(8)">8</div><div class="pin-btn" onclick="pressPin(9)">9</div>
        <div class="pin-btn" style="border:none; background:none;" onclick="clearPin()">C</div>
        <div class="pin-btn" onclick="pressPin(0)">0</div>
    </div>
</div>

<div class="vault-container">
    <header>
        <button class="back-btn" onclick="window.location.href='index.html'">← BACK</button>
        <div style="color: var(--gold); font-weight: 800; font-size: 0.8rem; letter-spacing: 2px;">SECURE VAULT</div>
        <div style="width: 50px;"></div>
    </header>

    <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px;">Store emergency contacts, backup codes, or private security notes. Everything is encrypted locally.</p>
    
    <textarea id="vault-data" placeholder="Type your secure notes here..."></textarea>
    
    <button class="save-btn" onclick="saveVault()">Encrypt & Save</button>
</div>

<script>
    let currentPin = "";
    const masterPin = localStorage.getItem('vault_pin');
    const isFirstTime = !masterPin;

    if (isFirstTime) {
        document.getElementById('auth-title').innerText = "SET MASTER PIN";
    }

    function pressPin(num) {
        if (currentPin.length < 4) {
            currentPin += num;
            updateDots();
            if (currentPin.length === 4) {
                setTimeout(validatePin, 200);
            }
        }
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('filled', i < currentPin.length);
        });
    }

    function clearPin() {
        currentPin = "";
        updateDots();
    }

    function validatePin() {
        if (isFirstTime) {
            localStorage.setItem('vault_pin', currentPin);
            alert("Master PIN set successfully!");
            location.reload();
        } else {
            if (currentPin === masterPin) {
                document.getElementById('auth-screen').classList.add('hidden');
                loadVault();
            } else {
                alert("Incorrect PIN");
                clearPin();
            }
        }
    }

    function saveVault() {
        const text = document.getElementById('vault-data').value;
        const encrypted = btoa(unescape(encodeURIComponent(text))); 
        localStorage.setItem('vault_content', encrypted);
        
        const btn = document.querySelector('.save-btn');
        btn.innerText = "SAVED & ENCRYPTED ✓";
        btn.style.background = "var(--accent)";
        setTimeout(() => {
            btn.innerText = "Encrypt & Save";
            btn.style.background = "var(--gold)";
        }, 2000);
    }

    function loadVault() {
        const saved = localStorage.getItem('vault_content');
        if (saved) {
            try {
                const decrypted = decodeURIComponent(escape(atob(saved)));
                document.getElementById('vault-data').value = decrypted;
            } catch(e) { console.error("Decryption error"); }
        }
    }
</script>
</body>
</html>
