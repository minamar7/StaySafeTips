name: 🛡️ Build Stay Safe Elite AAB

on:
  workflow_dispatch:  # Τρέχει μόνο όταν το πατάς χειροκίνητα

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest

    steps:
      # ── 1. Κατέβασε τον κώδικα ──────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Εγκατάσταση Java 17 ──────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Εγκατάσταση Node.js ──────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Εγκατάσταση Bubblewrap ───────────────────────
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # ── 5. Δημιουργία Keystore από το GitHub Secret ─────
      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > signing.keystore

      # ── 6. twa-manifest.json ────────────────────────────
      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.minamar7.staysafeelite",
            "host": "minamar7.github.io",
            "name": "Stay Safe Elite",
            "launcherName": "Stay Safe",
            "display": "standalone",
            "themeColor": "#020617",
            "navigationColor": "#020617",
            "navigationColorDark": "#020617",
            "navigationDividerColor": "#020617",
            "navigationDividerColorDark": "#020617",
            "backgroundColor": "#020617",
            "enableNotifications": false,
            "startUrl": "/StaySafeTips/",
            "iconUrl": "https://minamar7.github.io/StaySafeTips/icons/icon-512x512.png",
            "maskableIconUrl": "https://minamar7.github.io/StaySafeTips/icons/icon-512x512.png",
            "monochromeIconUrl": "https://minamar7.github.io/StaySafeTips/icons/icon-512x512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./signing.keystore",
              "alias": "my-key-alias"
            },
            "appVersionCode": 1,
            "appVersionName": "2.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://minamar7.github.io/StaySafeTips/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://minamar7.github.io/StaySafeTips/",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

      # ── 7. Build ─────────────────────────────────────────
      - name: Build AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          bubblewrap build --skipPwaValidation

      # ── 8. Ανέβασε το .aab ως artifact ──────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: stay-safe-elite-aab
          path: |
            app-release-bundle.aab
            output/*.aab
          if-no-files-found: warn
          retention-days: 30
