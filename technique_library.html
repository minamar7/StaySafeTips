<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Technique Library - Stay Safe Elite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --gold: #facc15; 
            --neon: #38bdf8; 
            --bg: #020617; 
            --card-bg: #0f172a;
            --reflex: #ef4444; 
        }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: 20px;
            padding-bottom: 120px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: env(safe-area-inset-top);
        }

        .back-btn {
            color: var(--neon);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: var(--gold);
            transform: translateX(-5px);
        }

        h1 { 
            color: var(--gold); 
            font-size: 1.5rem; 
            letter-spacing: 2px; 
            font-weight: 900; 
            margin: 0;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold), 0 0 30px var(--gold);
            }
            to {
                text-shadow: 0 0 20px var(--gold), 0 0 30px var(--gold), 0 0 40px var(--gold), 0 0 50px var(--gold);
            }
        }

        .tech-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .tech-card {
            position: relative;
            height: 160px;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--card-bg);
            transform: translateY(0);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tech-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
            pointer-events: none;
        }

        .tech-card:hover::before {
            opacity: 1;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .tech-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(250, 204, 21, 0.3),
                inset 0 0 20px rgba(250, 204, 21, 0.1);
        }

        .tech-card:active { 
            transform: translateY(-5px) scale(0.98); 
            transition: all 0.1s ease;
        }

        /* Stagger animation on load */
        .tech-card {
            opacity: 0;
            animation: slideIn 0.6s ease-out forwards;
        }

        .tech-card:nth-child(1) { animation-delay: 0.1s; }
        .tech-card:nth-child(2) { animation-delay: 0.2s; }
        .tech-card:nth-child(3) { animation-delay: 0.3s; }
        .tech-card:nth-child(4) { animation-delay: 0.4s; }
        .tech-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .bg-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
            transition: all 0.4s ease;
        }

        .tech-card:hover .bg-thumb {
            filter: brightness(0.7) saturate(1.2);
            transform: scale(1.1);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(2, 6, 23, 0.95) 40%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 25px;
            z-index: 2;
        }

        .card-info h3 {
            margin: 0;
            color: var(--gold);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .tech-card:hover .card-info h3 {
            transform: translateX(5px);
            text-shadow: 0 0 10px var(--gold);
        }

        .card-info p {
            margin: 4px 0 0;
            color: var(--neon);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .tech-card:hover .card-info p {
            transform: translateX(5px);
            color: var(--gold);
        }

        .progress-container {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        .progress-fill {
            height: 100%;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
            transition: all 0.3s ease;
        }

        .tech-card:hover .progress-fill {
            box-shadow: 0 0 20px var(--neon), 0 0 30px var(--neon);
        }

        /* Special border glow animations for different cards */
        .tech-card[style*="border: 1px solid var(--neon)"] {
            border: 1px solid var(--neon);
        }

        .tech-card[style*="border: 1px solid var(--neon)"]:hover {
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(56, 189, 248, 0.5),
                inset 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .tech-card[style*="border: 1px solid var(--gold)"] {
            border: 1px solid var(--gold);
        }

        .tech-card[style*="border: 1px solid var(--gold)"]:hover {
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(250, 204, 21, 0.5),
                inset 0 0 20px rgba(250, 204, 21, 0.1);
        }

        .tech-card[style*="border: 1px solid #ff4444"] {
            border: 1px solid #ff4444;
        }

        .tech-card[style*="border: 1px solid #ff4444"]:hover {
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(255, 68, 68, 0.5),
                inset 0 0 20px rgba(255, 68, 68, 0.1);
        }

        .tech-card[style*="border: 1px solid #a855f7"] {
            border: 1px solid #a855f7;
        }

        .tech-card[style*="border: 1px solid #a855f7"]:hover {
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(168, 85, 247, 0.5),
                inset 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .tech-card[style*="border: 1px solid #10b981"] {
            border: 1px solid #10b981;
        }

        .tech-card[style*="border: 1px solid #10b981"]:hover {
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(16, 185, 129, 0.5),
                inset 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            animation: slideInModal 0.3s ease-out;
        }

        @keyframes slideInModal {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .img-wrapper {
            width: 100%;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            margin-bottom: 15px;
            background: #1e293b;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .img-wrapper:hover {
            border-color: var(--neon);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        }

        .img-wrapper img { 
            width: 100%; 
            display: block;
            transition: transform 0.3s ease;
        }

        .img-wrapper:hover img {
            transform: scale(1.05);
        }

        .step-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 4px solid var(--gold);
            transition: all 0.3s ease;
        }

        .step-box:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(5px);
            box-shadow: -4px 0 10px rgba(250, 204, 21, 0.3);
        }

        .step-title { 
            color: var(--gold); 
            font-weight: 900; 
            font-size: 0.8rem; 
            margin-bottom: 5px; 
            text-transform: uppercase;
        }

        button {
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(250, 204, 21, 0.4);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <a href="dojo.html" class="back-btn">← RETURN TO DOJO</a>
        <h1>ELITE TECHNIQUES</h1>
    </header>

    <div class="tech-grid">
        <div class="tech-card" onclick="showTech('headlock')" style="border: 1px solid var(--neon);">
            <img src="IMG_20260214_200544.jpg" class="bg-thumb">
            <div class="card-overlay">
                <div class="card-info">
                    <h3>Headlock Escape</h3>
                    <p>Level: Basic • 3 Steps</p>
                    <div class="progress-container"><div class="progress-fill" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>

        <div class="tech-card" onclick="showTech('wrist')" style="border: 1px solid var(--gold);">
            <img src="IMG_20260215_191602.jpg" class="bg-thumb">
            <div class="card-overlay">
                <div class="card-info">
                    <h3>Wrist Release</h3>
                    <p>Level: Intermediate • 3 Steps</p>
                    <div class="progress-container"><div class="progress-fill" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>

        <div class="tech-card" onclick="showTech('hair')" style="border: 1px solid #ff4444;">
            <img src="IMG_20260217_191945.jpg" class="bg-thumb">
            <div class="card-overlay">
                <div class="card-info">
                    <h3>Hair Grab Defense</h3>
                    <p>Level: Advanced • 3 Steps</p>
                    <div class="progress-container"><div class="progress-fill" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>

        <div class="tech-card" onclick="showTech('choke')" style="border: 1px solid #a855f7;">
            <div class="card-overlay">
                <div class="card-info">
                    <h3>Rear Choke Escape</h3>
                    <p>Level: Elite • Coming Soon</p>
                </div>
            </div>
        </div>

        <div class="tech-card" onclick="showTech('ground')" style="border: 1px solid #10b981;">
            <div class="card-overlay">
                <div class="card-info">
                    <h3>Ground Defense</h3>
                    <p>Level: Combat • Coming Soon</p>
                </div>
            </div>
        </div>
    </div>

    <div id="techModal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="modalTitle" style="color: var(--neon); margin: 0; font-size: 1.2rem; font-weight: 900;"></h2>
            <div style="font-size: 2rem; color: var(--gold); cursor: pointer;" onclick="hideTech()">&times;</div>
        </div>
        <div id="modalBody"></div>
        <button onclick="celebrateAndHide()" style="width:100%; background: var(--gold); color: black; border:none; padding:18px; border-radius:20px; font-weight:900; margin-top: 20px; letter-spacing: 1px; text-transform: uppercase;">Training Complete</button>
    </div>

    <script>
        function showTech(id) {
            const modal = document.getElementById('techModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            if(id === 'headlock') {
                title.innerText = "HEADLOCK ESCAPE";
                body.innerHTML = `
                    <div class="img-wrapper"><img src="IMG_20260214_200544.jpg"></div>
                    <div class="step-box"><div class="step-title">Step 1: Control</div><div>Defender caught in a headlock</div></div>
                    <div class="img-wrapper" style="border-color: var(--neon);"><img src="IMG_20260214_191009.jpg"></div>
                    <div class="step-box" style="border-left-color: var(--neon);"><div class="step-title">Step 2: Leverage</div><div>Place hand under chin and grab leg above the knee.</div></div>
                    <div class="img-wrapper"><img src="IMG_20260214_200132.jpg"></div>
                    <div class="step-box"><div class="step-title">Step 3: Release</div><div>Force off-balance and take the opponent down.</div></div>
                `;
            } 
            else if(id === 'wrist') {
                title.innerText = "WRIST RELEASE";
                body.innerHTML = `
                    <div class="img-wrapper"><img src="IMG_20260215_191602.jpg"></div>
                    <div class="step-box"><div class="step-title">Step 1: Analyze the Grip</div><div>Identify the thumb gap, the weakest point of the hold.</div></div>
                    <div class="img-wrapper" style="border-color: var(--neon);"><img src="IMG_20260215_193002.jpg"></div>
                    <div class="step-box" style="border-left-color: var(--neon);"><div class="step-title">Step 2: Downward Leverage</div><div>Rotate your wrist toward the floor and break their posture.</div></div>
                    <div class="img-wrapper"><img src="IMG_20260215_193002.jpg"></div>
                    <div class="step-box"><div class="step-title">Step 3: Release & Neutralize</div><div>Fully release the wrist grip and neutralize the threat.</div></div>
                `;
            } 
            else if(id === 'hair') {
                title.innerText = "HAIR GRAB DEFENSE";
                body.innerHTML = `
                    <div class="img-wrapper"><img src="IMG_20260217_212701.jpg"></div>
                    <div class="step-box"><div class="step-title">Step 1: The Attack</div><div>When the attacker grabs your hair unexpectedly, immediately press their hand against your head to stabilize the grip.</div></div>
                    <div class="img-wrapper" style="border-color: var(--neon);"><img src="IMG_20260217_212559.jpg"></div>
                    <div class="step-box" style="border-left-color: var(--neon);"><div class="step-title">Step 2: Protective Frame</div><div>Raise your arms high to create a protective frame and gain leverage for the release.</div></div>
                    <div class="img-wrapper"><img src="IMG_20260217_191945.jpg"></div>
                    <div class="step-box"><div class="step-title">Step 3: Counter-Attack & Push</div><div>Lower your center of gravity while holding the attacker's hands firmly; rotate your body forward and push them away with your leg to neutralize the threat.</div></div>
                `;
            }
            else if(id === 'choke') {
                title.innerText = "REAR CHOKE ESCAPE";
                body.innerHTML = `
                    <div class="img-wrapper"><span style="color:#64748b">PHOTO COMING SOON</span></div>
                    <div class="step-box"><div class="step-title">Step 1: Create Air</div><div>Pull the attacker's arm down to create a gap for breathing.</div></div>
                `;
            } 
            else if(id === 'ground') {
                title.innerText = "GROUND DEFENSE";
                body.innerHTML = `
                    <div class="img-wrapper"><span style="color:#64748b">PHOTO COMING SOON</span></div>
                    <div class="step-box"><div class="step-title">Step 1: Shield</div><div>Use your legs to keep the attacker at a distance.</div></div>
                `;
            }
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function celebrateAndHide() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(hideTech, 800);
        }

        function hideTech() {
            document.getElementById('techModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
