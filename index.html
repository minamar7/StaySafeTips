<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stay Safe Elite</title>
<link rel="manifest" href="manifest.webmanifest">
<script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="quiz.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>
:root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; --gold: #facc15; --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --success: #22c55e; }
* { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
.hidden { display: none !important; }

/* Header & XP Bar */
.app-header { padding: 45px 20px 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(56,189,248,0.2); position: sticky; top: 0; z-index: 100; }
.xp-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 10px; overflow: hidden; margin-top: 8px; }
.xp-fill { background: linear-gradient(90deg, var(--gold), #fbbf24); height: 100%; width: 0%; transition: 0.8s; }

/* SOS BUTTON */
.panic-btn { position: fixed; right: 20px; bottom: 210px; width: 70px; height: 70px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); z-index: 999; border: 4px solid rgba(255,255,255,0.2); cursor: pointer; animation: panic-pulse 1.5s infinite; }
@keyframes panic-pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }

/* DOJO GATEWAY */
.dojo-gateway { background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), #020617); border: 3px solid var(--gold); border-radius: 28px; padding: 15px; margin: 20px 0; position: relative; overflow: hidden; cursor: pointer; display: flex; align-items: center; gap: 15px; box-shadow: 0 0 20px rgba(250, 204, 21, 0.3); transition: 0.3s; }
.dojo-avatar-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: #000; flex-shrink: 0; }
.dojo-avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
.gate-info h3 { margin: 0; font-size: 1.1rem; color: #fff; text-transform: uppercase; }
.gate-info p { margin: 4px 0 0; font-size: 0.65rem; color: var(--gold); font-weight: bold; }
.premium-tag { position: absolute; top: 12px; right: 15px; background: var(--gold); color: #000; font-size: 0.55rem; padding: 3px 8px; border-radius: 6px; font-weight: 900; }

/* Cards & Grid */
.glass-card { background: var(--card); backdrop-filter: blur(10px); border-radius: 28px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); position: relative; }
.main-cta { background: linear-gradient(135deg, var(--accent), #0ea5e9); border: none; color: #020617; padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; }

/* QUIZ DESIGN */
#quiz-question p.q-text { color: #ffffff !important; display: block !important; font-size: 1.1rem; font-weight: bold; text-align: center; }
.option-btn { background: #1e293b; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
.option-btn.correct { background: var(--success) !important; }
.option-btn.wrong { background: var(--danger) !important; }

/* TOOLS GRID */
.tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 14px; }
.tool-card { background: rgba(255,255,255,0.03); border-radius: 22px; padding: 22px 12px 18px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; overflow: hidden; transition: transform 0.15s; }
.tool-card:active { transform: scale(0.94); }
.tool-icon-wrap { width: 58px; height: 58px; border-radius: 17px; display: flex; align-items: center; justify-content: center; }
.tool-icon-wrap svg { width: 30px; height: 30px; }
.tool-card small { font-family: 'Rajdhani', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; color: #94a3b8; text-transform: uppercase; }

/* Colors */
.tool-timer .tool-icon-wrap { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.28); }
.tool-sos .tool-icon-wrap { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.32); }
.tool-nature .tool-icon-wrap { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.28); }
.tool-scams .tool-icon-wrap { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.28); }
.tool-checkup .tool-icon-wrap { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.28); }
.tool-ai .tool-icon-wrap { background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(14,165,233,0.06)); border: 1px solid rgba(56,189,248,0.45); animation: ai-glow 2.5s infinite; }
@keyframes ai-glow { 0%,100% { box-shadow: 0 0 20px rgba(56,189,248,0.3); } 50% { box-shadow: 0 0 30px rgba(56,189,248,0.5); } }

/* Navigation */
.nav-tabs { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(2, 6, 23, 0.98); display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.nav-tab { flex: 1; background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.nav-tab.active { color: var(--accent); }

/* Overlays */
.overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; overflow-y: auto; }
.lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; width: 100%; max-width: 400px; padding-bottom: 40px; }
.lang-btn { background: #1e293b; padding: 15px; border-radius: 15px; color: white; border: 1px solid #334155; font-weight: bold; cursor: pointer; }
</style>
</head>
