<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stay Safe Elite</title>

<link rel="manifest" href="manifest.webmanifest">
<script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="quiz.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>
:root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; --gold: #facc15; --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --success: #22c55e; }
* { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
.hidden { display: none !important; }

/* Styles από το πρωτότυπο αρχείο index(1).html */
.app-header { padding: 45px 20px 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(56,189,248,0.2); position: sticky; top: 0; z-index: 100; }
.xp-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 10px; overflow: hidden; margin-top: 8px; }
.xp-fill { background: linear-gradient(90deg, var(--gold), #fbbf24); height: 100%; width: 0%; transition: 0.8s; }

.panic-btn { position: fixed; right: 20px; bottom: 210px; width: 70px; height: 70px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); z-index: 999; border: 4px solid rgba(255,255,255,0.2); cursor: pointer; animation: panic-pulse 1.5s infinite; }
@keyframes panic-pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }

.dojo-gateway { background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), #020617); border: 3px solid var(--gold); border-radius: 28px; padding: 15px; margin: 20px 0; position: relative; overflow: hidden; cursor: pointer; display: flex; align-items: center; gap: 15px; box-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
.dojo-avatar-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: #000; flex-shrink: 0; }
.dojo-avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

.glass-card { background: var(--card); backdrop-filter: blur(10px); border-radius: 28px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); position: relative; }
.main-cta { background: linear-gradient(135deg, var(--accent), #0ea5e9); border: none; color: #020617; padding: 18px; border-radius: 20px; font-size: 16px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; }

/* Quiz Design - Παραμένει το δικό σου */
#quiz-question p.q-text { color: #ffffff !important; display: block !important; font-size: 1.1rem; font-weight: bold; text-align: center; margin-top: 10px;}
.option-btn { background: rgba(255,255,255,0.05); color: #f8fafc; border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 18px; width: 100%; margin-bottom: 12px; font-weight: 700; cursor: pointer; text-align: left; }
.option-btn.correct { background: linear-gradient(135deg, #166534, #15803d) !important; border-color: #22c55e !important; box-shadow: 0 0 15px rgba(34,197,94,0.4); }
.option-btn.wrong { background: linear-gradient(135deg, #991b1b, #b91c1c) !important; border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239,68,68,0.4); }

.tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 14px; }
.tool-card { background: rgba(255,255,255,0.03); border-radius: 22px; padding: 22px 12px 18px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); position: relative; }

/* Toast & Ripple */
#lock-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,0.95); color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 10000; opacity: 0; transition: 0.3s; pointer-events: none; font-size: 0.8rem; border: 1px solid var(--accent); }
#lock-toast.show { opacity: 1; }
.tap-ripple { position: absolute; inset: 0; background: rgba(56,189,248,0.2); animation: ripple 0.4s ease-out; pointer-events: none; border-radius: inherit; }
@keyframes ripple { from { opacity: 1; transform: scale(0.9); } to { opacity: 0; transform: scale(1.1); } }

.overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
.lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
.lang-btn { background: #1e293b; padding: 15px; border-radius: 15px; color: white; border: 1px solid #334155; cursor: pointer; }
.nav-tabs { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(2, 6, 23, 0.98); display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
.nav-tab { flex: 1; background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
.nav-tab.active { color: var(--accent); }
</style>
</head>
<body>
<div id="lock-toast"></div>
<section id="onboarding" class="overlay">
    <div>
        <div style="font-size:60px; margin-bottom:20px;">🛡️</div>
        <h1 style="font-family:'Rajdhani';">Stay Safe Elite</h1>
        <div class="lang-grid">
            <div class="lang-btn" onclick="initApp('el')">🇬🇷 Greek</div>
            <div class="lang-btn" onclick="initApp('en')">🇺🇸 English</div>
            <div class="lang-btn" onclick="initApp('de')">🇩🇪 German</div>
            <div class="lang-btn" onclick="initApp('fr')">🇫🇷 French</div>
            <div class="lang-btn" onclick="initApp('es')">🇪🇸 Spanish</div>
            <div class="lang-btn" onclick="initApp('it')">🇮🇹 Italian</div>
            <div class="lang-btn" onclick="initApp('pt')">🇵τούζικα</div>
            <div class="lang-btn" onclick="initApp('ru')">🇷🇺 Russian</div>
            <div class="lang-btn" onclick="initApp('zh')">🇨🇳 Chinese</div>
            <div class="lang-btn" onclick="initApp('hi')">🇮🇳 Hindi</div>
        </div>
    </div>
</section>

<div id="main_app" class="hidden">
    <header class="app-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="color:var(--gold); font-weight:bold;">🔥 <span id="streak_val">1</span> <span id="txt_days">DAYS</span></div>
            <div style="font-weight:900; color:var(--accent);" onclick="resetApp()">LEVEL <span id="user-level">1</span></div>
        </div>
        <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
    </header>

    <main style="padding: 20px 20px 140px;">
        <section id="screen_home">
            <div class="glass-card">
                <div id="quiz-container">
                    <h2 id="quiz_title">🛡️ Stay Safe Elite</h2>
                    <div id="quiz-question">
                        <p id="quiz_text">Ready for your training?</p>
                    </div>
                    <div id="quiz-options"></div>
                    <button class="main-cta" id="quiz_btn" onclick="handleQuizStart()">START QUIZ</button>
                </div>
            </div>

            <div class="dojo-gateway" id="dojo_card" onclick="tapUnlock('dojo_card')">
                <div class="premium-tag" style="position:absolute; top:12px; right:15px; background:var(--gold); color:#000; font-size:0.6rem; padding:3px 8px; border-radius:6px; font-weight:900;">PREMIUM</div>
                <div class="dojo-avatar-circle">
                    <img src="https://minamar7.github.io/StaySafeTips/IMG_20260209_231913.jpg" alt="Master">
                </div>
                <div class="gate-info">
                    <h3 id="txt_dojo_title">Elite Defense Dojo</h3>
                    <p id="txt_dojo_sub">MASTER TANG SOO DO</p>
                </div>
            </div>
        </section>

        <section id="screen_premium" class="hidden">
            <h2 id="txt_tools_title" style="color:var(--gold);">Elite Tools 🔓</h2>
            <div class="tools-grid">
                <div class="tool-card" onclick="window.location.href='timer.html'">
                    <div style="font-size:30px;">⏱️</div><small id="t1">TIMER</small>
                </div>
                <div class="tool-card" onclick="window.location.href='sos-hub.html'">
                    <div style="font-size:30px;">🆘</div><small id="t2">SOS HUB</small>
                </div>
                <div class="tool-card" id="card_scams" onclick="tapUnlock('card_scams')">
                    <div style="font-size:30px;">⚠️</div><small id="t4">SCAMS</small>
                </div>
                <div class="tool-card" id="card_ai" onclick="tapUnlock('card_ai')">
                    <div style="font-size:30px;">🤖</div><small id="t6">AI THREAT</small>
                </div>
                <div class="tool-card" id="card_vault" onclick="tapUnlock('card_vault')">
                    <div style="font-size:30px;">🔒</div><small>VAULT</small>
                </div>
            </div>
        </section>
    </main>

    <nav class="nav-tabs">
        <button class="nav-tab active" id="nav_home" onclick="showScreen('home', this)">🏠</button>
        <button class="nav-tab" onclick="window.location.href='scam-alerts2.html'">📡</button>
        <button class="nav-tab" id="nav_premium" onclick="showScreen('premium', this)">💎</button>
    </nav>
</div>

<script>
// --- LOGIC 3-TAP UNLOCK ---
const TAP_REQUIRED = 3;
const TAP_WINDOW   = 1000;
const _taps = {};
const REVIEW_MODE = true;

function tapUnlock(cardId) {
    if (localStorage.getItem('premium_user') === 'true' || localStorage.getItem('review_access') === 'true') {
        const routes = {'dojo_card':'dojo.html','card_scams':'scam-alerts.html','card_ai':'ai-threat.html','card_vault':'vault.html'};
        window.location.href = routes[cardId] || 'index.html';
        return;
    }
    if (!_taps[cardId]) _taps[cardId] = { n: 0, t: null };
    const s = _taps[cardId];
    if (s.t) clearTimeout(s.t);
    s.n++;
    const el = document.getElementById(cardId);
    if (el) {
        const r = document.createElement('div');
        r.className = 'tap-ripple';
        el.appendChild(r);
        setTimeout(() => r.remove(), 400);
    }
    if (s.n >= TAP_REQUIRED) {
        _taps[cardId] = { n: 0, t: null };
        _hideToast();
        if (REVIEW_MODE) localStorage.setItem('review_access', 'true');
        window.location.href = 'premium.html';
        return;
    }
    const left = TAP_REQUIRED - s.n;
    _showToast('🔒 Tap ' + left + ' more time' + (left > 1 ? 's' : '') + ' to unlock');
    s.t = setTimeout(() => { _taps[cardId] = { n: 0, t: null }; _hideToast(); }, TAP_WINDOW);
}
function _showToast(m) { const t = document.getElementById('lock-toast'); t.innerText = m; t.classList.add('show'); }
function _hideToast() { document.getElementById('lock-toast').classList.remove('show'); }

// --- APP LOGIC ---
let currentLang = localStorage.getItem('user_lang') || 'en';

function initApp(lang) {
    localStorage.setItem('user_lang', lang);
    localStorage.setItem('app_init', 'true');
    location.reload();
}

function showMainApp() {
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('main_app').classList.remove('hidden');
    applyTranslations(currentLang);
    if (!localStorage.getItem('premium_user') && !localStorage.getItem('review_access')) {
        // Διαφημίσεις για free χρήστες
        if (window.AndroidAdmob) AndroidAdmob.showInterstitial();
    }
}

function applyTranslations(lang) {
    const t = { 'en': { days: 'DAYS', start: 'START QUIZ' }, 'el': { days: 'ΗΜΕΡΕΣ', start: 'ΕΝΑΡΞΗ' } };
    const set = t[lang] || t['en'];
    document.getElementById('txt_days').innerText = set.days;
    document.getElementById('quiz_btn').innerText = set.start;
}

function showScreen(screen, btn) {
    document.getElementById('screen_home').classList.add('hidden');
    document.getElementById('screen_premium').classList.add('hidden');
    document.getElementById('screen_' + screen).classList.remove('hidden');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
}

function handleQuizStart() {
    document.getElementById('quiz_btn').classList.add('hidden');
    if (window.QuizEngine) window.QuizEngine.start(currentLang, 'quiz-options');
}

function resetApp() { localStorage.clear(); location.reload(); }
window.onload = () => { if (localStorage.getItem('app_init') === 'true') showMainApp(); };
</script>
</body>
</html>
