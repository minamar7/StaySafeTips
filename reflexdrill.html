<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reflex Elite – Netflix Visual Drills</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --n-red: #e50914; --gold: #facc15; --bg: #050505; --card: #181818; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Barlow Condensed', sans-serif; overflow-x: hidden; }
    header { padding: 50px 20px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Bebas Neue'; color: var(--n-red); font-size: 2rem; letter-spacing: 1px; }
    .hero-display { width: 100%; height: 55vh; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-image { height: 90%; width: auto; object-fit: contain; transition: 0.4s; }
    .step-tag { position: absolute; top: 20px; left: 20px; background: var(--n-red); padding: 5px 15px; font-family: 'Bebas Neue'; font-size: 1.2rem; }
    .content-wrap { padding: 20px; background: linear-gradient(to top, var(--bg) 85%, transparent); margin-top: -40px; position: relative; z-index: 10; }
    .tech-title { font-family: 'Bebas Neue'; font-size: 3rem; margin: 0; color: var(--gold); }
    .steps-container { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0 100px; scrollbar-width: none; }
    .step-card { min-width: 220px; background: var(--card); border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
    .step-card.active { border-color: #fff; transform: scale(1.02); }
    .step-thumb { width: 100%; height: 120px; object-fit: cover; opacity: 0.6; }
    .step-card.active .step-thumb { opacity: 1; }
    .step-info { padding: 10px; }
    .s-title { font-family: 'Bebas Neue'; font-size: 1rem; color: #fff; }
    .s-desc { font-size: 0.75rem; color: #999; line-height: 1.3; }
    .menu { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
    .menu-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-family: 'Bebas Neue'; cursor: pointer; white-space: nowrap; }
    .menu-btn.active { background: var(--n-red); }
    .nav-btn { position: fixed; bottom: 30px; width: 90%; left: 5%; background: white; color: black; border: none; padding: 15px; border-radius: 4px; font-family: 'Bebas Neue'; font-size: 1.3rem; z-index: 200; cursor: pointer; }
</style>
</head>
<body>

<header>
    <div class="logo">STAY SAFE ELITE</div>
    <div style="font-size: 0.8rem; font-weight: 700;">REFLEX DRILLS</div>
</header>

<div class="menu" id="techMenu"></div>

<div class="hero-display">
    <div class="step-tag" id="tag">STEP 1</div>
    <img src="athlete_highblock_1.jpg" id="mainVisual" class="hero-image">
</div>

<div class="content-wrap">
    <h1 class="tech-title" id="displayTitle">HIGH BLOCK</h1>
    <div style="color: #46d369; font-weight: 900; margin: 5px 0 20px;">MASTER CLASS • 3 STEPS</div>
    <div class="steps-container" id="stepsList"></div>
</div>

<button class="nav-btn" onclick="nextStep()">▶ NEXT STEP</button>

<script>
    const DRILLS = [
        { title: "HIGH BLOCK", imgPrefix: "athlete_highblock", steps: [
            { t: "The Chamber", d: "Cross arms at chest level. Prep for the rise." },
            { t: "The Rise", d: "Lifting the arm in a powerful arc." },
            { t: "The Lock", d: "Final block above the forehead." }
        ]},
        { title: "LOW BLOCK", imgPrefix: "athlete_lowblock", steps: [
            { t: "Shoulder Prep", d: "Bring fist to opposite shoulder." },
            { t: "The Sweep", d: "Forceful downward sweep across body." },
            { t: "The Lock", d: "Stop 2 inches above the thigh." }
        ]},
        { title: "PALM STRIKE", imgPrefix: "athlete_palm", steps: [
            { t: "Hip Chamber", d: "Open palm at ribs, ready to strike." },
            { t: "The Thrust", d: "Explosive movement forward." },
            { t: "Full Impact", d: "Target hit with base of the palm." }
        ]}
    ];

    let currentDrill = 0;
    let currentStep = 0;

    function init() {
        const menu = document.getElementById('techMenu');
        menu.innerHTML = DRILLS.map((d, i) => `
            <button class="menu-btn ${i===0?'active':''}" onclick="changeDrill(${i})">${d.title}</button>
        `).join('');
        loadDrill();
    }

    function loadDrill() {
        const d = DRILLS[currentDrill];
        currentStep = 0;
        document.getElementById('displayTitle').innerText = d.title;
        const list = document.getElementById('stepsList');
        list.innerHTML = d.steps.map((s, i) => `
            <div class="step-card ${i===0?'active':''}" id="s-${i}" onclick="jumpTo(${i})">
                <img src="${d.imgPrefix}_${i+1}.jpg" class="step-thumb">
                <div class="step-info"><div class="s-title">STEP ${i+1}: ${s.t}</div><div class="s-desc">${s.d}</div></div>
            </div>
        `).join('');
        updateUI();
    }

    function updateUI() {
        const d = DRILLS[currentDrill];
        const main = document.getElementById('mainVisual');
        main.src = `${d.imgPrefix}_${currentStep+1}.jpg`;
        document.getElementById('tag').innerText = `STEP ${currentStep+1}`;
        document.querySelectorAll('.step-card').forEach((c, i) => c.classList.toggle('active', i === currentStep));
    }

    function nextStep() { currentStep = (currentStep + 1) % 3; updateUI(); }
    function jumpTo(i) { currentStep = i; updateUI(); }
    function changeDrill(i) { 
        currentDrill = i; 
        document.querySelectorAll('.menu-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
        loadDrill(); 
    }

    window.onload = init;
</script>
</body>
</html>
