<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Stay Safe Elite – Tang Soo Do Avatar</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<style>

body{
margin:0;
background:#0e0e11;
color:white;
font-family:Arial;
}

.avatar-stage{
position:relative;
height:60vh;
}

#three-mount{
width:100%;
height:100%;
}

.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.progress-bar{
width:200px;
height:6px;
background:#333;
border-radius:10px;
margin-top:10px;
}

.progress-fill{
height:6px;
width:0%;
background:gold;
}

.stage-overlay{
position:absolute;
bottom:20px;
left:20px;
}

.phase-badge{
background:#111;
padding:10px 16px;
border-radius:10px;
border:1px solid #444;
}

.phase-name{
font-size:20px;
color:gold;
}

.avatar-controls{
margin-top:10px;
}

.av-btn{
background:gold;
border:none;
padding:10px 14px;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div class="avatar-stage">

<div id="three-mount"></div>

<div class="loader" id="loader">
<div style="color:gold;font-size:20px;">ΦΟΡΤΩΣΗ AVATAR...</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="stage-overlay">

<div class="phase-badge">
<div class="phase-name" id="phase-label">READY</div>
<div style="font-size:10px;color:#aaa;">ΣΤΑΣΗ ΕΤΟΙΜΟΤΗΤΑΣ</div>
</div>

<div class="avatar-controls">
<button class="av-btn" onclick="playNext()">ΕΠΟΜΕΝΗ ΚΙΝΗΣΗ ▶</button>
</div>

</div>
</div>

<div style="padding:20px">
<h3 style="color:gold;">Πληροφορίες Άσκησης</h3>
<p>Ανάλυση τεχνικής: <b>High Block (Sang Dan Makgi)</b></p>
</div>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,1.6,3);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight*0.6);
document.getElementById("three-mount").appendChild(renderer.domElement);

let light = new THREE.HemisphereLight(0xffffff,0x444444,1.3);
scene.add(light);

let dir = new THREE.DirectionalLight(0xffffff,1);
dir.position.set(2,3,2);
scene.add(dir);

let avatar;
let bones={};

let loader = new THREE.GLTFLoader();

loader.load("avatar.glb",(gltf)=>{

avatar=gltf.scene;
scene.add(avatar);

avatar.traverse(obj=>{
if(obj.isBone){
bones[obj.name]=obj;
}
});

document.getElementById("loader").style.display="none";

});

const phases=[

{
label:"READY",
rotation:{
RightArm:[0.15,0.05,-0.05],
RightForeArm:[0.25,0,0],

LeftArm:[0.15,-0.05,0.05],
LeftForeArm:[0.25,0,0]
}
},

{
label:"PREPARATION",
rotation:{
RightArm:[0.9,0.2,-1.25],
RightForeArm:[1.2,0.2,0.15],

LeftArm:[-1.0,0.15,0.35],
LeftForeArm:[-0.6,0,0]
}
},

{
label:"HIGH BLOCK",
rotation:{
RightArm:[1.9,-0.2,-0.25],
RightForeArm:[1.25,0.35,0.25],

LeftArm:[-1.15,0.1,0.35],
LeftForeArm:[-0.75,0,0]
}
}

];

let phaseIndex=0;

function applyPhase(p){

document.getElementById("phase-label").innerText=p.label;

for(let bone in p.rotation){

if(bones[bone]){

let r=p.rotation[bone];

bones[bone].rotation.x=r[0];
bones[bone].rotation.y=r[1];
bones[bone].rotation.z=r[2];

}

}

}

function playNext(){

phaseIndex++;

if(phaseIndex>=phases.length){
phaseIndex=0;
}

applyPhase(phases[phaseIndex]);

}

function animate(){

requestAnimationFrame(animate);
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
