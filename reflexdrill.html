<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Reflex Drill – Tang Soo Do | Stay Safe Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script><style>
body{background:#080808;color:#f2ede4;font-family:'Barlow Condensed',sans-serif;margin:0}
.page{max-width:440px;margin:auto;padding:20px}
#c3d{width:100%;height:380px;display:block}
.btn{padding:12px;border:none;background:#d4a53a;color:#000;font-weight:bold}
</style></head><body>
<div class="page"><h2>Tang Soo Do Reflex Drill</h2>
<canvas id="c3d"></canvas><button class="btn" onclick="togglePlay()" id="btnPlay">PLAY</button>

</div><script>

const TECHS=[

{
name:'HIGH BLOCK',
col:'#d4a53a',
phases:[

{n:'Guard',d:1.6,
b:{
Spine:{x:5,y:0,z:0},
RightArm:{x:-15,y:0,z:-30},
RightForeArm:{x:0,y:-25,z:0},
LeftArm:{x:-15,y:0,z:30},
LeftForeArm:{x:0,y:25,z:0}
}},

{n:'Chamber',d:.6,
b:{
RightArm:{x:-65,y:0,z:-40},
RightForeArm:{x:0,y:-85,z:0},
LeftArm:{x:20,y:0,z:70},
LeftForeArm:{x:0,y:-80,z:0}
}},

{n:'HIGH BLOCK',d:.8,
b:{
RightArm:{x:-100,y:0,z:-55},
RightForeArm:{x:0,y:-115,z:0},
LeftArm:{x:40,y:0,z:95},
LeftForeArm:{x:0,y:-90,z:0}
}},

{n:'Hold',d:1,
b:{
RightArm:{x:-100,y:0,z:-55},
RightForeArm:{x:0,y:-115,z:0},
LeftArm:{x:40,y:0,z:95},
LeftForeArm:{x:0,y:-90,z:0}
}}

]
},

{
name:'FRONT KICK',
col:'#3fbf7f',
phases:[

{n:'Guard',d:1.5,
b:{
RightArm:{x:-15,y:0,z:-30},
LeftArm:{x:-15,y:0,z:30}
}},

{n:'Chamber',d:.7,
b:{
RightUpLeg:{x:-85,y:0,z:0},
RightLeg:{x:85,y:0,z:0}
}},

{n:'Kick',d:.6,
b:{
RightUpLeg:{x:-30,y:0,z:0},
RightLeg:{x:20,y:0,z:0}
}},

{n:'Return',d:1,
b:{
RightUpLeg:{x:8,y:0,z:-5},
RightLeg:{x:-6,y:0,z:0}
}}

]
},

{
name:'REVERSE PUNCH',
col:'#d43f6a',
phases:[

{n:'Guard',d:1.5,
b:{
RightArm:{x:-15,y:0,z:-30},
LeftArm:{x:-15,y:0,z:30}
}},

{n:'Chamber',d:.5,
b:{
RightArm:{x:20,y:0,z:-70},
RightForeArm:{x:0,y:-80,z:0},
LeftArm:{x:-20,y:0,z:70}
}},

{n:'Punch',d:.6,
b:{
Spine:{x:10,y:20,z:0},
RightArm:{x:-5,y:0,z:-140},
RightForeArm:{x:0,y:0,z:0},
LeftArm:{x:45,y:0,z:90}
}}

]
},

{
name:'LOW BLOCK',
col:'#2f6ed4',
phases:[

{n:'Guard',d:1.5,
b:{
RightArm:{x:-10,y:0,z:-25},
LeftArm:{x:-10,y:0,z:25}
}},

{n:'Chamber',d:.6,
b:{
RightArm:{x:35,y:0,z:-60},
RightForeArm:{x:0,y:-85,z:0},
LeftArm:{x:20,y:0,z:70}
}},

{n:'LOW BLOCK',d:.8,
b:{
RightArm:{x:85,y:0,z:-95},
RightForeArm:{x:0,y:-120,z:0},
LeftArm:{x:40,y:0,z:95}
}}

]
}

];


const canvas=document.getElementById('c3d');

const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(canvas.clientWidth,380);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080808);

const camera=new THREE.PerspectiveCamera(40,canvas.clientWidth/380,0.1,100);
camera.position.set(0,1.3,3.5);

scene.add(new THREE.AmbientLight(0xffffff,.7));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(2,5,3);
scene.add(light);

let bones={},rest={},ready=false;

const loader=new THREE.GLTFLoader();

loader.load('avatar.glb',g=>{

const avatar=g.scene;

avatar.traverse(n=>{
if(n.name)bones[n.name]=n
})

scene.add(avatar)

for(const b in bones)rest[b]=bones[b].rotation.clone()

ready=true

applyPose(TECHS[0].phases[0].b)

})


function applyPose(pose){

for(const b in pose){

if(!bones[b])continue

bones[b].rotation.x=rest[b].x+pose[b].x*Math.PI/180
bones[b].rotation.y=rest[b].y+pose[b].y*Math.PI/180
bones[b].rotation.z=rest[b].z+pose[b].z*Math.PI/180

}

}

let playing=false
let tech=0
let phase=0

function togglePlay(){

playing=!playing

if(playing)animate()

}

function animate(){

if(!playing)return

phase++

if(phase>=TECHS[tech].phases.length)phase=0

applyPose(TECHS[tech].phases[phase].b)

setTimeout(()=>requestAnimationFrame(animate),800)

}

(function loop(){

requestAnimationFrame(loop)

renderer.render(scene,camera)

})()

</script></body>
</html>
