<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('three-mount');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
45,
container.clientWidth / container.clientHeight,
0.1,
100
);

camera.position.set(0,1.4,3);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(container.clientWidth,container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);

container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.target.set(0,1,0);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,1.3));

const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(3,5,2);
scene.add(dirLight);

const loader = new GLTFLoader();

let avatar;
let bones = {};

function detectBones(node){

if(!node.isBone) return;

const name = node.name.toLowerCase();

if(name.includes("rightarm")) bones.RightArm = node;
if(name.includes("rightforearm")) bones.RightForeArm = node;
if(name.includes("righthand")) bones.RightHand = node;

if(name.includes("leftarm")) bones.LeftArm = node;
if(name.includes("leftforearm")) bones.LeftForeArm = node;
if(name.includes("lefthand")) bones.LeftHand = node;

}

const phases=[

{
label:"READY",
rotation:{
RightArm:[0.15,0.05,-0.05],
RightForeArm:[0.25,0,0],
LeftArm:[0.15,-0.05,0.05],
LeftForeArm:[0.25,0,0]
}
},

{
label:"PREPARATION",
rotation:{
RightArm:[0.7,0.2,-1.4],
RightForeArm:[1.0,0.2,0.2],
LeftArm:[-0.9,0.1,0.25],
LeftForeArm:[-0.6,0,0]
}
},

{
label:"HIGH BLOCK",
rotation:{
RightArm:[1.9,-0.15,-0.25],
RightForeArm:[1.35,0.35,0.25],
LeftArm:[-1.1,0.15,0.3],
LeftForeArm:[-0.6,0,0]
}
}

];

let currentPhase=0;
let animating=false;

loader.load("avatar (1).glb",(gltf)=>{

avatar=gltf.scene;

scene.add(avatar);

avatar.traverse(detectBones);

document.getElementById("loader").style.display="none";

applyPhaseInstant(0);

});

function applyPhaseInstant(i){

const p=phases[i];

document.getElementById("phase-label").innerText=p.label;

for(let b in p.rotation){

if(bones[b]){

const r=p.rotation[b];

bones[b].rotation.set(r[0],r[1],r[2]);

}

}

}

function animateToPhase(next){

if(animating) return;

animating=true;

const duration=500;

const start=performance.now();

const startRot={};

for(let b in phases[next].rotation){

if(bones[b]){

startRot[b]=bones[b].rotation.clone();

}

}

function step(now){

let t=(now-start)/duration;

if(t>1)t=1;

for(let b in phases[next].rotation){

if(!bones[b]) continue;

const target=phases[next].rotation[b];

const sr=startRot[b];

bones[b].rotation.x=THREE.MathUtils.lerp(sr.x,target[0],t);
bones[b].rotation.y=THREE.MathUtils.lerp(sr.y,target[1],t);
bones[b].rotation.z=THREE.MathUtils.lerp(sr.z,target[2],t);

}

if(t<1){

requestAnimationFrame(step);

}else{

animating=false;

}

}

requestAnimationFrame(step);

document.getElementById("phase-label").innerText=phases[next].label;

}

window.playNext=()=>{

currentPhase=(currentPhase+1)%phases.length;

animateToPhase(currentPhase);

};

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=container.clientWidth/container.clientHeight;

camera.updateProjectionMatrix();

renderer.setSize(container.clientWidth,container.clientHeight);

});
</script>
