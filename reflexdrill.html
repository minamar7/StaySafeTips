<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stay Safe Elite – Tang Soo Do Avatar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #f5c542; --red: #e8212a; --bg: #080810; --card: #10101c;
  --text: #f0ede8; --dim: #4a4a6a; --border: #1e1e2e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.app-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); letter-spacing: 2px; }

/* AVATAR STAGE */
.avatar-stage {
  position: relative; margin: 15px 20px; border-radius: 16px;
  background: radial-gradient(circle at center, #1a1a2e 0%, #080810 100%);
  border: 1px solid var(--border); height: 350px; overflow: hidden;
}
#three-mount { width:100%; height:100%; }

.stage-overlay {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
}
.phase-badge { align-self: flex-start; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--gold); }
.phase-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); }

.avatar-controls { pointer-events: auto; display: flex; gap: 10px; align-self: flex-end; }
.av-btn {
  background: var(--card); border: 1px solid var(--border); color: white;
  padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.av-btn:active { border-color: var(--gold); }

.loader {
  position: absolute; inset:0; background: var(--bg); display: flex; 
  flex-direction: column; align-items: center; justify-content: center; z-index: 10;
}
.progress-bar { width: 150px; height: 4px; background: #222; margin-top: 10px; border-radius: 2px; overflow: hidden; }
.progress-fill { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div>
            <div class="app-title">STAY SAFE ELITE</div>
            <div style="font-size: 10px; color: var(--dim); letter-spacing: 2px;">TANG SOO DO INTERACTIVE</div>
        </div>
    </div>

    <div class="avatar-stage">
        <div id="three-mount"></div>
        
        <div class="loader" id="loader">
            <div style="color: var(--gold); font-family: 'Bebas Neue'; font-size: 20px;">ΦΟΡΤΩΣΗ AVATAR...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div class="stage-overlay">
            <div class="phase-badge">
                <div class="phase-name" id="phase-label">READY</div>
                <div style="font-size: 10px; color: #aaa;">ΣΤΑΣΗ ΕΤΟΙΜΟΤΗΤΑΣ</div>
            </div>

            <div class="avatar-controls">
                <button class="av-btn" onclick="playNext()">ΕΠΟΜΕΝΗ ΚΙΝΗΣΗ ▶</button>
            </div>
        </div>
    </div>

    <div style="padding: 0 20px;">
        <div style="background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="color: var(--gold); font-family: 'Bebas Neue'; margin-bottom: 5px;">Πληροφορίες Άσκησης</h3>
            <p style="font-size: 14px; color: #ccc; line-height: 1.5;">
                Αυτό το 3D Avatar χρησιμοποιεί τις κινήσεις από το βίντεο που ανέβασες. 
                Πάτα το κουμπί για να δεις την ανάλυση της τεχνικής **High Block (Sang Dan Makgi)**.
            </p>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Ρυθμίσεις Σκηνής
const container = document.getElementById('three-mount');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

// Φωτισμός
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(2, 4, 2);
dirLight.castShadow = true;
scene.add(dirLight);

// Φόρτωση Avatar
const loader = new GLTFLoader();
let avatar, skeleton, bones = {};
const clock = new THREE.Clock();

// Ορισμός Στάσεων (Phases) - Προσαρμοσμένο στα bones του Ready Player Me
const phases = [
    { name: "READY", label: "ΕΤΟΙΜΟΤΗΤΑ", rotation: { 
        "RightArm": [0.5, 0, -0.2], "LeftArm": [0.5, 0, 0.2],
        "RightForeArm": [0.8, 0, 0], "LeftForeArm": [0.8, 0, 0] 
    }},
    { name: "CHAMBER", label: "ΠΡΟΕΤΟΙΜΑΣΙΑ", rotation: { 
        "RightArm": [0, 0, -1.2], "LeftArm": [0.6, 0, 0.5],
        "RightForeArm": [1.5, 0, 0], "LeftForeArm": [0.5, 0, 0] 
    }},
    { name: "BLOCK", label: "HIGH BLOCK!", rotation: { 
        "RightArm": [2.2, 0, -0.8], "LeftArm": [0.4, 0, 1.1],
        "RightForeArm": [0.5, 0.5, 0.3], "LeftForeArm": [1.2, 0, 0] 
    }}
];

let currentPhaseIdx = 0;

// Αρχείο που ανέβασες
const MODEL_URL = 'avatar (1).glb'; 

loader.load(MODEL_URL, (gltf) => {
    avatar = gltf.scene;
    scene.add(avatar);
    
    avatar.traverse(n => {
        if (n.isMesh) n.castShadow = n.receiveShadow = true;
        if (n.isBone) {
            // Καθαρισμός ονόματος (το RPM προσθέτει prefixes)
            const name = n.name.replace('MixamoRig', '').replace('Left', 'Left').replace('Right', 'Right');
            if (n.name.includes('RightArm')) bones.RightArm = n;
            if (n.name.includes('LeftArm')) bones.LeftArm = n;
            if (n.name.includes('RightForeArm')) bones.RightForeArm = n;
            if (n.name.includes('LeftForeArm')) bones.LeftForeArm = n;
        }
    });

    document.getElementById('loader').style.display = 'none';
    applyPhase(0);
}, 
(xhr) => {
    const p = (xhr.loaded / xhr.total) * 100;
    document.getElementById('progress-fill').style.width = p + '%';
});

function applyPhase(idx) {
    const p = phases[idx];
    document.getElementById('phase-label').innerText = p.label;
    
    for (let b in p.rotation) {
        if (bones[b]) {
            bones[b].rotation.set(p.rotation[b][0], p.rotation[b][1], p.rotation[b][2]);
        }
    }
}

window.playNext = () => {
    currentPhaseIdx = (currentPhaseIdx + 1) % phases.length;
    applyPhase(currentPhaseIdx);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

// Resize handling
window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>

</body>
</html>
