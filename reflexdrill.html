<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stay Safe Elite – High Block Drill with Kiai</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #f5c542; --red: #e8212a; --bg: #080810; --card: #10101c;
  --text: #f0ede8; --dim: #4a4a6a; --border: #1e1e2e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.app-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); letter-spacing: 2px; }

.avatar-stage {
  position: relative; margin: 15px 20px; border-radius: 16px;
  background: radial-gradient(circle at center, #1a1a2e 0%, #080810 100%);
  border: 1px solid var(--border); height: 420px; overflow: hidden;
}
#three-mount { width:100%; height:100%; }

.stage-overlay {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
}
.phase-badge { align-self: flex-start; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; border-left: 4px solid var(--red); backdrop-filter: blur(5px); }
.phase-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 1px; }

.avatar-controls { pointer-events: auto; display: flex; flex-direction: column; gap: 8px; align-self: flex-end; }
.av-btn {
  background: var(--card); border: 1px solid var(--border); color: white;
  padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700;
  text-transform: uppercase; transition: all 0.2s;
}
.av-btn.primary { background: var(--red); border: none; box-shadow: 0 4px 15px rgba(232,33,42,0.4); }
.av-btn:active { transform: scale(0.95); background: var(--gold); color: black; }

.loader {
  position: absolute; inset:0; background: var(--bg); display: flex; 
  flex-direction: column; align-items: center; justify-content: center; z-index: 10;
}
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div>
            <div class="app-title">STAY SAFE ELITE</div>
            <div style="font-size: 10px; color: var(--dim); letter-spacing: 2px;">TANG SOO DO INTERACTIVE</div>
        </div>
    </div>

    <div class="avatar-stage">
        <div id="three-mount"></div>
        
        <div class="loader" id="loader">
            <div style="color: var(--gold); font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 2px;">LOADING SENSEI...</div>
        </div>

        <div class="stage-overlay">
            <div class="phase-badge">
                <div class="phase-name" id="phase-label">READY</div>
                <div id="phase-sub" style="font-size: 10px; color: #aaa; text-transform: uppercase;">Chunbee</div>
            </div>

            <div class="avatar-controls">
                <button class="av-btn primary" id="autoBtn" onclick="runAutoSequence()">AUTO SEQUENCE ⚡</button>
                <button class="av-btn" onclick="playNext()">NEXT STEP ▶</button>
                <button class="av-btn" style="background: #111;" onclick="resetView()">RESET VIEW ↻</button>
            </div>
        </div>
    </div>

    <div style="padding: 0 20px;">
        <div style="background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="color: var(--gold); font-family: 'Bebas Neue'; font-size: 22px; margin-bottom: 8px;">Mastery Analysis</h3>
            <p id="drill-desc" style="font-size: 14px; color: #ccc; line-height: 1.6;">
                Ready stance. Focus your energy and prepare for the drill.
            </p>
        </div>
    </div>
</div>

<audio id="kiai-sound" src="kiai.mp3" preload="auto"></audio>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TWEEN } from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

const container = document.getElementById('three-mount');
const kiaiSound = document.getElementById('kiai-sound');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 3.8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const spot = new THREE.SpotLight(0xffffff, 15);
spot.position.set(2, 5, 2);
scene.add(spot);

const loader = new GLTFLoader();
let avatar, bones = {};

const phases = [
    { label: "READY", sub: "Chunbee", desc: "Balance your breath and posture.", rot: { "Spine": [0,0,0], "RightArm": [0.6, 0, -0.3], "LeftArm": [0.6, 0, 0.3], "RightForeArm": [0.9, 0, 0], "LeftForeArm": [0.9, 0, 0] }, speed: 800, ease: TWEEN.Easing.Quadratic.Out },
    { label: "CHAMBER", sub: "Preparation", desc: "Cross your arms. Load the power.", rot: { "Spine": [0.1, 0.3, 0], "RightArm": [1.1, 0.6, -1.3], "LeftArm": [0.5, 0, 0.6], "RightForeArm": [1.5, 0, 0], "LeftForeArm": [0.4, 0, 0] }, speed: 500, ease: TWEEN.Easing.Quadratic.Out },
    { label: "HIGH BLOCK", sub: "Sang Dan Makgi", desc: "KIAI! Explode upward with maximum power.", rot: { "Spine": [-0.1, -0.3, 0], "RightArm": [2.5, 0, -0.6], "LeftArm": [0.4, 0, 1.3], "RightForeArm": [0.7, 0.7, 0.2], "LeftForeArm": [1.5, 0, 0] }, speed: 200, ease: TWEEN.Easing.Back.Out }
];

let currentIdx = 0;
loader.load('avatar (1).glb', (gltf) => {
    avatar = gltf.scene;
    scene.add(avatar);
    avatar.traverse(n => {
        if (n.isBone) {
            if (n.name.includes('Spine2')) bones.Spine = n;
            if (n.name.includes('RightArm')) bones.RightArm = n;
            if (n.name.includes('LeftArm')) bones.LeftArm = n;
            if (n.name.includes('RightForeArm')) bones.RightForeArm = n;
            if (n.name.includes('LeftForeArm')) bones.LeftForeArm = n;
        }
    });
    document.getElementById('loader').style.display = 'none';
    animateToPhase(0);
});

function animateToPhase(idx) {
    currentIdx = idx;
    const p = phases[idx];
    document.getElementById('phase-label').innerText = p.label;
    document.getElementById('phase-sub').innerText = p.sub;
    document.getElementById('drill-desc').innerText = p.desc;
    
    if(p.label === "HIGH BLOCK") {
        kiaiSound.currentTime = 0;
        kiaiSound.play().catch(e => console.log("Audio needs user interaction first"));
        // Camera shake effect
        new TWEEN.Tween(camera.position).to({ x: 0.05 }, 50).repeat(3).yoyo(true).start();
    }

    for (let b in p.rot) {
        if (bones[b]) {
            new TWEEN.Tween(bones[b].rotation).to({ x: p.rot[b][0], y: p.rot[b][1], z: p.rot[b][2] }, p.speed).easing(p.ease).start();
        }
    }
}

window.playNext = () => animateToPhase((currentIdx + 1) % phases.length);

window.runAutoSequence = async () => {
    const btn = document.getElementById('autoBtn');
    btn.disabled = true;
    animateToPhase(0); 
    await new Promise(r => setTimeout(r, 1200));
    animateToPhase(1); 
    await new Promise(r => setTimeout(r, 800));
    animateToPhase(2); // KIAI triggers here
    await new Promise(r => setTimeout(r, 2000));
    animateToPhase(0);
    btn.disabled = false;
};

window.resetView = () => controls.reset();
function animate(time) { requestAnimationFrame(animate); TWEEN.update(time); controls.update(); renderer.render(scene, camera); }
animate();
</script>
</body>
</html>
