<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StaySafeTips Elite – Tang Soo Do Master</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #f5c542; --red: #e8212a; --bg: #080810; --card: #10101c;
  --text: #f0ede8; --dim: #4a4a6a; --border: #1e1e2e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
.brand-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); letter-spacing: 2px; line-height: 1; }
.brand-sub { font-size: 10px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }

.avatar-stage {
  position: relative; margin: 15px 20px; border-radius: 16px;
  background: radial-gradient(circle at center, #1a1a2e 0%, #080810 100%);
  border: 1px solid var(--border); height: 400px; overflow: hidden;
}
#three-mount { width:100%; height:100%; }

.stage-overlay {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
}
.phase-badge { align-self: flex-start; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; border-left: 4px solid var(--gold); }
.phase-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); }

.avatar-controls { pointer-events: auto; display: flex; flex-direction: column; gap: 8px; align-self: flex-end; }
.av-btn {
  background: var(--card); border: 1px solid var(--border); color: white;
  padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 700;
  text-transform: uppercase; transition: 0.2s;
}
.av-btn.primary { background: var(--red); border: none; box-shadow: 0 4px 15px rgba(232,33,42,0.3); }
.av-btn:active { transform: scale(0.95); background: var(--gold); color: #000; }

.info-card {
  margin: 0 20px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border);
}
.info-title { color: var(--gold); font-family: 'Bebas Neue'; font-size: 22px; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div>
            <div class="brand-title">StaySafeTips Elite</div>
            <div class="brand-sub">TANG SOO DO INTERACTIVE</div>
        </div>
    </div>

    <div class="avatar-stage">
        <div id="three-mount"></div>
        <div class="stage-overlay">
            <div class="phase-badge">
                <div class="phase-name" id="phase-label">READY</div>
                <div id="phase-sub" style="font-size: 10px; color: #aaa;">CHUNBEE</div>
            </div>
            <div class="avatar-controls">
                <button class="av-btn primary" id="autoBtn" onclick="runAutoDrill()">START DRILL ⚡</button>
                <button class="av-btn" onclick="playNext()">NEXT STEP ▶</button>
            </div>
        </div>
    </div>

    <div class="info-card">
        <h3 class="info-title">Technique Analysis</h3>
        <p id="drill-desc" style="font-size: 14px; color: #ccc; line-height: 1.5;">
            Master the High Block (Sang Dan Makgi). Focus on the 45-degree forearm angle and hip rotation.
        </p>
    </div>
</div>

<audio id="kiai-audio" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TWEEN } from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

const container = document.getElementById('three-mount');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(2, 4, 2);
scene.add(light);

const loader = new GLTFLoader();
let avatar, bones = {};

const phases = [
    { label: "READY", sub: "CHUNBEE", desc: "Balance your weight and focus.", speed: 800,
      rot: { "Spine": [0,0,0], "RightArm": [0.6, 0, -0.3], "LeftArm": [0.6, 0, 0.3], "RightForeArm": [0.9, 0, 0], "LeftForeArm": [0.9, 0, 0] }},
    { label: "CHAMBER", sub: "PREPARATION", desc: "Cross the blocking arm to the opposite hip/shoulder.", speed: 500,
      rot: { "Spine": [0.1, 0.3, 0], "RightArm": [1.1, 0.5, -1.2], "LeftArm": [0.4, 0, 0.5], "RightForeArm": [1.4, 0, 0], "LeftForeArm": [0.3, 0, 0] }},
    { label: "HIGH BLOCK", sub: "SANG DAN MAKGI", desc: "EXPLODE upward! Deflect at a 45° angle.", speed: 200,
      rot: { "Spine": [-0.1, -0.4, 0], "RightArm": [2.5, 0, -0.6], "LeftArm": [0.3, 0, 1.3], "RightForeArm": [0.6, 0.7, 0.2], "LeftForeArm": [1.5, 0, 0] }}
];

let currentIdx = 0;

loader.load('avatar (1).glb', (gltf) => {
    avatar = gltf.scene;
    scene.add(avatar);
    
    avatar.traverse(n => {
        if (n.isBone) {
            const name = n.name;
            if (name.includes('Spine2')) bones.Spine = n;
            if (name.includes('RightArm')) bones.RightArm = n;
            if (name.includes('LeftArm')) bones.LeftArm = n;
            if (name.includes('RightForeArm')) bones.RightForeArm = n;
            if (name.includes('LeftForeArm')) bones.LeftForeArm = n;
        }
        // Change Outfit Color to Royal Blue
        if (n.isMesh && (n.name.includes('Outfit') || n.name.includes('Top') || n.name.includes('Bottom'))) {
            n.material.color.setHex(0x1a3a6c); 
        }
    });
    applyPhase(0);
});

function applyPhase(idx) {
    currentIdx = idx;
    const p = phases[idx];
    document.getElementById('phase-label').innerText = p.label;
    document.getElementById('drill-desc').innerText = p.desc;
    
    if(p.label === "HIGH BLOCK") document.getElementById('kiai-audio').play();

    for (let b in p.rot) {
        if (bones[b]) {
            new TWEEN.Tween(bones[b].rotation)
                .to({ x: p.rot[b][0], y: p.rot[b][1], z: p.rot[b][2] }, p.speed)
                .easing(idx === 2 ? TWEEN.Easing.Back.Out : TWEEN.Easing.Quadratic.Out)
                .start();
        }
    }
}

window.playNext = () => applyPhase((currentIdx + 1) % phases.length);

window.runAutoDrill = async () => {
    const btn = document.getElementById('autoBtn');
    btn.disabled = true;
    applyPhase(0); await new Promise(r => setTimeout(r, 1000));
    applyPhase(1); await new Promise(r => setTimeout(r, 700));
    applyPhase(2); await new Promise(r => setTimeout(r, 2000));
    applyPhase(0);
    btn.disabled = false;
};

function animate(time) {
    requestAnimationFrame(animate);
    TWEEN.update(time);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
