<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tang Soo Do Elite – Reflex Drills</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --n-red: #e50914; --gold: #facc15; --bg: #050505; --card: #181818; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Barlow Condensed', sans-serif; overflow-x: hidden; }

    header {
        padding: 40px 20px 10px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        position: sticky; top: 0; z-index: 1000;
        display: flex; justify-content: space-between; align-items: center;
    }

    .back-btn { color: #aaa; text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: 1px; }
    .logo { font-family: 'Bebas Neue'; color: var(--n-red); font-size: 1.8rem; }
    
    .nav-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    
    .tab-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-family: 'Bebas Neue'; font-size: 1rem; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--n-red); }

    .hero-display { width: 100%; height: 50vh; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
    .hero-image { height: 95%; width: auto; object-fit: contain; transition: opacity 0.3s ease; }
    .step-tag { position: absolute; top: 20px; left: 20px; background: var(--n-red); padding: 5px 15px; font-family: 'Bebas Neue'; font-size: 1.4rem; }

    .content { padding: 20px; }
    .tech-title { font-family: 'Bebas Neue'; font-size: 3.5rem; color: var(--gold); margin: 0; }
    
    .steps-wrapper { display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
    .step-card { background: var(--card); padding: 25px; border-left: 6px solid #333; transition: 0.3s; cursor: pointer; }
    .step-card.active { border-left-color: var(--n-red); background: #222; }
    
    .s-title { font-family: 'Bebas Neue'; font-size: 1.6rem; color: var(--gold); }
    .s-desc { font-size: 1.3rem; color: #fff; margin-top: 10px; line-height: 1.4; font-weight: 500; }

    .action-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, #000, transparent); display: flex; justify-content: center; z-index: 100; }
    .btn-next { background: white; color: black; border: none; padding: 18px; font-family: 'Bebas Neue'; font-size: 1.6rem; border-radius: 4px; width: 95%; cursor: pointer; }
</style>
</head>
<body>

<header>
    <a href="technique_library.html" class="back-btn">← BACK TO DOJO</a>
    <div class="logo">ELITE DRILLS</div>
</header>

<div class="nav-tabs" id="techTabs"></div>

<div class="hero-display">
    <div class="step-tag" id="tag">STEP 1</div>
    <img src="" id="mainImg" class="hero-image">
</div>

<div class="content">
    <h1 class="tech-title" id="displayTitle">HIGH BLOCK</h1>
    <div style="font-family: 'Bebas Neue'; margin-bottom: 20px; color: #46d369; font-size: 1.1rem;">SANG DAN MAKGI • MASTER LEVEL</div>
    <div class="steps-wrapper" id="stepsWrapper"></div>
</div>

<div class="action-bar">
    <button class="btn-next" onclick="nextStep()">▶ NEXT STEP</button>
</div>

<script>
    // Φόρτωση ήχου κραυγής
    const kiaiSound = new Audio('kiai.mp3');

    const DRILLS = [
        {
            title: "HIGH BLOCK",
            imgPrefix: "athlete_highblock",
            steps: [
                { name: "Chamber Position", desc: "Cross arms at chest level. Right hand to left hip, left hand at ribs." },
                { name: "Rising Motion", desc: "Drive the blocking arm upward in a strong arc. Rotate hips." },
                { name: "Final Lock", desc: "Arm at 45° above forehead. Solid front stance for power." }
            ]
        },
        {
            title: "LOW BLOCK",
            imgPrefix: "athlete_lowblock",
            steps: [
                { name: "Shoulder Prep", desc: "Right fist to left shoulder. Left arm extended down." },
                { name: "The Sweep", desc: "Forceful downward sweep across the body. Rotate the wrist." },
                { name: "The Lock", desc: "Stop 2 inches above the thigh. Opposite hand chambered at ribs." }
            ]
        },
        {
            title: "PALM STRIKE",
            imgPrefix: "athlete_palm",
            steps: [
                { name: "Power Chamber", desc: "Open palm at ribs, fingers curled. Deep stance for leverage." },
                { name: "Impact Thrust", desc: "Explosive forward movement. Aim with base of the palm." },
                { name: "Full Extension", desc: "Arm fully extended at head height. Back leg locked for power." }
            ]
        }
    ];

    let currentDrillIdx = 0; let currentStepIdx = 0;

    function init() {
        const tabs = document.getElementById('techTabs');
        tabs.innerHTML = DRILLS.map((d, i) => `<button class="tab-btn ${i===0?'active':''}" onclick="changeDrill(${i})">${d.title}</button>`).join('');
        loadDrill();
    }

    function changeDrill(idx) {
        currentDrillIdx = idx; currentStepIdx = 0;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
        loadDrill();
    }

    function loadDrill() {
        const drill = DRILLS[currentDrillIdx];
        document.getElementById('displayTitle').innerText = drill.title;
        const wrapper = document.getElementById('stepsWrapper');
        wrapper.innerHTML = drill.steps.map((s, i) => `
            <div class="step-card ${i===0?'active':''}" id="card-${i}" onclick="goToStep(${i})">
                <div class="s-title">STEP ${i+1}: ${s.name}</div>
                <div class="s-desc">${s.desc}</div>
            </div>
        `).join('');
        updateUI();
    }

    function updateUI() {
        const drill = DRILLS[currentDrillIdx];
        const main = document.getElementById('mainImg');
        main.style.opacity = '0';
        setTimeout(() => {
            main.src = `${drill.imgPrefix}_${currentStepIdx + 1}.jpg`;
            main.style.opacity = '1';
            document.getElementById('tag').innerText = `STEP ${currentStepIdx + 1}`;
            document.querySelectorAll('.step-card').forEach((c, i) => c.classList.toggle('active', i === currentStepIdx));
        }, 200);
    }

    function nextStep() {
        kiaiSound.currentTime = 0; 
        kiaiSound.play().catch(e => console.log("Audio waiting for user interaction"));
        currentStepIdx = (currentStepIdx + 1) % DRILLS[currentDrillIdx].steps.length; 
        updateUI(); 
    }
    
    function goToStep(idx) { currentStepIdx = idx; updateUI(); }
    window.onload = init;
</script>

</body>
</html>
