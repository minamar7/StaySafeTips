<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tang Soo Do — High Block (Sang Dan Makgi)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #10101a;
    --accent: #e8212a;
    --accent2: #ff6b35;
    --gold: #f5c842;
    --white: #f0ede8;
    --dim: #5a5570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background dojo texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
    pointer-events: none;
  }

  /* Glow bg behind avatar */
  .glow-bg {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,33,42,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    animation: pulseGlow 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulseGlow {
    0%,100% { opacity: 0.7; transform: translate(-50%,-55%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-55%) scale(1.12); }
  }

  .wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Title */
  .title-block {
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .title-ko {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .title-main {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--white);
    line-height: 1;
  }

  .title-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--dim);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* SVG Stage */
  .stage {
    position: relative;
    z-index: 2;
  }

  .stage svg {
    filter: drop-shadow(0 0 18px rgba(232,33,42,0.35));
  }

  /* Floor line */
  .floor-line {
    position: absolute;
    bottom: 18px; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
    opacity: 0.5;
    border-radius: 2px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 2;
  }

  button {
    background: none;
    border: 1.5px solid var(--dim);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 8px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }

  button:hover { border-color: var(--accent); }
  button:hover::before { transform: translateX(0); }

  button.active { border-color: var(--accent); background: rgba(232,33,42,0.15); }

  /* Step indicator */
  .phase-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    min-width: 180px;
    text-align: center;
  }

  /* Belt color dots */
  .belt-row {
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 2;
  }

  .belt-dot {
    width: 18px; height: 18px;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }

  .belt-dot:hover, .belt-dot.active-belt { border-color: var(--white); transform: scale(1.2); }

  .belt-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* Move labels */
  .move-steps {
    display: flex;
    gap: 6px;
    z-index: 2;
  }

  .step-pill {
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    border: 1px solid var(--dim);
    color: var(--dim);
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .step-pill.active-step {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(245,200,66,0.08);
  }

  /* Korean badge */
  .korean-badge {
    position: absolute;
    top: 12px; right: -50px;
    writing-mode: vertical-rl;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    color: rgba(232,33,42,0.3);
    letter-spacing: 4px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="glow-bg"></div>

  <div class="title-block">
    <div class="title-ko">당수도 · Tang Soo Do</div>
    <div class="title-main">HIGH BLOCK</div>
    <div class="title-sub">Sang Dan Makgi · 상단 막기</div>
  </div>

  <div class="stage">
    <div class="korean-badge">唐手道</div>
    <svg id="avatar" width="260" height="340" viewBox="0 0 260 340">
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f0ede8"/>
          <stop offset="100%" stop-color="#b0aaa0"/>
        </linearGradient>
        <linearGradient id="uniformGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#e8e2d8"/>
          <stop offset="100%" stop-color="#c8c0b0"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softShadow">
          <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
      </defs>

      <!-- Shadow on floor -->
      <ellipse id="shadow" cx="130" cy="322" rx="42" ry="8" fill="rgba(0,0,0,0.4)"/>

      <!-- RIGHT LEG BACK -->
      <g id="leg-right-back">
        <line id="thigh-r-back" x1="130" y1="230" x2="118" y2="282" stroke="url(#uniformGrad)" stroke-width="14" stroke-linecap="round"/>
        <line id="shin-r-back" x1="118" y1="282" x2="112" y2="318" stroke="url(#uniformGrad)" stroke-width="11" stroke-linecap="round"/>
        <ellipse id="foot-r-back" cx="110" cy="320" rx="14" ry="6" fill="#2a2a2a" rx="14" ry="6"/>
      </g>

      <!-- LEFT LEG FRONT -->
      <g id="leg-left-front">
        <line id="thigh-l" x1="130" y1="230" x2="144" y2="282" stroke="url(#uniformGrad)" stroke-width="14" stroke-linecap="round"/>
        <line id="shin-l" x1="144" y1="282" x2="150" y2="318" stroke="url(#uniformGrad)" stroke-width="11" stroke-linecap="round"/>
        <ellipse id="foot-l" cx="152" cy="320" rx="14" ry="6" fill="#1a1a1a" rx="14" ry="6"/>
      </g>

      <!-- Belt -->
      <g id="belt">
        <rect id="belt-rect" x="110" y="224" width="40" height="7" rx="2" fill="#1a1a1a"/>
        <rect id="belt-knot" x="125" y="222" width="10" height="11" rx="2" fill="#1a1a1a"/>
        <line x1="122" y1="233" x2="118" y2="248" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <line x1="138" y1="233" x2="142" y2="248" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      </g>

      <!-- TORSO / Dobok -->
      <g id="torso">
        <path id="torso-body" d="M108,155 C106,170 104,200 108,228 L152,228 C156,200 154,170 152,155 Z" fill="url(#uniformGrad)" filter="url(#softShadow)"/>
        <!-- Dobok lapels -->
        <path d="M130,155 L118,175 L130,185 L142,175 Z" fill="rgba(200,195,185,0.8)" stroke="rgba(150,145,135,0.5)" stroke-width="0.5"/>
        <line x1="130" y1="185" x2="130" y2="228" stroke="rgba(150,145,135,0.4)" stroke-width="1"/>
      </g>

      <!-- LEFT ARM (guard arm — stays lower) -->
      <g id="arm-left">
        <line id="upper-arm-l" x1="108" y1="165" x2="88" y2="195" stroke="url(#uniformGrad)" stroke-width="13" stroke-linecap="round"/>
        <line id="lower-arm-l" x1="88" y1="195" x2="74" y2="215" stroke="url(#bodyGrad)" stroke-width="11" stroke-linecap="round"/>
        <ellipse id="fist-l" cx="70" cy="218" rx="9" ry="7" fill="url(#bodyGrad)" transform="rotate(-20,70,218)"/>
      </g>

      <!-- RIGHT ARM (blocking arm — animates UP) -->
      <g id="arm-right">
        <line id="upper-arm-r" x1="152" y1="165" x2="172" y2="165" stroke="url(#uniformGrad)" stroke-width="13" stroke-linecap="round"/>
        <line id="lower-arm-r" x1="172" y1="165" x2="182" y2="145" stroke="url(#bodyGrad)" stroke-width="11" stroke-linecap="round"/>
        <ellipse id="fist-r" cx="185" cy="142" rx="9" ry="7" fill="url(#bodyGrad)" transform="rotate(30,185,142)"/>
      </g>

      <!-- NECK -->
      <rect id="neck" x="123" y="137" width="14" height="20" rx="5" fill="url(#bodyGrad)"/>

      <!-- HEAD -->
      <g id="head">
        <ellipse id="skull" cx="130" cy="122" rx="26" ry="28" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
        <!-- Hair -->
        <path d="M104,115 C104,98 108,90 130,88 C152,90 156,98 156,115" fill="#1a1210"/>
        <!-- Eyes -->
        <ellipse id="eye-l" cx="120" cy="118" rx="4" ry="4.5" fill="#1a1210"/>
        <ellipse id="eye-r" cx="140" cy="118" rx="4" ry="4.5" fill="#1a1210"/>
        <circle cx="121" cy="117" r="1.5" fill="white"/>
        <circle cx="141" cy="117" r="1.5" fill="white"/>
        <!-- Determined expression — straight mouth -->
        <path id="mouth" d="M123,132 Q130,134 137,132" stroke="#8a6a60" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Eyebrows — focused -->
        <path d="M115,111 Q120,108 125,110" stroke="#1a1210" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M135,110 Q140,108 145,111" stroke="#1a1210" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Ear -->
        <ellipse cx="104" cy="122" rx="5" ry="7" fill="url(#bodyGrad)"/>
      </g>

      <!-- Impact flash (hidden by default) -->
      <g id="impact-flash" opacity="0">
        <circle cx="185" cy="130" r="22" fill="none" stroke="#f5c842" stroke-width="3" filter="url(#glow)"/>
        <circle cx="185" cy="130" r="14" fill="rgba(245,200,66,0.15)"/>
        <!-- Burst lines -->
        <line x1="185" y1="100" x2="185" y2="92" stroke="#f5c842" stroke-width="2"/>
        <line x1="208" y1="107" x2="214" y2="101" stroke="#f5c842" stroke-width="2"/>
        <line x1="215" y1="130" x2="223" y2="130" stroke="#f5c842" stroke-width="2"/>
        <line x1="208" y1="153" x2="214" y2="159" stroke="#f5c842" stroke-width="2"/>
        <line x1="162" y1="107" x2="156" y2="101" stroke="#f5c842" stroke-width="2"/>
      </g>

      <!-- Ki energy line -->
      <line id="ki-line" x1="130" y1="310" x2="130" y2="95" stroke="url(#kiGrad)" stroke-width="1" opacity="0" stroke-dasharray="4 6">
        <defs>
          <linearGradient id="kiGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="transparent"/>
            <stop offset="100%" stop-color="rgba(232,33,42,0.6)"/>
          </linearGradient>
        </defs>
      </line>
    </svg>
    <div class="floor-line"></div>
  </div>

  <!-- Step labels -->
  <div class="move-steps">
    <div class="step-pill active-step" id="step0">準備 Ready</div>
    <div class="step-pill" id="step1">Chamber</div>
    <div class="step-pill" id="step2">Rising</div>
    <div class="step-pill" id="step3">Block!</div>
    <div class="step-pill" id="step4">Hold</div>
  </div>

  <!-- Phase label -->
  <div class="phase-label" id="phase-label">준비 — Ready Stance</div>

  <!-- Controls -->
  <div class="controls">
    <button id="btn-auto" class="active" onclick="toggleAuto()">⟳ Auto</button>
    <button onclick="prevFrame()">◀ Prev</button>
    <button onclick="nextFrame()">Next ▶</button>
  </div>

  <!-- Belt selector -->
  <div style="display:flex;align-items:center;gap:12px;z-index:2;">
    <div class="belt-label">Belt:</div>
    <div class="belt-row" id="belt-row"></div>
  </div>
</div>

<script>
// ─── ANIMATION KEYFRAMES ───────────────────────────────────────────────────
// Each frame defines the position of the blocking (right) arm
// Poses: ready → chamber → rising → block → hold

const phases = [
  {
    label: '준비 — Ready Stance',
    // Right arm: natural guard position
    upperArmR: { x1:152,y1:165, x2:172,y2:195 },
    lowerArmR: { x1:172,y1:195, x2:162,y2:215 },
    fistR: { cx:158,cy:218, rotate:10 },
    // Left arm: natural guard
    upperArmL: { x1:108,y1:165, x2:88,y2:195 },
    lowerArmL: { x1:88,y1:195, x2:74,y2:215 },
    fistL: { cx:70,cy:218, rotate:-20 },
    // Torso: straight
    torso: 'M108,155 C106,170 104,200 108,228 L152,228 C156,200 154,170 152,155 Z',
    headX: 130,
    flash: 0, ki: 0
  },
  {
    label: 'Chamber — 당겨 (Danggyeo)',
    // Right arm pulls to hip (chamber)
    upperArmR: { x1:152,y1:165, x2:165,y2:188 },
    lowerArmR: { x1:165,y1:188, x2:172,y2:208 },
    fistR: { cx:175,cy:212, rotate:45 },
    // Left arm extends forward in guard
    upperArmL: { x1:108,y1:165, x2:82,y2:178 },
    lowerArmL: { x1:82,y1:178, x2:66,y2:192 },
    fistL: { cx:61,cy:194, rotate:-10 },
    torso: 'M108,155 C106,170 104,200 108,228 L152,228 C156,200 154,170 152,155 Z',
    headX: 130,
    flash: 0, ki: 0.3
  },
  {
    label: 'Rising — 올리기 (Olligi)',
    // Right arm sweeping upward diagonal
    upperArmR: { x1:152,y1:165, x2:175,y2:150 },
    lowerArmR: { x1:175,y1:150, x2:188,y2:133 },
    fistR: { cx:192,cy:129, rotate:30 },
    // Left arm retracts to hip
    upperArmL: { x1:108,y1:165, x2:90,y2:182 },
    lowerArmL: { x1:90,y1:182, x2:78,y2:202 },
    fistL: { cx:74,cy:206, rotate:-15 },
    torso: 'M110,155 C108,170 106,200 108,228 L152,228 C155,200 154,170 150,155 Z',
    headX: 131,
    flash: 0, ki: 0.7
  },
  {
    label: 'High Block! — 상단막기 (Sang Dan Makgi)',
    // Right arm fully extended ABOVE head
    upperArmR: { x1:152,y1:165, x2:172,y2:148 },
    lowerArmR: { x1:172,y1:148, x2:190,y2:128 },
    fistR: { cx:194,cy:124, rotate:35 },
    // Left arm guard / reverse punch position
    upperArmL: { x1:108,y1:165, x2:86,y2:172 },
    lowerArmL: { x1:86,y1:172, x2:70,y2:185 },
    fistL: { cx:65,cy:188, rotate:-5 },
    torso: 'M112,155 C110,170 108,200 110,228 L152,228 C154,200 152,170 148,155 Z',
    headX: 132,
    flash: 1, ki: 1
  },
  {
    label: 'Hold — 유지 (Yuji)',
    // Same as block but settle
    upperArmR: { x1:152,y1:165, x2:170,y2:150 },
    lowerArmR: { x1:170,y1:150, x2:188,y2:132 },
    fistR: { cx:192,cy:128, rotate:33 },
    upperArmL: { x1:108,y1:165, x2:87,y2:173 },
    lowerArmL: { x1:87,y1:173, x2:72,y2:187 },
    fistL: { cx:67,cy:190, rotate:-6 },
    torso: 'M112,155 C110,170 108,200 110,228 L152,228 C154,200 152,170 148,155 Z',
    headX: 132,
    flash: 0, ki: 0.5
  }
];

let currentFrame = 0;
let autoPlay = true;
let autoTimer = null;
const FRAME_DURATION = [1200, 900, 700, 800, 1400];

function lerp(a, b, t) { return a + (b - a) * t; }

function applyFrame(idx) {
  const p = phases[idx];

  // Arms
  setLine('upper-arm-r', p.upperArmR);
  setLine('lower-arm-r', p.lowerArmR);
  setEllipse('fist-r', p.fistR);
  setLine('upper-arm-l', p.upperArmL);
  setLine('lower-arm-l', p.lowerArmL);
  setEllipse('fist-l', p.fistL);

  // Torso
  document.getElementById('torso-body').setAttribute('d', p.torso);

  // Head lean
  const head = document.getElementById('head');
  head.setAttribute('transform', `translate(${p.headX - 130},0)`);
  document.getElementById('neck').setAttribute('x', p.headX - 7);

  // Impact flash
  document.getElementById('impact-flash').style.opacity = p.flash;
  document.getElementById('ki-line').style.opacity = p.ki * 0.6;

  // Step pills
  for (let i = 0; i < 5; i++) {
    document.getElementById(`step${i}`).className = 'step-pill' + (i === idx ? ' active-step' : '');
  }

  // Phase label
  document.getElementById('phase-label').textContent = p.label;
}

function setLine(id, coords) {
  const el = document.getElementById(id);
  el.setAttribute('x1', coords.x1); el.setAttribute('y1', coords.y1);
  el.setAttribute('x2', coords.x2); el.setAttribute('y2', coords.y2);
}

function setEllipse(id, coords) {
  const el = document.getElementById(id);
  el.setAttribute('cx', coords.cx); el.setAttribute('cy', coords.cy);
  el.setAttribute('transform', `rotate(${coords.rotate},${coords.cx},${coords.cy})`);
}

function nextFrame() {
  currentFrame = (currentFrame + 1) % phases.length;
  applyFrame(currentFrame);
}

function prevFrame() {
  currentFrame = (currentFrame - 1 + phases.length) % phases.length;
  applyFrame(currentFrame);
}

function scheduleNext() {
  if (!autoPlay) return;
  autoTimer = setTimeout(() => {
    nextFrame();
    scheduleNext();
  }, FRAME_DURATION[currentFrame]);
}

function toggleAuto() {
  autoPlay = !autoPlay;
  const btn = document.getElementById('btn-auto');
  btn.classList.toggle('active', autoPlay);
  if (autoPlay) { scheduleNext(); }
  else { clearTimeout(autoTimer); }
}

// ─── BELT COLORS ───────────────────────────────────────────────────────────
const belts = [
  { color: '#ffffff', name: 'White', belt: '#e8e2d8' },
  { color: '#f5c842', name: 'Yellow', belt: '#f5c842' },
  { color: '#27a85f', name: 'Green', belt: '#27a85f' },
  { color: '#2255cc', name: 'Blue', belt: '#2255cc' },
  { color: '#cc2222', name: 'Red', belt: '#cc2222' },
  { color: '#1a1a1a', name: 'Black', belt: '#1a1a1a' },
];

let activeBelt = 5; // default black

function buildBeltRow() {
  const row = document.getElementById('belt-row');
  belts.forEach((b, i) => {
    const dot = document.createElement('div');
    dot.className = 'belt-dot' + (i === activeBelt ? ' active-belt' : '');
    dot.style.background = b.color;
    dot.title = b.name;
    dot.onclick = () => {
      activeBelt = i;
      document.querySelectorAll('.belt-dot').forEach((d,j) => d.className = 'belt-dot' + (j === i ? ' active-belt' : ''));
      // Update belt color
      document.getElementById('belt-rect').setAttribute('fill', b.belt);
      document.getElementById('belt-knot').setAttribute('fill', b.belt);
      document.querySelectorAll('#belt line').forEach(l => l.setAttribute('stroke', b.belt));
    };
    row.appendChild(dot);
  });
}

buildBeltRow();
applyFrame(0);
scheduleNext();
</script>
</body>
</html>
