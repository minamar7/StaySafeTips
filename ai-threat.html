<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>AI Threat Analyzer – Stay Safe Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#020617"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #020917;
  --accent: #38bdf8;
  --gold: #facc15;
  --danger: #ef4444;
  --safe: #22c55e;
  --warn: #f59e0b;
  --panel: rgba(15, 23, 42, 0.9);
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background Effects */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px), 
                    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% -20%, rgba(56,189,248,0.15), transparent 70%);
}

.shell {
  position: relative; z-index: 2;
  max-width: 480px; margin: 0 auto;
  padding: 20px 20px 100px;
  display: flex; flex-direction: column; gap: 18px;
}

/* Back Button */
.nav-header {
  display: flex; justify-content: flex-start; margin-bottom: 5px;
}
.btn-back {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8;
  padding: 10px 18px;
  border-radius: 12px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-decoration: none;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-back:hover { 
  background: rgba(56,189,248,0.12); 
  color: var(--accent);
  border-color: var(--accent);
}

.header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 30px; padding: 5px 14px;
  font-size: 0.68rem; letter-spacing: 2px; color: var(--accent);
  text-transform: uppercase; width: fit-content;
}

h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 2px; line-height: 1.2; }
h1 span { color: var(--accent); text-shadow: 0 0 15px rgba(56,189,248,0.4); }

/* Scenario Grid */
.scenario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.scenario-btn {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px 10px;
  cursor: pointer; transition: 0.3s;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.scenario-btn.active {
  border-color: var(--accent);
  background: rgba(56,189,248,0.1);
  box-shadow: 0 0 25px rgba(56,189,248,0.2);
}

.icon-box {
  font-size: 2.2rem;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.1));
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.scenario-btn.active .icon-box {
  transform: scale(1.25) translateY(-5px);
  filter: drop-shadow(0 0 15px var(--accent));
}

.scenario-name {
  font-size: 0.75rem; letter-spacing: 1.5px;
  color: #64748b; text-transform: uppercase; font-weight: 700;
}
.scenario-btn.active .scenario-name { color: #fff; }

/* Input Area */
.input-group { margin-top: 10px; }
textarea {
  width: 100%; min-height: 130px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 18px;
  color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1.05rem;
  outline: none; transition: 0.3s; resize: none;
}
textarea:focus { 
  border-color: var(--accent); 
  background: rgba(15, 23, 42, 0.8);
  box-shadow: 0 0 20px rgba(56,189,248,0.1);
}

/* Analyze Button */
.btn-analyze {
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  border: none; border-radius: 16px;
  color: #fff; font-family: 'Orbitron', sans-serif;
  font-weight: 900; letter-spacing: 2.5px;
  cursor: pointer; box-shadow: 0 10px 30px rgba(14,165,233,0.3);
  transition: 0.3s; text-transform: uppercase;
}
.btn-analyze:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(14,165,233,0.2); }
.btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

/* Result Card */
.result-card {
  background: var(--panel);
  border-radius: 24px; border: 1px solid rgba(56,189,248,0.3);
  display: none; margin-top: 10px; overflow: hidden;
  animation: slideUp 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
}
.result-card.visible { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.result-header {
  padding: 20px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(56,189,248,0.05); border-bottom: 1px solid rgba(56,189,248,0.1);
}
.threat-badge {
  padding: 6px 16px; border-radius: 8px;
  font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 900;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.threat-score { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: #fff; }

.result-body { padding: 25px; }
.result-label { font-size: 0.65rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
.result-text { color: #e2e8f0; line-height: 1.7; font-size: 1rem; letter-spacing: 0.2px; }

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="shell">
  <nav class="nav-header">
    <a href="https://minamar7.github.io/StaySafeTips/" class="btn-back"><span>←</span> BACK TO HUB</a>
  </nav>

  <div class="header-badge">AI ANALYZER v1.5 FLASH</div>
  <h1>🤖 <span>ELITE</span> THREAT<br>ANALYSIS</h1>

  <div class="scenario-grid">
    <button class="scenario-btn active" data-scenario="personal" onclick="selectScenario(this)">
      <span class="icon-box">🛡️</span>
      <span class="scenario-name">Personal</span>
    </button>
    <button class="scenario-btn" data-scenario="cyber" onclick="selectScenario(this)">
      <span class="icon-box">🔐</span>
      <span class="scenario-name">Cyber</span>
    </button>
    <button class="scenario-btn" data-scenario="environment" onclick="selectScenario(this)">
      <span class="icon-box">🌪️</span>
      <span class="scenario-name">Nature</span>
    </button>
    <button class="scenario-btn" data-scenario="emergency" onclick="selectScenario(this)">
      <span class="icon-box">🆘</span>
      <span class="scenario-name">Emergency</span>
    </button>
  </div>

  <div class="input-group">
    <label class="result-label">Situation Details</label>
    <textarea id="situation" placeholder="Describe the threat or situation in detail..."></textarea>
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">START AI SCAN</button>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="threat-badge" id="threatBadge">—</span>
      <span class="threat-score" id="threatScore">—</span>
    </div>
    <div class="result-body">
      <div class="result-label">AI Security Assessment</div>
      <div class="result-text" id="assessmentText"></div>
    </div>
  </div>
</div>

<script>
let selectedScenario = 'personal';

function selectScenario(btn) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedScenario = btn.dataset.scenario;
}

async function analyze() {
  const situationInput = document.getElementById('situation');
  const situation = situationInput.value.trim();
  
  if (situation.length < 10) { 
    alert('Please describe your situation more clearly (at least 10 characters).'); 
    return; 
  }

  const btn = document.getElementById('analyzeBtn');
  const card = document.getElementById('resultCard');
  
  btn.disabled = true;
  btn.textContent = '⚡ SCANNING CORE...';

  try {
    // Χρησιμοποιούμε POST με ρητό CORS mode
    const res = await fetch('https://stay-safe-tips.vercel.app/api/analyze', {
      method: 'POST',
      mode: 'cors',
      headers: { 
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ 
        situation: situation, 
        scenario: selectedScenario 
      })
    });

    if (!res.ok) {
        throw new Error('Server connectivity issue (Status: ' + res.status + ')');
    }

    const data = await res.json();
    
    // Εμφάνιση Card
    card.classList.add('visible');
    
    // Ενημέρωση Badge & Score
    const badge = document.getElementById('threatBadge');
    const level = (data.level || 'medium').toLowerCase();
    badge.textContent = level.toUpperCase();
    
    // Χρώματα ανάλογα με το ρίσκο
    const colors = { 
      low: '#22c55e', 
      medium: '#f59e0b', 
      high: '#ef4444', 
      critical: '#7f1d1d' 
    };
    badge.style.background = colors[level] || colors.medium;
    
    document.getElementById('threatScore').textContent = (data.score || 0) + '%';
    
    // Εμφάνιση κειμένου (υποστήριξη για assessment ή advice)
    document.getElementById('assessmentText').textContent = data.assessment || data.advice || 'Analysis complete. Stay vigilant.';

    // Smooth Scroll στο αποτέλεσμα
    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);

    // Call AdMob αν υπάρχει
    if(window.cordova && window.AdMob) {
       AdMob.showInterstitial();
    }

  } catch (err) {
    console.error('AI Scan Error:', err);
    alert('Communication Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'START AI SCAN';
  }
}
</script>
</body>
</html>
