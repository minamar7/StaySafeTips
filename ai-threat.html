<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>AI Threat Analyzer – Stay Safe Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#020617"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #020917;
  --accent: #38bdf8;
  --gold: #facc15;
  --danger: #ef4444;
  --safe: #22c55e;
  --warn: #f59e0b;
  --panel: rgba(15, 23, 42, 0.8);
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background Effects */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px), 
                    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% -20%, rgba(56,189,248,0.15), transparent 70%);
}

.shell {
  position: relative; z-index: 2;
  max-width: 480px; margin: 0 auto;
  padding: 20px 20px 100px;
  display: flex; flex-direction: column; gap: 18px;
}

/* Back Button */
.nav-header {
  display: flex; justify-content: flex-start; margin-bottom: 5px;
}
.btn-back {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8;
  padding: 8px 16px;
  border-radius: 12px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-decoration: none;
  transition: 0.3s;
}
.btn-back:hover { background: rgba(56,189,248,0.1); color: var(--accent); }

.header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 30px; padding: 5px 14px;
  font-size: 0.68rem; letter-spacing: 2px; color: var(--accent);
  text-transform: uppercase; width: fit-content;
}

h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 2px; }
h1 span { color: var(--accent); }

/* Scenario Icons & Buttons */
.scenario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.scenario-btn {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 20px 10px;
  cursor: pointer; transition: 0.3s;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.scenario-btn.active {
  border-color: var(--accent);
  background: rgba(56,189,248,0.1);
  box-shadow: 0 0 20px rgba(56,189,248,0.15);
}

.icon-box {
  font-size: 2rem;
  filter: drop-shadow(0 0 5px rgba(56,189,248,0.3));
  transition: 0.3s;
}
.scenario-btn.active .icon-box {
  transform: scale(1.2);
  filter: drop-shadow(0 0 15px var(--accent));
}

.scenario-name {
  font-size: 0.75rem; letter-spacing: 1.5px;
  color: #94a3b8; text-transform: uppercase; font-weight: 700;
}
.scenario-btn.active .scenario-name { color: #fff; }

/* Input Area */
textarea {
  width: 100%; min-height: 120px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 16px;
  color: #fff; font-family: inherit; font-size: 1rem;
  outline: none; transition: 0.3s;
}
textarea:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); }

/* Main Button */
.btn-analyze {
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  border: none; border-radius: 16px;
  color: #fff; font-family: 'Orbitron', sans-serif;
  font-weight: 700; letter-spacing: 2px;
  cursor: pointer; box-shadow: 0 10px 25px rgba(14,165,233,0.3);
  transition: 0.2s;
}
.btn-analyze:active { transform: scale(0.98); }
.btn-analyze.loading { opacity: 0.6; pointer-events: none; }

/* Result Card */
.result-card {
  background: var(--panel);
  border-radius: 24px; border: 1px solid rgba(56,189,248,0.2);
  display: none; margin-top: 10px; overflow: hidden;
  animation: slideUp 0.4s ease-out;
}
.result-card.visible { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.result-header {
  padding: 20px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.03);
}
.threat-badge {
  padding: 6px 15px; border-radius: 10px;
  font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 900;
}
.threat-score { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; }

.result-body { padding: 20px; }
.result-label { font-size: 0.65rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.result-text { color: #cbd5e1; line-height: 1.6; font-size: 0.95rem; }

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="shell">
  <nav class="nav-header">
    <a href="https://minamar7.github.io/StaySafeTips/" class="btn-back">← BACK TO HUB</a>
  </nav>

  <div class="header-badge">AI ANALYZER ONLINE</div>
  <h1>🤖 <span>ELITE</span> THREAT<br>ANALYSIS</h1>

  <div class="scenario-grid">
    <button class="scenario-btn active" data-scenario="personal" onclick="selectScenario(this)">
      <span class="icon-box">🛡️</span>
      <span class="scenario-name">Personal</span>
    </button>
    <button class="scenario-btn" data-scenario="cyber" onclick="selectScenario(this)">
      <span class="icon-box">🔐</span>
      <span class="scenario-name">Cyber</span>
    </button>
    <button class="scenario-btn" data-scenario="environment" onclick="selectScenario(this)">
      <span class="icon-box">🌪️</span>
      <span class="scenario-name">Nature</span>
    </button>
    <button class="scenario-btn" data-scenario="emergency" onclick="selectScenario(this)">
      <span class="icon-box">🆘</span>
      <span class="scenario-name">Emergency</span>
    </button>
  </div>

  <div style="margin-top:10px;">
    <label class="result-label">Situation Details</label>
    <textarea id="situation" placeholder="Explain what is happening..."></textarea>
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">START SCAN</button>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="threat-badge" id="threatBadge">—</span>
      <span class="threat-score" id="threatScore">—</span>
    </div>
    <div class="result-body">
      <div class="result-label">AI Assessment</div>
      <div class="result-text" id="assessmentText"></div>
    </div>
  </div>
</div>

<script>
let selectedScenario = 'personal';

function selectScenario(btn) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedScenario = btn.dataset.scenario;
}

async function analyze() {
  const situation = document.getElementById('situation').value.trim();
  if (situation.length < 10) { alert('Please provide more details (min 10 chars).'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.classList.add('loading');
  btn.textContent = 'SCANNING...';

  try {
    const res = await fetch('https://stay-safe-tips.vercel.app/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ situation, scenario: selectedScenario })
    });

    const data = await res.json();
    
    document.getElementById('resultCard').classList.add('visible');
    const badge = document.getElementById('threatBadge');
    badge.textContent = data.level.toUpperCase();
    
    // Dynamic Colors
    const colors = { low: '#22c55e', medium: '#f59e0b', high: '#ef4444', critical: '#7f1d1d' };
    badge.style.background = colors[data.level.toLowerCase()] || colors.medium;
    
    document.getElementById('threatScore').textContent = (data.score || 0) + '%';
    document.getElementById('assessmentText').textContent = data.assessment || data.advice;

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  } catch (err) {
    alert('Communication error with AI core.');
  } finally {
    btn.classList.remove('loading');
    btn.textContent = 'START SCAN';
  }
}
</script>
</body>
</html>
