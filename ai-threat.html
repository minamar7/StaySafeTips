<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>AI Threat Analyzer – Stay Safe Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#020617"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #020917;
  --accent: #38bdf8;
  --gold: #facc15;
  --danger: #ef4444;
  --safe: #22c55e;
  --warn: #f59e0b;
  --panel: rgba(15, 23, 42, 0.9);
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background Effects */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px), 
                    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% -20%, rgba(56,189,248,0.15), transparent 70%);
}

.shell {
  position: relative; z-index: 2;
  max-width: 480px; margin: 0 auto;
  padding: 20px 20px 100px;
  display: flex; flex-direction: column; gap: 18px;
}

/* Back Button */
.nav-header {
  display: flex; justify-content: flex-start; margin-bottom: 5px;
}
.btn-back {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8;
  padding: 10px 18px;
  border-radius: 12px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-decoration: none;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-back:hover { 
  background: rgba(56,189,248,0.12); 
  color: var(--accent);
  border-color: var(--accent);
}

.header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 30px; padding: 5px 14px;
  font-size: 0.68rem; letter-spacing: 2px; color: var(--accent);
  text-transform: uppercase; width: fit-content;
}

h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 2px; line-height: 1.2; }
h1 span { color: var(--accent); text-shadow: 0 0 15px rgba(56,189,248,0.4); }

.scenario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.scenario-btn {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px 10px;
  cursor: pointer; transition: 0.3s;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.scenario-btn.active {
  border-color: var(--accent);
  background: rgba(56,189,248,0.1);
  box-shadow: 0 0 25px rgba(56,189,248,0.2);
}

.icon-box {
  font-size: 2.2rem;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.1));
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.scenario-btn.active .icon-box {
  transform: scale(1.25) translateY(-5px);
  filter: drop-shadow(0 0 15px var(--accent));
}

.scenario-name {
  font-size: 0.75rem; letter-spacing: 1.5px;
  color: #64748b; text-transform: uppercase; font-weight: 700;
}
.scenario-btn.active .scenario-name { color: #fff; }

.input-group { margin-top: 10px; }
textarea {
  width: 100%; min-height: 130px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 18px;
  color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1.05rem;
  outline: none; transition: 0.3s; resize: none;
}
textarea:focus { 
  border-color: var(--accent); 
  background: rgba(15, 23, 42, 0.8);
  box-shadow: 0 0 20px rgba(56,189,248,0.1);
}

.btn-analyze {
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  border: none; border-radius: 16px;
  color: #fff; font-family: 'Orbitron', sans-serif;
  font-weight: 900; letter-spacing: 2.5px;
  cursor: pointer; box-shadow: 0 10px 30px rgba(14,165,233,0.3);
  transition: 0.3s; text-transform: uppercase;
}
.btn-analyze:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(14,165,233,0.2); }
.btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

.result-card {
  background: var(--panel);
  border-radius: 24px; border: 1px solid rgba(56,189,248,0.3);
  display: none; margin-top: 10px; overflow: hidden;
  animation: slideUp 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
}
.result-card.visible { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.result-header {
  padding: 20px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(56,189,248,0.05); border-bottom: 1px solid rgba(56,189,248,0.1);
}
.threat-badge {
  padding: 6px 16px; border-radius: 8px;
  font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 900;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.threat-score { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: #fff; }

.result-body { padding: 25px; }
.result-label { font-size: 0.65rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
.result-text { color: #e2e8f0; line-height: 1.7; font-size: 1rem; letter-spacing: 0.2px; }

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="shell">
  <nav class="nav-header">
    <a href="index.html" class="btn-back" id="btn_back"><span>←</span> BACK TO HUB</a>
  </nav>

  <div class="header-badge" id="txt_badge">AI ANALYZER v1.5 FLASH</div>
  <h1 id="txt_main_title">🤖 <span>ELITE</span> THREAT<br>ANALYSIS</h1>

  <div class="scenario-grid">
    <button class="scenario-btn active" data-scenario="personal" onclick="selectScenario(this)">
      <span class="icon-box">🛡️</span>
      <span class="scenario-name" id="sc_personal">Personal</span>
    </button>
    <button class="scenario-btn" data-scenario="cyber" onclick="selectScenario(this)">
      <span class="icon-box">🔐</span>
      <span class="scenario-name" id="sc_cyber">Cyber</span>
    </button>
    <button class="scenario-btn" data-scenario="environment" onclick="selectScenario(this)">
      <span class="icon-box">🌪️</span>
      <span class="scenario-name" id="sc_nature">Nature</span>
    </button>
    <button class="scenario-btn" data-scenario="emergency" onclick="selectScenario(this)">
      <span class="icon-box">🆘</span>
      <span class="scenario-name" id="sc_emergency">Emergency</span>
    </button>
  </div>

  <div class="input-group">
    <label class="result-label" id="txt_label_details">Situation Details</label>
    <textarea id="situation" placeholder="Describe the threat..."></textarea>
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">START AI SCAN</button>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="threat-badge" id="threatBadge">—</span>
      <span class="threat-score" id="threatScore">—</span>
    </div>
    <div class="result-body">
      <div class="result-label" id="txt_label_assess">AI Security Assessment</div>
      <div class="result-text" id="assessmentText"></div>
    </div>
  </div>
</div>

<script>
// --- ΣΥΣΤΗΜΑ ΠΟΛΥΓΛΩΣΣΙΚΟΤΗΤΑΣ ---
const uiTranslations = {
    'en': { back: 'BACK TO HUB', badge: 'AI ANALYZER v1.5 FLASH', title: '🤖 <span>ELITE</span> THREAT<br>ANALYSIS', sc_personal: 'Personal', sc_cyber: 'Cyber', sc_nature: 'Nature', sc_emergency: 'Emergency', details: 'Situation Details', placeholder: 'Describe the threat or situation in detail...', btn: 'START AI SCAN', assess: 'AI Security Assessment', scanning: '⚡ SCANNING CORE...', error_short: 'Please describe your situation more clearly.' },
    'el': { back: 'ΕΠΙΣΤΡΟΦΗ', badge: 'AI ΑΝΑΛΥΤΗΣ v1.5 FLASH', title: '🤖 <span>ELITE</span> ΑΝΑΛΥΣΗ<br>ΑΠΕΙΛΗΣ', sc_personal: 'Προσωπική', sc_cyber: 'Κυβερνοχώρος', sc_nature: 'Φύση', sc_emergency: 'Έκτακτη', details: 'Λεπτομέρειες Κατάστασης', placeholder: 'Περιγράψτε την απειλή ή την κατάσταση λεπτομερώς...', btn: 'ΕΝΑΡΞΗ AI ΣΑΡΩΣΗΣ', assess: 'AI Αξιολόγηση Ασφαλείας', scanning: '⚡ ΣΑΡΩΣΗ ΠΥΡΗΝΑ...', error_short: 'Παρακαλώ περιγράψτε την κατάσταση πιο αναλυτικά.' },
    'de': { back: 'ZURÜCK', badge: 'AI ANALYSATOR v1.5', title: '🤖 <span>ELITE</span> GEFAHREN<br>ANALYSE', sc_personal: 'Privat', sc_cyber: 'Cyber', sc_nature: 'Natur', sc_emergency: 'Notfall', details: 'Situationsdetails', placeholder: 'Beschreiben Sie die Bedrohung...', btn: 'AI-SCAN STARTEN', assess: 'AI-Sicherheitsbewertung', scanning: '⚡ SCANNT...', error_short: 'Bitte beschreiben Sie die Situation genauer.' },
    'fr': { back: 'RETOUR', badge: 'ANALYSEUR IA v1.5', title: '🤖 <span>ELITE</span> ANALYSE DE<br>MENACE', sc_personal: 'Personnel', sc_cyber: 'Cyber', sc_nature: 'Nature', sc_emergency: 'Urgence', details: 'Détails de la situation', placeholder: 'Décrivez la menace...', btn: 'LANCER SCAN IA', assess: 'Évaluation de sécurité IA', scanning: '⚡ ANALYSE...', error_short: 'Veuillez décrire la situation plus clairement.' },
    'es': { back: 'VOLVER', badge: 'ANALIZADOR IA v1.5', title: '🤖 <span>ELITE</span> ANÁLISIS DE<br>AMENAZA', sc_personal: 'Personal', sc_cyber: 'Cyber', sc_nature: 'Naturaleza', sc_emergency: 'Emergencia', details: 'Detalles', placeholder: 'Describe la amenaza...', btn: 'INICIAR ESCANEO IA', assess: 'Evaluación de seguridad IA', scanning: '⚡ ESCANEANDO...', error_short: 'Por favor describe la situación con más detalle.' },
    'it': { back: 'INDIETRO', badge: 'ANALIZZATORE IA v1.5', title: '🤖 <span>ELITE</span> ANALISI<br>MINACCE', sc_personal: 'Personale', sc_cyber: 'Cyber', sc_nature: 'Natura', sc_emergency: 'Emergenza', details: 'Dettagli', placeholder: 'Descrivi la minaccia...', btn: 'AVVIA SCAN IA', assess: 'Valutazione sicurezza IA', scanning: '⚡ SCANSIONE...', error_short: 'Descrivi la situazione più chiaramente.' },
    'pt': { back: 'VOLTAR', badge: 'ANALISADOR IA v1.5', title: '🤖 <span>ELITE</span> ANÁLISE DE<br>AMEAÇAS', sc_personal: 'Pessoal', sc_cyber: 'Cyber', sc_nature: 'Natureza', sc_emergency: 'Emergência', details: 'Detalhes', placeholder: 'Descreva a ameaça...', btn: 'INICIAR SCAN IA', assess: 'Avaliação de segurança IA', scanning: '⚡ ANALISANDO...', error_short: 'Descreva a situação com mais detalhes.' },
    'ru': { back: 'НАЗАД', badge: 'ИИ АНАЛИЗАТОР v1.5', title: '🤖 <span>ELITE</span> АНАЛИЗ<br>УГРОЗ', sc_personal: 'Личное', sc_cyber: 'Кибер', sc_nature: 'Природа', sc_emergency: 'Чрезвычайная', details: 'Детали ситуации', placeholder: 'Опишите угрозу...', btn: 'ЗАПУСТИТЬ СКАН', assess: 'Оценка безопасности ИИ', scanning: '⚡ СКАНИРОВАНИЕ...', error_short: 'Пожалуйста, опишите ситуацию подробнее.' },
    'zh': { back: '返回', badge: 'AI 分析器 v1.5', title: '🤖 <span>ELITE</span> 威胁分析', sc_personal: '个人', sc_cyber: '网络', sc_nature: '自然', sc_emergency: '紧急', details: '情况详情', placeholder: '请描述威胁...', btn: '开始 AI 扫描', assess: 'AI 安全评估', scanning: '⚡ 正在扫描...', error_short: '请更清楚地描述您的情况。' },
    'hi': { back: 'वापस', badge: 'AI विश्लेषक v1.5', title: '🤖 <span>ELITE</span> खतरा विश्लेषण', sc_personal: 'व्यक्तिगत', sc_cyber: 'साइबर', sc_nature: 'प्रकृति', sc_emergency: 'आपातकालीन', details: 'विवरण', placeholder: 'खतरे का वर्णन करें...', btn: 'AI स्कैन शुरू करें', assess: 'AI सुरक्षा मूल्यांकन', scanning: '⚡ स्कैनिंग...', error_short: 'कृपया अपनी स्थिति का स्पष्ट वर्णन करें।' }
};

// Διάβασμα της γλώσσας από το localStorage (κλειδί 'user_lang' όπως το index.html)
const userLang = localStorage.getItem('user_lang') || 'en';
const lang = uiTranslations[userLang] || uiTranslations['en'];

// Εφαρμογή μεταφράσεων στο UI
document.getElementById('btn_back').innerHTML = `<span>←</span> ${lang.back}`;
document.getElementById('txt_badge').textContent = lang.badge;
document.getElementById('txt_main_title').innerHTML = lang.title;
document.getElementById('sc_personal').textContent = lang.sc_personal;
document.getElementById('sc_cyber').textContent = lang.sc_cyber;
document.getElementById('sc_nature').textContent = lang.sc_nature;
document.getElementById('sc_emergency').textContent = lang.sc_emergency;
document.getElementById('txt_label_details').textContent = lang.details;
document.getElementById('situation').placeholder = lang.placeholder;
document.getElementById('analyzeBtn').textContent = lang.btn;
document.getElementById('txt_label_assess').textContent = lang.assess;

let selectedScenario = 'personal';

function selectScenario(btn) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedScenario = btn.dataset.scenario;
}

async function analyze() {
  const situationInput = document.getElementById('situation');
  const situation = situationInput.value.trim();
  
  if (situation.length < 10) { 
    alert(lang.error_short); 
    return; 
  }

  const btn = document.getElementById('analyzeBtn');
  const card = document.getElementById('resultCard');
  
  btn.disabled = true;
  btn.textContent = lang.scanning;

  try {
    const res = await fetch('https://stay-safe-tips.vercel.app/api/analyze', {
      method: 'POST',
      mode: 'cors',
      headers: { 
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ 
        situation: situation, 
        scenario: selectedScenario,
        userLang: userLang // Στέλνουμε τη γλώσσα στο Vercel API
      })
    });

    if (!res.ok) throw new Error('Connectivity issue');

    const data = await res.json();
    
    card.classList.add('visible');
    const badge = document.getElementById('threatBadge');
    const level = (data.level || 'medium').toLowerCase();
    badge.textContent = level.toUpperCase();
    
    const colors = { low: '#22c55e', medium: '#f59e0b', high: '#ef4444', critical: '#7f1d1d' };
    badge.style.background = colors[level] || colors.medium;
    
    document.getElementById('threatScore').textContent = (data.score || 0) + '%';
    document.getElementById('assessmentText').textContent = data.assessment || data.advice || 'Analysis complete.';

    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);

  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = lang.btn;
  }
}
</script>
</body>
</html>
