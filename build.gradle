buildscript {
    repositories {
        google()
        mavenCentral() 
    }
    dependencies {
        // Αυτό το classpath είναι το εργαλείο που χτίζει το app
        classpath 'com.android.tools.build:gradle:8.9.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
