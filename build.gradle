buildscript {
    repositories {
        google()
        mavenCentral() // Πιο ασφαλές και σύγχρονο από το jcenter
    }
    dependencies {
        // Η έκδοση που έχεις είναι ήδη πολύ καλή
        classpath 'com.android.tools.build:gradle:8.9.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
