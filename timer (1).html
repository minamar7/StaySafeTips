<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Safe Arrival Timer – Stay Safe Elite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020917;
      --accent: #38bdf8;
      --gold: #facc15;
      --danger: #ef4444;
      --safe: #22c55e;
      --ring-size: 260px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      text-align: center;
      overflow: hidden;
      min-height: 100vh;
      position: relative;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift { from { background-position: 0 0; } to { background-position: 40px 40px; } }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 30%, rgba(56,189,248,0.12) 0%, transparent 70%);
      transition: background 1s;
    }
    .bg-glow.danger { background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(239,68,68,0.2) 0%, transparent 70%); }
    .bg-glow.safe-mode { background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(34,197,94,0.2) 0%, transparent 70%); }
    .scanline {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    }
    .app-shell {
      position: relative; z-index: 2;
      max-width: 420px; margin: 0 auto;
      height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      padding: 44px 24px 24px;
    }
    header { width: 100%; margin-bottom: 8px; }
    .header-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 30px; padding: 6px 16px;
      font-size: 0.72rem; letter-spacing: 2px;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 12px; animation: fadeInDown 0.6s ease;
    }
    .dot-live {
      width: 7px; height: 7px; background: var(--safe);
      border-radius: 50%; box-shadow: 0 0 8px var(--safe);
      animation: pulse-dot 1.5s infinite;
    }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.6} }
    h1 {
      font-family: 'Orbitron', monospace; font-size: 1.5rem;
      color: #fff; letter-spacing: 2px;
      animation: fadeInDown 0.7s ease; transition: color 0.5s;
    }
    h1.danger-text { color: var(--danger); }
    .status-desc {
      color: #64748b; font-size: 0.85rem; letter-spacing: 1px;
      margin-top: 4px; animation: fadeInDown 0.8s ease; transition: color 0.4s;
    }
    .timer-wrap {
      position: relative; width: var(--ring-size); height: var(--ring-size);
      margin: 20px auto; flex-shrink: 0;
    }
    .ring-glow {
      position: absolute; inset: -16px; border-radius: 50%;
      background: conic-gradient(var(--accent) var(--pct, 100%), transparent 0);
      filter: blur(18px); opacity: 0.35; transition: background 0.5s, opacity 0.5s;
    }
    .ring-glow.danger { background: conic-gradient(var(--danger) var(--pct, 100%), transparent 0); opacity: 0.5; }
    .timer-svg {
      transform: rotate(-90deg); width: 100%; height: 100%;
      filter: drop-shadow(0 0 6px rgba(56,189,248,0.4)); transition: filter 0.5s;
    }
    .timer-svg.danger { filter: drop-shadow(0 0 10px rgba(239,68,68,0.6)); }
    .timer-circle-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
    .timer-circle-track { fill: none; stroke: rgba(56,189,248,0.08); stroke-width: 12; stroke-dasharray: 6 6; }
    .timer-circle-prog {
      fill: none; stroke: var(--accent); stroke-width: 12;
      stroke-linecap: round; stroke-dasharray: 816; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }
    .timer-circle-prog.danger { stroke: var(--danger); }
    .timer-inner {
      position: absolute; inset: 0; display: flex;
      flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    }
    .time-label { font-size: 0.6rem; letter-spacing: 3px; color: #475569; text-transform: uppercase; }
    .time-display {
      font-family: 'Orbitron', monospace; font-size: 3.2rem;
      font-weight: 900; letter-spacing: 2px; line-height: 1;
      text-shadow: 0 0 30px rgba(56,189,248,0.6); transition: color 0.5s, text-shadow 0.5s;
    }
    .time-display.danger {
      color: var(--danger); text-shadow: 0 0 30px rgba(239,68,68,0.8);
      animation: shake-num 0.3s infinite;
    }
    @keyframes shake-num { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
    .time-pct { font-size: 0.7rem; color: #475569; letter-spacing: 1px; }
    .session-stats {
      display: flex; gap: 24px; justify-content: center; margin: 4px 0 16px;
    }
    .stat-box {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 10px 20px; animation: fadeIn 1s ease;
    }
    .stat-value { font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--accent); }
    .stat-label { font-size: 0.65rem; letter-spacing: 1.5px; color: #475569; text-transform: uppercase; }
    .alert-strip {
      width: 100%; background: linear-gradient(90deg, transparent, rgba(239,68,68,0.15), transparent);
      border: 1px solid rgba(239,68,68,0.3); border-radius: 10px;
      padding: 8px 16px; font-size: 0.75rem; letter-spacing: 2px;
      color: var(--danger); text-transform: uppercase;
      display: none; animation: blink-strip 0.8s infinite; margin-bottom: 10px;
    }
    .alert-strip.visible { display: block; }
    @keyframes blink-strip { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .controls { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-top: auto; margin-bottom: 80px; }
    .btn {
      position: relative; padding: 18px; border-radius: 16px;
      font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
      letter-spacing: 2px; border: none; cursor: pointer;
      text-transform: uppercase; overflow: hidden; transition: transform 0.15s, box-shadow 0.3s;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn:active { transform: scale(0.96); }
    .btn-arrival {
      background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
      box-shadow: 0 0 24px rgba(34,197,94,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-cancel {
      background: rgba(255,255,255,0.04); color: #64748b;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── AD OVERLAY ── */
    .ad-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(2,9,23,0.98);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.4s;
    }
    .ad-overlay.visible { opacity: 1; pointer-events: all; }
    .ad-label {
      font-size: 0.65rem; letter-spacing: 3px; color: #475569;
      text-transform: uppercase; border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 12px; border-radius: 20px;
    }
    .ad-box {
      width: 320px; height: 250px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; display: flex;
      flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    }
    .ad-box-text { color: #334155; font-size: 0.8rem; letter-spacing: 1px; }

    /* countdown skip */
    .skip-row { display: flex; align-items: center; gap: 12px; }
    .skip-countdown {
      font-family: 'Orbitron', monospace; font-size: 1.4rem;
      color: #475569; min-width: 32px;
    }
    .btn-skip {
      background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3);
      color: var(--accent); font-family: 'Rajdhani', sans-serif;
      font-weight: 700; letter-spacing: 2px; font-size: 0.85rem;
      padding: 10px 28px; border-radius: 12px; cursor: pointer;
      text-transform: uppercase; opacity: 0.3; pointer-events: none;
      transition: 0.3s;
    }
    .btn-skip.active { opacity: 1; pointer-events: all; }
    .btn-skip.active:hover { background: rgba(56,189,248,0.2); }

    /* ── SUCCESS SCREEN ── */
    .success-screen {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(2,9,23,0.97);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .success-screen.visible { opacity: 1; pointer-events: all; }
    .success-icon { font-size: 5rem; animation: bounceIn 0.6s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes bounceIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2);opacity:1} 100%{transform:scale(1)} }
    .success-title { font-family: 'Orbitron', monospace; font-size: 1.8rem; color: var(--safe); text-shadow: 0 0 30px rgba(34,197,94,0.6); }
    .xp-badge {
      background: linear-gradient(135deg, var(--gold), #f59e0b); color: #020917;
      font-family: 'Orbitron', monospace; font-weight: 700; font-size: 1.1rem;
      padding: 10px 28px; border-radius: 30px; box-shadow: 0 0 24px rgba(250,204,21,0.5);
      animation: pulse-xp 1.5s infinite;
    }
    @keyframes pulse-xp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .btn-home {
      margin-top: 10px; background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.4); color: var(--accent);
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      letter-spacing: 2px; font-size: 0.9rem; padding: 14px 36px;
      border-radius: 14px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
    }
    .btn-home:hover { background: rgba(56,189,248,0.2); }
    .pulse-ring {
      position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid var(--danger); opacity: 0; pointer-events: none;
    }
    .alert-mode .pulse-ring { animation: expand-ring 1.2s infinite; }
    @keyframes expand-ring { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(1.18);opacity:0} }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:none} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    canvas#confetti-canvas { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow" id="bgGlow"></div>
<div class="scanline"></div>
<canvas id="confetti-canvas"></canvas>

<!-- ══ AD OVERLAY (εμφανίζεται μετά το confetti) ══ -->
<div class="ad-overlay" id="adOverlay">
  <div class="ad-label">ADVERTISEMENT</div>

  <!-- 
    ════════════════════════════════════════════════════════
    ADMOB INTERSTITIAL:
    Σε native Android αυτό το div δεν χρησιμοποιείται.
    Το AdMob interstitial παίζει μέσω MainActivity.java.
    Αυτό εδώ είναι ΜΟΝΟ για preview στο browser.
    ════════════════════════════════════════════════════════
  -->
  <div class="ad-box" id="admobSlot">
    <!-- 
      Android: Το AdMob SDK inject-άρει εδώ αυτόματα.
      Για production αντικατάστησε με το banner unit αν θέλεις
      banner μέσα στο WebView (εναλλακτικά χρησιμοποίησε το
      interstitial από τη MainActivity που παίζει full-screen).
    -->
    <span style="font-size:2rem">📱</span>
    <span class="ad-box-text">Ad loads here on device</span>
    <span style="font-size:0.65rem;color:#1e293b;letter-spacing:1px">ADMOB INTERSTITIAL UNIT</span>
  </div>

  <div class="skip-row">
    <div class="skip-countdown" id="skipCountdown">5</div>
    <button class="btn-skip" id="skipBtn" onclick="showSuccess()">SKIP AD →</button>
  </div>
</div>

<!-- ══ SUCCESS SCREEN ══ -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">🛡️</div>
  <div class="success-title">MISSION COMPLETE</div>
  <p style="color:#64748b;letter-spacing:2px;font-size:0.8rem">SAFE ARRIVAL CONFIRMED</p>
  <div class="xp-badge">+ 50 XP EARNED</div>
  <button class="btn-home" onclick="window.location.href='index.html'">← RETURN TO BASE</button>
</div>

<!-- ══ MAIN UI ══ -->
<div class="app-shell">
  <header>
    <div class="header-badge">
      <span class="dot-live"></span>
      ELITE MONITORING
    </div>
    <h1 id="status-title">SAFE ARRIVAL</h1>
    <p class="status-desc" id="status-desc">Tracking your journey in real time</p>
  </header>

  <div class="timer-wrap" id="timerWrap">
    <div class="ring-glow" id="ringGlow"></div>
    <div class="pulse-ring"></div>
    <svg class="timer-svg" id="timerSvg" viewBox="0 0 280 280">
      <circle class="timer-circle-bg" cx="140" cy="140" r="130"></circle>
      <circle class="timer-circle-track" cx="140" cy="140" r="130"></circle>
      <circle id="progress" class="timer-circle-prog" cx="140" cy="140" r="130"></circle>
    </svg>
    <div class="timer-inner">
      <span class="time-label">TIME LEFT</span>
      <div class="time-display" id="display">15:00</div>
      <span class="time-pct" id="pctDisplay">100%</span>
    </div>
  </div>

  <div class="session-stats">
    <div class="stat-box">
      <span class="stat-value" id="elapsedDisplay">0:00</span>
      <span class="stat-label">Elapsed</span>
    </div>
    <div class="stat-box">
      <span class="stat-value">15 MIN</span>
      <span class="stat-label">Session</span>
    </div>
  </div>

  <div class="alert-strip" id="alertStrip">⚠ ALERT — CHECK IN REQUIRED</div>

  <div class="controls">
    <button class="btn btn-arrival" onclick="safeArrival()">✅ &nbsp;I HAVE ARRIVED SAFELY</button>
    <button class="btn btn-cancel" onclick="cancelTimer()">CANCEL SESSION</button>
  </div>
</div>

<script>
  const TOTAL = 15 * 60;
  let remaining = TOTAL, elapsed = 0, interval = null;
  const CIRCUMFERENCE = 2 * Math.PI * 130;

  const progressEl   = document.getElementById('progress');
  const displayEl    = document.getElementById('display');
  const pctEl        = document.getElementById('pctDisplay');
  const elapsedEl    = document.getElementById('elapsedDisplay');
  const bgGlow       = document.getElementById('bgGlow');
  const ringGlow     = document.getElementById('ringGlow');
  const timerSvg     = document.getElementById('timerSvg');
  const timerWrap    = document.getElementById('timerWrap');
  const alertStrip   = document.getElementById('alertStrip');
  const statusTitle  = document.getElementById('status-title');
  const statusDesc   = document.getElementById('status-desc');
  const adOverlay    = document.getElementById('adOverlay');
  const successScreen= document.getElementById('successScreen');
  const skipBtn      = document.getElementById('skipBtn');
  const skipCountdown= document.getElementById('skipCountdown');

  progressEl.style.strokeDasharray = CIRCUMFERENCE;
  progressEl.style.strokeDashoffset = 0;

  function fmt(s) {
    return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  }

  function updateUI() {
    const pct = remaining / TOTAL;
    displayEl.textContent = fmt(remaining);
    elapsedEl.textContent = fmt(elapsed);
    pctEl.textContent = Math.ceil(pct * 100) + '%';
    progressEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
    ringGlow.style.setProperty('--pct', (pct * 100).toFixed(1) + '%');

    if (pct <= 0.2) {
      progressEl.classList.add('danger');
      timerSvg.classList.add('danger');
      displayEl.classList.add('danger');
      bgGlow.classList.add('danger');
      ringGlow.classList.add('danger');
      timerWrap.classList.add('alert-mode');
      alertStrip.classList.add('visible');
      statusTitle.classList.add('danger-text');
      statusTitle.textContent = '⚠ ALERT';
      statusDesc.textContent = 'Check in NOW or SOS will be sent';
      statusDesc.style.color = '#ef4444';
    } else if (pct <= 0.5) {
      progressEl.style.stroke = '#f59e0b';
    }
  }

  function startTimer() {
    interval = setInterval(() => {
      if (remaining <= 0) { clearInterval(interval); triggerAlert(); return; }
      remaining--; elapsed++;
      if (remaining <= 60 && navigator.vibrate) navigator.vibrate([200,100,200]);
      updateUI();
    }, 1000);
  }

  function triggerAlert() {
    statusTitle.textContent = '🚨 TIME EXPIRED';
    statusDesc.textContent = 'Sending emergency SOS...';
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        window.location.href = `sms:?&body=EMERGENCY! I have not checked in. Last location: ${link}`;
      }, () => {
        window.location.href = `sms:?&body=EMERGENCY! I have not checked in. Location unavailable.`;
      });
    }
  }

  // ════════════════════════════════════════════════════════
  // SAFE ARRIVAL → AdMob bridge
  // ════════════════════════════════════════════════════════
  function safeArrival() {
    clearInterval(interval);
    launchConfetti();

    // Αποθήκευση XP
    let xp = parseInt(localStorage.getItem('user_xp')) || 0;
    localStorage.setItem('user_xp', xp + 50);
    bgGlow.classList.add('safe-mode');

    setTimeout(() => {
      // ── ANDROID: καλεί το AdMob Interstitial μέσω Java Bridge ──
      if (window.Android && typeof window.Android.onSafeArrival === 'function') {
        window.Android.onSafeArrival();
        // Η MainActivity.java θα παίξει το interstitial.
        // Μετά το κλείσιμό του, καλεί πάλι εδώ showSuccess() ή φορτώνει index.html
      } else {
        // ── WEB / BROWSER: δείχνει simulated ad overlay ──
        showAdOverlay();
      }
    }, 1500);
  }

  // Simulated ad overlay (browser preview + fallback)
  function showAdOverlay() {
    adOverlay.classList.add('visible');
    let count = 5;
    const tick = setInterval(() => {
      count--;
      skipCountdown.textContent = count;
      if (count <= 0) {
        clearInterval(tick);
        skipBtn.classList.add('active');
        skipCountdown.textContent = '';
      }
    }, 1000);
  }

  // Καλείται από: skipBtn ΚΑΙ από Android μετά το κλείσιμο interstitial
  function showSuccess() {
    adOverlay.classList.remove('visible');
    successScreen.classList.add('visible');
  }

  function cancelTimer() {
    if (confirm('Cancel monitoring session?')) {
      clearInterval(interval);
      window.location.href = 'index.html';
    }
  }

  // ── CONFETTI ──
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const colors = ['#22c55e','#38bdf8','#facc15','#a78bfa','#f472b6','#ffffff'];
    const pieces = Array.from({length:160}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 12 + 5, h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random()-0.5)*4, vy: Math.random()*4+2,
      vr: (Math.random()-0.5)*0.2, opacity: 1
    }));
    let frame = 0;
    (function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
        if(frame>80) p.opacity -= 0.015;
        ctx.save(); ctx.globalAlpha=Math.max(0,p.opacity);
        ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      });
      frame++;
      if(frame<140) requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    })();
  }

  window.onload = () => { updateUI(); startTimer(); };
</script>
</body>
</html>
